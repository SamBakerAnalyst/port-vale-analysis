# IP-only deploy with password protection — http://YOUR_IP/
services:
  hub:
    build: .
    env_file: .env
    environment:
      HOST: 0.0.0.0
      PORT: 8000
      DATA_ROOT: /data
    volumes:
      - pv-data:/data
    restart: unless-stopped
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
    volumes:
      - ./deploy/Caddyfile.ip:/etc/caddy/Caddyfile:ro
    depends_on:
      hub:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pv-data:
