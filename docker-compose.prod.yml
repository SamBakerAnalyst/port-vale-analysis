services:
  hub:
    build: .
    env_file: .env
    environment:
      HOST: 0.0.0.0
      PORT: 8000
      DATA_ROOT: /data
    volumes:
      - pv-data:/data
    restart: unless-stopped
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    environment:
      SITE_DOMAIN: ${SITE_DOMAIN:?Set SITE_DOMAIN in .env e.g. analysis.port-vale.co.uk}
    volumes:
      - ./deploy/Caddyfile.active:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      hub:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pv-data:
  caddy-data:
  caddy-config:
