<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scout Summary</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/fixture-planner.css?v=7" />
  <link rel="stylesheet" href="/static/scout-ops.css?v=16" />
</head>
<body>
  <div class="so-app">
    <header class="so-toolbar">
      <div class="so-toolbar__left">
        <p class="so-toolbar__eyebrow">Recruitment · <a href="/">← All apps</a></p>
        <h1 class="so-toolbar__title">Scout Summary</h1>
        <p class="so-toolbar__subtitle">Who has covered what — live and video assignments across all leagues</p>
      </div>
      <div class="so-toolbar__right">
        <nav class="so-toolbar__nav" aria-label="Related pages">
          <a href="/fixture-planner" class="fp-btn fp-btn--ghost">Fixture planner</a>
          <a href="/scouts-calendar" class="fp-btn fp-btn--ghost">Scouts calendar</a>
          <a href="/scout-summary-report" class="fp-btn fp-btn--ghost">Generate report</a>
        </nav>
        <button type="button" class="fp-btn fp-btn--ghost" id="refreshBtn">Refresh</button>
      </div>
    </header>

    <section class="so-controls card">
      <div class="so-controls__row">
        <div class="so-controls__group">
          <span class="fp-controls__label">Season</span>
          <div id="seasonToggle" class="fp-season-toggle" role="group" aria-label="Season"></div>
        </div>
        <div class="so-controls__group so-controls__group--grow">
          <span class="fp-controls__label">Staff</span>
          <div id="staffToggle" class="fp-league-toggle so-staff-toggle" role="group" aria-label="Filter by staff"></div>
        </div>
      </div>
      <div class="so-controls__group so-controls__group--full">
        <span class="fp-controls__label">Period</span>
        <div id="periodToggle" class="fp-league-toggle so-period-toggle" role="group" aria-label="Filter by period"></div>
      </div>
    </section>

    <section class="so-kpi-grid card" id="kpiPanel" aria-live="polite"></section>

    <section class="card" style="padding:.85rem 1rem;margin-bottom:.85rem" id="leaguePanel" aria-live="polite"></section>

    <h2 class="so-section-title" id="staffSectionTitle">By scout</h2>
    <section class="so-staff-grid" id="staffPanel" aria-live="polite"></section>

    <footer class="so-footer" id="statusBar">Loading scout summary…</footer>

    <div id="undoToast" class="so-toast so-toast--hidden" role="status" aria-live="polite" aria-atomic="true">
      <span id="undoToastMessage" class="so-toast__message">Assignment removed.</span>
      <button type="button" id="undoToastBtn" class="fp-btn fp-btn--ghost so-toast__undo">Undo</button>
    </div>

    <div id="matchModal" class="so-match-modal so-match-modal--hidden" aria-hidden="true">
      <div class="so-match-modal__backdrop" data-close-modal></div>
      <div class="so-match-modal__panel" role="dialog" aria-modal="true" aria-labelledby="matchModalTitle">
        <header class="so-match-modal__header">
          <div class="so-match-modal__heading">
            <h2 id="matchModalTitle" class="so-match-modal__title"></h2>
            <p id="matchModalMeta" class="so-match-modal__meta"></p>
          </div>
          <button type="button" class="so-match-modal__close" data-close-modal aria-label="Close match data">×</button>
        </header>
        <div id="matchModalBody" class="so-match-modal__body"></div>
      </div>
    </div>
  </div>

  <script defer src="/static/scout-summary.js?v=19"></script>
</body>
</html>
