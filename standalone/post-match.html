<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Post-Match Report</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700;800&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --pv-gold: #f5c518;
      --pv-muted: #9ca3af;
      --slide-width: min(1100px, 100%);
      --slide-ink: #0f172a;
      --slide-line: #cbd5e1;
      --slide-panel: #eef2f6;
      --slide-panel-deep: #e4e9f0;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "DM Sans", system-ui, sans-serif;
      background: #0a0a0a;
      color: #f5f5f5;
    }
    .app { padding: 1.25rem 1.5rem 2.5rem; }
    .toolbar {
      display: flex; flex-wrap: wrap; align-items: flex-end; justify-content: space-between;
      gap: 1rem; margin-bottom: 1.25rem;
    }
    .toolbar__eyebrow {
      margin: 0; font-size: 0.75rem; letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--pv-gold); font-weight: 600;
    }
    .toolbar__title {
      margin: 0.15rem 0 0; font-family: "Barlow Condensed", sans-serif;
      font-size: 1.75rem; font-weight: 700;
    }
    .toolbar__actions { display: flex; gap: 0.75rem; align-items: flex-end; }
    .toolbar__field {
      display: flex; flex-direction: column; gap: 0.35rem;
      font-size: 0.75rem; color: var(--pv-muted);
    }
    .toolbar__field input {
      width: 120px; padding: 0.45rem 0.6rem; border: 1px solid #3f3f46;
      border-radius: 6px; background: #141414; color: #f5f5f5; font: inherit;
    }
    .toolbar__btn {
      padding: 0.55rem 1rem; border: 1px solid var(--pv-gold); border-radius: 6px;
      background: rgba(245, 197, 24, 0.12); color: var(--pv-gold);
      font-weight: 600; cursor: pointer;
    }
    .toolbar__btn--secondary {
      border-color: #3f3f46; background: #141414; color: #f5f5f5;
    }
    .toolbar__btn--secondary:hover:not(:disabled) {
      border-color: #52525b; background: #1a1a1a;
    }
    .match-bar-wrap {
      margin-bottom: 1.25rem;
      background: #111;
      border: 1px solid #2a2a2a;
      border-radius: 10px;
      padding: 0.65rem 0.75rem;
    }
    .match-bar {
      display: flex;
      align-items: flex-end;
      gap: 0.35rem;
      overflow-x: auto;
      padding-bottom: 0.15rem;
      scrollbar-width: thin;
      scrollbar-color: #3f3f46 transparent;
    }
    .match-bar__item {
      flex: 0 0 auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.3rem;
      min-width: 52px;
      padding: 0.35rem 0.4rem 0.45rem;
      border: 2px solid transparent;
      border-radius: 8px;
      background: transparent;
      cursor: pointer;
      color: #e5e5e5;
      font: inherit;
      transition: border-color 0.15s, background 0.15s;
    }
    .match-bar__item:hover { background: rgba(255, 255, 255, 0.04); }
    .match-bar__item--active {
      border-color: #4ade80;
      background: rgba(74, 222, 128, 0.06);
    }
    .match-bar__meta {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 0.05rem;
      font-size: 0.58rem;
      line-height: 1.15;
      color: #a3a3a3;
      text-align: center;
      white-space: nowrap;
    }
    .match-bar__item--active .match-bar__meta { display: flex; }
    .match-bar__crest {
      width: 36px;
      height: 36px;
      object-fit: contain;
      filter: grayscale(1) opacity(0.55);
      transition: filter 0.15s;
    }
    .match-bar__item--active .match-bar__crest {
      filter: none;
      width: 42px;
      height: 42px;
    }
    .match-bar__dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #52525b;
    }
    .match-bar__dot--win { background: #4ade80; }
    .match-bar__dot--loss { background: #f87171; }
    .match-bar__dot--draw { background: #a3a3a3; }
    .match-bar__score {
      display: none;
      font-family: "Barlow Condensed", sans-serif;
      font-size: 0.72rem;
      font-weight: 800;
      letter-spacing: 0.03em;
      padding: 0.15rem 0.45rem;
      border-radius: 4px;
      background: #52525b;
      color: #fff;
      white-space: nowrap;
    }
    .match-bar__score--win { background: #16a34a; }
    .match-bar__score--loss { background: #dc2626; }
    .match-bar__score--draw { background: #71717a; }
    .match-bar__item--active .match-bar__score { display: block; }
    .match-bar__item--active .match-bar__dot { display: none; }
    .slide__matchup {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 3.25rem;
      margin-bottom: 0.75rem;
      width: min(1100px, 100%);
    }
    .slide__team {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.85rem;
      min-width: 200px;
      flex: 1 1 0;
    }
    .slide__crest-img {
      width: 210px;
      height: 210px;
      object-fit: contain;
      filter: drop-shadow(0 10px 24px rgba(0, 0, 0, 0.12));
    }
    .slide__team-name {
      margin: 0;
      font-family: "Barlow Condensed", sans-serif;
      font-size: 1.85rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      text-align: center;
      max-width: 280px;
      line-height: 1.05;
    }
    .slide__score-block {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.55rem;
      min-width: 220px;
    }
    .slide__score-main {
      margin: 0;
      font-family: "Barlow Condensed", sans-serif;
      font-size: 5.5rem;
      font-weight: 800;
      letter-spacing: 0.06em;
      line-height: 0.9;
    }
    .slide__score-result {
      margin: 0;
      font-family: "Barlow Condensed", sans-serif;
      font-size: 1.35rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      color: #444;
    }
    .export-capture-host {
      position: fixed;
      left: -10000px;
      top: 0;
      z-index: -1;
      pointer-events: none;
    }
    .export-capture-host .slide {
      margin: 0;
      box-shadow: none;
    }
    /* PDF capture — 16:9 Keynote frame (same as pre-match WhatsApp PDFs) */
    .slide--pdf-capture,
    .deck--exporting .slide {
      width: 1920px !important;
      max-width: 1920px !important;
      height: 1080px !important;
      max-height: 1080px !important;
      min-height: 1080px !important;
      border-radius: 0 !important;
      box-shadow: none !important;
      margin: 0 !important;
      overflow: hidden !important;
      display: flex !important;
      flex-direction: column !important;
      box-sizing: border-box !important;
    }
    .slide--pdf-capture .slide__footer-bar,
    .deck--exporting .slide .slide__footer-bar {
      display: none !important;
    }
    .slide-export-footer {
      flex: 0 0 44px;
      height: 44px;
      box-sizing: border-box;
      background: #111;
      color: #e2e8f0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: "Barlow Condensed", sans-serif;
      font-size: 1.05rem;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      border-top: 3px solid var(--pv-gold);
      width: 100%;
      margin-top: auto;
    }
    .slide--pdf-capture.slide--title,
    .deck--exporting .slide--title {
      background:
        radial-gradient(ellipse 70% 46% at 50% 36%, rgba(245, 197, 24, 0.2), transparent 70%),
        linear-gradient(180deg, #fcfcfd 0%, #eceff3 58%, #e3e7ed 100%) !important;
    }
    .slide--pdf-capture .slide__title-body,
    .deck--exporting .slide--title .slide__title-body {
      flex: 1 1 auto;
      min-height: 0 !important;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 2.25rem 3.5rem 1.75rem;
    }
    .slide--pdf-capture .slide__crest-img,
    .deck--exporting .slide--title .slide__crest-img,
    .slide--pdf-capture .slide__crest,
    .deck--exporting .slide--title .slide__crest {
      width: 320px !important;
      height: 320px !important;
      font-size: 5.5rem !important;
    }
    .slide--pdf-capture .slide__score-main,
    .deck--exporting .slide--title .slide__score-main {
      font-size: 8.5rem !important;
      letter-spacing: 0.04em !important;
    }
    .slide--pdf-capture .slide__team-name,
    .deck--exporting .slide--title .slide__team-name {
      font-size: 2.65rem !important;
      max-width: 420px !important;
      line-height: 1.1 !important;
    }
    .slide--pdf-capture .slide__score-ht,
    .deck--exporting .slide--title .slide__score-ht {
      font-size: 1.65rem !important;
      margin-top: 0.45rem !important;
    }
    .slide--pdf-capture .slide__score-result,
    .deck--exporting .slide--title .slide__score-result {
      display: none !important;
    }
    .slide--pdf-capture .slide__date,
    .deck--exporting .slide--title .slide__date {
      font-size: 1.75rem !important;
      margin-top: 1.75rem !important;
    }
    .slide--pdf-capture .slide__title-eyebrow,
    .deck--exporting .slide--title .slide__title-eyebrow {
      font-size: 1.55rem !important;
      margin-bottom: 1.75rem !important;
      letter-spacing: 0.32em !important;
    }
    .slide--pdf-capture .slide__footer-bar,
    .deck--exporting .slide--title .slide__footer-bar {
      font-size: 1.95rem !important;
      padding: 1.2rem !important;
      letter-spacing: 0.28em !important;
    }
    .slide--pdf-capture .slide__matchup,
    .deck--exporting .slide--title .slide__matchup {
      gap: 4rem !important;
      width: min(1500px, 100%) !important;
    }
    .slide--pdf-capture .slide__corner,
    .deck--exporting .slide--title .slide__corner {
      width: 7px !important;
      height: 140px !important;
    }
    .slide--pdf-capture .prog-keynote,
    .slide--pdf-capture .cross-keynote,
    .slide--pdf-capture .shots-keynote,
    .slide--pdf-capture .set-plays-keynote,
    .slide--pdf-capture .divide-keynote,
    .deck--exporting .prog-keynote,
    .deck--exporting .cross-keynote,
    .deck--exporting .shots-keynote,
    .deck--exporting .set-plays-keynote,
    .deck--exporting .divide-keynote {
      border-radius: 0 !important;
      box-shadow: none !important;
      border-color: #c5ccd6 !important;
      background-image: none !important;
      background-color: #e6eaef !important;
      flex: 1 1 auto !important;
      min-height: 0 !important;
      height: auto !important;
      max-height: none !important;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .slide--pdf-capture .prog-keynote__body,
    .slide--pdf-capture .cross-keynote__body,
    .slide--pdf-capture .shots-keynote__body,
    .slide--pdf-capture .set-plays-keynote__body,
    .deck--exporting .prog-keynote__body,
    .deck--exporting .cross-keynote__body,
    .deck--exporting .shots-keynote__body,
    .deck--exporting .set-plays-keynote__body {
      flex: 1 1 auto;
      min-height: 0;
      overflow: hidden;
    }
    .slide--pdf-capture .divide-keynote__body,
    .deck--exporting .divide-keynote__body {
      flex: 1 1 auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .slide--pdf-capture.slide--data,
    .slide--pdf-capture.slide--overview,
    .slide--pdf-capture.slide--touch,
    .deck--exporting .slide--data,
    .deck--exporting .slide--overview,
    .deck--exporting .slide--touch {
      height: 1080px !important;
      overflow: hidden !important;
    }
    .slide--pdf-capture .duels-map-pitch,
    .deck--exporting .duels-map-pitch {
      height: auto !important;
      max-height: 920px !important;
      width: auto !important;
      max-width: 100% !important;
    }
    .slide--pdf-capture .slide--duels-map-detail .prog-keynote__body,
    .deck--exporting .slide--duels-map-detail .prog-keynote__body {
      grid-template-columns: minmax(0, 1.35fr) minmax(300px, 0.72fr) !important;
      gap: 0.95rem !important;
      padding: 0.85rem 1rem 0.95rem !important;
    }
    .slide--pdf-capture .slide--duels-map-detail .duels-map-wrap,
    .deck--exporting .slide--duels-map-detail .duels-map-wrap {
      height: 100% !important;
      min-height: 0 !important;
      overflow: hidden !important;
      background: #3f9f45 !important;
      padding: 0.85rem !important;
    }
    .slide--pdf-capture .slide--duels-map-detail .duels-map-wrap:has(> .duels-map-pitch),
    .deck--exporting .slide--duels-map-detail .duels-map-wrap:has(> .duels-map-pitch) {
      width: 100% !important;
      max-width: 100% !important;
      justify-self: stretch !important;
    }
    .slide--pdf-capture .slide--duels-map-detail .duels-map-pitch,
    .deck--exporting .slide--duels-map-detail .duels-map-pitch,
    .slide--pdf-capture .slide--duels-map-detail .duels-map-pitch--raster,
    .deck--exporting .slide--duels-map-detail .duels-map-pitch--raster {
      height: 100% !important;
      max-height: 100% !important;
      width: 100% !important;
      max-width: 100% !important;
      display: block !important;
      margin: 0 !important;
      object-fit: contain !important;
    }
    .slide--pdf-capture .slide--duels-map-detail .duels-zone-heat,
    .deck--exporting .slide--duels-map-detail .duels-zone-heat {
      height: 100% !important;
    }
    .slide--pdf-capture .slide--duels-map-detail .duels-zone-heat__count,
    .deck--exporting .slide--duels-map-detail .duels-zone-heat__count {
      font-size: 2.35rem !important;
    }
    .slide--pdf-capture .slide--duels-map-detail .duels-zone-heat__share,
    .deck--exporting .slide--duels-map-detail .duels-zone-heat__share {
      font-size: 1.2rem !important;
    }
    .slide--pdf-capture .slide--duels-map-detail .duels-map-panel__title,
    .deck--exporting .slide--duels-map-detail .duels-map-panel__title {
      font-size: 1.9rem !important;
    }
    .slide--pdf-capture .slide--duels-map-detail .duels-map-breakdown__label,
    .deck--exporting .slide--duels-map-detail .duels-map-breakdown__label {
      font-size: 1.2rem !important;
    }
    .slide--pdf-capture .slide--duels-map-detail .duels-map-breakdown__value,
    .deck--exporting .slide--duels-map-detail .duels-map-breakdown__value {
      font-size: 1.25rem !important;
    }
    .slide--pdf-capture .slide--duels-map-detail .duels-map-player__name,
    .deck--exporting .slide--duels-map-detail .duels-map-player__name {
      font-size: 1.22rem !important;
    }
    .slide--pdf-capture .slide--duels-map-detail .duels-map-player__count,
    .deck--exporting .slide--duels-map-detail .duels-map-player__count {
      font-size: 1.4rem !important;
    }
    .slide--pdf-capture .slide--duels,
    .deck--exporting .slide--duels {
      border-top-width: 2px;
    }
    .slide--pdf-capture.slide--duels .prog-keynote,
    .deck--exporting .slide--duels .prog-keynote {
      height: 100% !important;
      display: flex !important;
      flex-direction: column !important;
    }
    .slide--pdf-capture.slide--duels .prog-keynote__body,
    .deck--exporting .slide--duels .prog-keynote__body {
      flex: 1 1 auto !important;
      min-height: 0 !important;
      grid-template-columns: minmax(300px, 30%) minmax(0, 1fr) !important;
      gap: 0.85rem !important;
      padding: 0.75rem 0.85rem 0.85rem !important;
      align-items: stretch !important;
    }
    .slide--pdf-capture.slide--duels .duels-team-stack,
    .deck--exporting .slide--duels .duels-team-stack {
      height: 100% !important;
      gap: 0.7rem !important;
    }
    .slide--pdf-capture.slide--duels .duels-team-stack__caption,
    .deck--exporting .slide--duels .duels-team-stack__caption {
      font-size: 0.95rem !important;
      padding: 0.15rem 0.2rem 0.05rem !important;
    }
    .slide--pdf-capture.slide--duels .duels-team-table,
    .deck--exporting .slide--duels .duels-team-table {
      flex: 1 1 0 !important;
      height: 100% !important;
    }
    .slide--pdf-capture.slide--duels .duels-team-table th,
    .deck--exporting .slide--duels .duels-team-table th {
      font-size: 0.82rem !important;
      padding: 0.4rem 0.35rem !important;
    }
    .slide--pdf-capture.slide--duels .duels-team-table .prog-table__metric,
    .deck--exporting .slide--duels .duels-team-table .prog-table__metric {
      font-size: 0.95rem !important;
      padding: 0.45rem 0.4rem !important;
      line-height: 1.15 !important;
    }
    .slide--pdf-capture.slide--duels .duels-team-table .prog-table__avg-val,
    .slide--pdf-capture.slide--duels .duels-team-table .prog-table__match,
    .slide--pdf-capture.slide--duels .duels-team-table .prog-table__top7,
    .deck--exporting .slide--duels .duels-team-table .prog-table__avg-val,
    .deck--exporting .slide--duels .duels-team-table .prog-table__match,
    .deck--exporting .slide--duels .duels-team-table .prog-table__top7 {
      font-size: 1.2rem !important;
    }
    .slide--pdf-capture.slide--duels .duels-team-table .prog-table__rank,
    .deck--exporting .slide--duels .duels-team-table .prog-table__rank {
      font-size: 0.85rem !important;
    }
    .slide--pdf-capture.slide--duels .duels-team-table th,
    .slide--pdf-capture.slide--duels .duels-team-table td,
    .deck--exporting .slide--duels .duels-team-table th,
    .deck--exporting .slide--duels .duels-team-table td {
      padding: 0.45rem 0.35rem !important;
    }
    .slide--pdf-capture.slide--duels .duels-player-table,
    .deck--exporting .slide--duels .duels-player-table {
      height: 100% !important;
      font-size: 1rem !important;
    }
    .slide--pdf-capture.slide--duels .duels-player-table th,
    .deck--exporting .slide--duels .duels-player-table th {
      font-size: 0.92rem !important;
      padding: 0.5rem 0.35rem !important;
      line-height: 1.15 !important;
    }
    .slide--pdf-capture.slide--duels .duels-player-table td,
    .deck--exporting .slide--duels .duels-player-table td {
      font-size: 1.15rem !important;
      padding: 0.4rem 0.32rem !important;
    }
    .slide--pdf-capture.slide--duels .duels-player-name,
    .deck--exporting .slide--duels .duels-player-name {
      font-size: 1.2rem !important;
      padding-left: 0.5rem !important;
    }
    .slide--pdf-capture.slide--duels .duels-duel-cell,
    .deck--exporting .slide--duels .duels-duel-cell {
      font-size: 1.25rem !important;
    }
    .slide--pdf-capture.slide--duels .duels-cell__val,
    .deck--exporting .slide--duels .duels-cell__val {
      font-size: 1.3rem !important;
    }
    .slide--pdf-capture.slide--duels .duels-cell__avg,
    .deck--exporting .slide--duels .duels-cell__avg {
      font-size: 0.9rem !important;
      font-weight: 700 !important;
      color: #334155 !important;
    }
    .slide--pdf-capture.slide--duels .duels-cell__stack,
    .deck--exporting .slide--duels .duels-cell__stack {
      gap: 0.15rem !important;
      min-height: 2rem !important;
    }
    .banner {
      margin-bottom: 1rem; padding: 0.75rem 1rem; border-radius: 8px; font-size: 0.9rem;
    }
    .banner--error {
      background: rgba(239, 68, 68, 0.12); border: 1px solid rgba(239, 68, 68, 0.35); color: #fca5a5;
    }
    .banner--loading {
      background: rgba(245, 197, 24, 0.08); border: 1px solid rgba(245, 197, 24, 0.25); color: var(--pv-gold);
    }
    .deck { display: grid; gap: 1.5rem; }
    .slide {
      width: var(--slide-width); margin: 0 auto; border-radius: 12px;
      overflow: hidden; box-shadow: 0 20px 50px rgba(0, 0, 0, 0.45);
    }
    .slide--overview { overflow: visible; }
    .slide--title {
      position: relative; min-height: 560px;
      background:
        radial-gradient(ellipse 72% 48% at 50% 38%, rgba(245, 197, 24, 0.18), transparent 68%),
        linear-gradient(180deg, #fcfcfd 0%, #eceff3 55%, #e4e8ee 100%);
      color: #111;
      display: flex;
      flex-direction: column;
    }
    .slide__corner {
      position: absolute;
      top: 0;
      width: 6px;
      height: 96px;
      background: linear-gradient(180deg, var(--pv-gold) 0%, rgba(245, 197, 24, 0.15) 100%);
    }
    .slide__corner--left { left: 0; }
    .slide__corner--right { right: 0; }
    .slide__title-top-rule {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, transparent 0%, var(--pv-gold) 18%, var(--pv-gold) 82%, transparent 100%);
    }
    .slide__title-body {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      flex: 1 1 auto;
      min-height: 500px; padding: 2.75rem 2.25rem 2.25rem; text-align: center;
    }
    .slide__title-eyebrow {
      margin: 0 0 1.9rem;
      font-family: "Barlow Condensed", sans-serif;
      font-size: 1.12rem;
      font-weight: 700;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: #64748b;
    }
    .slide__crest {
      width: 210px; height: 210px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-family: "Barlow Condensed", sans-serif; font-size: 4rem; font-weight: 700;
      background: #1e3a8a; color: white; margin-bottom: 0;
    }
    .slide__date {

<body>
  <div class="app">
    <header class="toolbar">
      <div>
        <p class="toolbar__eyebrow">Port Vale FC · <a href="http://127.0.0.1:8000/" style="color:inherit;text-decoration:none;opacity:.75">← All apps</a></p>
        <h1 class="toolbar__title">Post-Match Data Dashboard</h1>
      </div>
      <div class="toolbar__actions">
        <button id="exportPdfBtn" class="toolbar__btn" type="button" title="1920×1080 Keynote PDF for WhatsApp">Export PDF (WhatsApp)</button>
        <button id="exportPngBtn" class="toolbar__btn toolbar__btn--secondary" type="button" title="Debug only — individual PNG pages">PNG pages (debug)</button>
        <input id="matchId" type="hidden" value="216415" />
        <button id="refreshBtn" class="toolbar__btn" type="button">Refresh</button>
      </div>
    </header>
    <div class="match-bar-wrap">
      <div id="matchBar" class="match-bar" role="listbox" aria-label="Season matches"></div>
    </div>
    <div id="banner"></div>
    <main id="deck" class="deck"></main>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script>
    let config = null;
    let seasonMatches = [];
    let xgRaceChartInstance = null;

    function fmtDate(raw) {
      if (!raw) return "";
      const d = new Date(raw);
      return Number.isNaN(d.getTime())
        ? raw
        : d.toLocaleDateString("en-GB", { weekday: "long", day: "numeric", month: "long", year: "numeric" });
    }

    function fmtNum(v, format) {
      if (v === undefined || v === null) return "—";
      const n = Number(v);
      if (Number.isNaN(n)) return "—";
      if (format === "int" || Math.abs(n - Math.round(n)) < 0.05) {
        return String(Math.round(n));
      }
      return n.toFixed(2);
    }

    function setBanner(text, kind) {
      const el = document.getElementById("banner");
      if (!text) { el.innerHTML = ""; return; }
      el.innerHTML = `<div class="banner banner--${kind}">${text}</div>`;
    }

    function squadBadgeSrc(team) {
      if (!team) return null;
      return team.badgeUrl || team.imageUrl || null;
    }

    function crestImg(url, alt, className, initials) {
      const label = alt || "?";
      const fallback = initials || label.slice(0, 1);
      if (!url) {
        return `<div class="${className} slide__crest" style="width:36px;height:36px;font-size:0.7rem;margin:0">${fallback}</div>`;
      }
      return `<img class="${className}" src="${url}" alt="${label}" />`;
    }

    function crestImgLarge(team) {
      const label = team?.name || "?";
      const url = squadBadgeSrc(team);
      const fallback = team?.initials || label.slice(0, 1);
      if (!url) {
        return `<div class="slide__crest">${fallback}</div>`;
      }
      return `<img class="slide__crest-img" src="${url}" alt="${label}" />`;
    }

    function fmtShortDate(raw) {
      if (!raw) return "";
      const d = new Date(raw);
      return Number.isNaN(d.getTime())
        ? raw
        : d.toLocaleDateString("en-GB", { day: "numeric", month: "short", year: "numeric" });
    }

    function renderMatchBar(selectedMatchId) {
      const bar = document.getElementById("matchBar");
      if (!seasonMatches.length) {
        bar.innerHTML = "<span style=\"color:#9ca3af;font-size:0.85rem\">No season matches found</span>";
        return;
      }
      bar.innerHTML = seasonMatches.map((match) => {
        const active = match.matchId === selectedMatchId;
        const dotClass = match.outcome ? `match-bar__dot--${match.outcome}` : "";
        const scoreClass = match.outcome ? `match-bar__score--${match.outcome}` : "";
        const matchDay = match.matchDay != null ? `Matchday ${match.matchDay + 1}` : "Match";
        const crestUrl = squadBadgeSrc(match.opponent);
        const crestInitials = match.opponent?.initials || (match.opponent?.name || "?").slice(0, 1);
        const crest = crestUrl
          ? `<img class="match-bar__crest" src="${crestUrl}" alt="${match.opponent.name || ""}" />`
          : `<div class="match-bar__crest" style="display:flex;align-items:center;justify-content:center;font-size:0.7rem;font-weight:700;background:#27272a;border-radius:4px">${crestInitials}</div>`;
        return `
          <button type="button" class="match-bar__item${active ? " match-bar__item--active" : ""}"
            data-match-id="${match.matchId}" aria-selected="${active}">
            <div class="match-bar__meta">
              <span>${matchDay}</span>
              <span>${fmtShortDate(match.scheduledDate)}</span>
            </div>
            ${crest}
            <span class="match-bar__score ${scoreClass}">${match.scoreLabel || "—"}</span>
            <span class="match-bar__dot ${dotClass}"></span>
          </button>`;
      }).join("");

      bar.querySelectorAll(".match-bar__item").forEach((btn) => {
        btn.addEventListener("click", () => {
          const id = Number(btn.dataset.matchId);
          const current = Number(document.getElementById("matchId").value);
          if (id !== current) {
            document.getElementById("matchId").value = id;
            loadReport();
          }
        });
      });

      const activeEl = bar.querySelector(".match-bar__item--active");
      if (activeEl) {
        activeEl.scrollIntoView({ behavior: "smooth", inline: "center", block: "nearest" });
      }
    }

    function renderTitle(report) {
      const meta = report.meta;
      const homeScore = meta.home.score ?? "—";
      const awayScore = meta.away.score ?? "—";
      const rawResult = String(meta.result || "");
      const htMatch = rawResult.match(/\((\d+)\s*[:\-]\s*(\d+)\)/);
      const htLine = htMatch ? `HT ${htMatch[1]}–${htMatch[2]}` : "";
      return `
        <section class="slide slide--title" data-export-title="${meta.home.name} ${homeScore}–${awayScore} ${meta.away.name}">
          <div class="slide__title-top-rule" aria-hidden="true"></div>
          <div class="slide__corner slide__corner--left"></div>
          <div class="slide__corner slide__corner--right"></div>
          <div class="slide__title-body">
            <p class="slide__title-eyebrow">Post-match report</p>
            <div class="slide__matchup">
              <div class="slide__team">
                ${crestImgLarge(meta.home)}
                <p class="slide__team-name">${meta.home.name || "Home"}</p>
              </div>
              <div class="slide__score-block">
                <p class="slide__score-main">${homeScore} – ${awayScore}</p>
                ${htLine ? `<p class="slide__score-ht">${htLine}</p>` : ""}
              </div>
              <div class="slide__team">
                ${crestImgLarge(meta.away)}
                <p class="slide__team-name">${meta.away.name || "Away"}</p>
              </div>
            </div>
            <p class="slide__date">${fmtDate(meta.scheduledDate)}</p>
          </div>
          <div class="slide__footer-bar">POST-MATCH DATA</div>
        </section>`;
    }

    function goalMarkerData(series) {
      return (series || [])
        .filter((p) => p.isGoal)
        .map((p) => ({
          x: p.minute,
          y: p.xg,
          minute: p.minute,
          half: p.half || "second",
        }));
    }

    function tiltCompareClass(matchPct, avgPct) {
      const delta = matchPct - avgPct;
      if (delta > 5) return "tilt-compare--above";
      if (delta < -5) return "tilt-compare--below";
      return "tilt-compare--neutral";
    }

    function fmtTiltDelta(matchPct, avgPct) {
      const delta = Math.round(matchPct - avgPct);
      const sign = delta > 0 ? "+" : "";
      return `${sign}${delta}%`;
    }

    function fmtTiltDeltaPhrase(matchPct, avgPct) {
      const matchR = Math.round(matchPct);
      const avgR = Math.round(avgPct);
      const delta = matchR - avgR;
      if (delta > 5) return `${delta}% above our 7-game average`;
      if (delta < -5) return `${Math.abs(delta)}% below our 7-game average`;
      return "Right on our usual 7-game level";
    }

    function tiltMarkerLeft(pct) {
      return Math.min(93, Math.max(7, pct));
    }

    const XG_HT_GAP = 10;
    const XG_FH_CHART_END = 45;

    function xgRaceTimeline(report) {
      return report?.xgRace?.timeline || {
        firstHalfEnd: 45,
        firstHalfStoppageMinutes: 0,
        hasFirstHalfStoppage: false,
        secondHalfStart: 45,
        secondHalfEnd: 90,
        secondHalfStoppageMinutes: 0,
        hasSecondHalfStoppage: false,
      };
    }

    function xgRaceSecondHalfChartStart() {
      return XG_FH_CHART_END + XG_HT_GAP;
    }

    function xgRaceChartMaxX() {
      return xgRaceSecondHalfChartStart() + XG_FH_CHART_END;
    }

    function xgMinuteToChartX(minute, timeline, half = "second") {
      const fhEnd = Number(timeline.firstHalfEnd) || 45;
      const shStart = Number(timeline.secondHalfStart) || 45;
      const shEnd = Number(timeline.secondHalfEnd) || 90;
      const shChartStart = xgRaceSecondHalfChartStart();

      if (half === "first") {
        return (minute / fhEnd) * XG_FH_CHART_END;
      }
      const shRange = Math.max(shEnd - shStart, 1);
      return shChartStart + ((minute - shStart) / shRange) * XG_FH_CHART_END;
    }

    function xgFormatMatchMinute(minute, timeline, half = "second") {
      const m = Number(minute);
      if (!Number.isFinite(m)) return "";
      const fhEnd = Number(timeline.firstHalfEnd) || 45;
      const shEnd = Number(timeline.secondHalfEnd) || 90;
      if (half === "first" && m > 45 && m <= fhEnd + 0.05) {
        return `45+${Math.max(1, Math.round(m - 45))}`;
      }
      if (half === "second" && m > 90 && m <= shEnd + 0.05) {
        return `90+${Math.max(1, Math.round(m - 90))}`;
      }
      return `${Math.round(m)}`;
    }

    function xgRaceSeriesToChartData(series, timeline) {
      return (series || []).map((point) => ({
        x: xgMinuteToChartX(point.minute, timeline, point.half || "second"),
        y: point.xg,
        minute: point.minute,
        half: point.half || "second",
        isGoal: point.isGoal,
      }));
    }

    function xgRaceSeriesSplit(series, timeline) {
      const first = [];
      const second = [];
      for (const point of series || []) {
        const half = point.half
          || (point.minute >= (Number(timeline.secondHalfStart) || 45) ? "second" : "first");
        const item = {
          x: xgMinuteToChartX(point.minute, timeline, half),
          y: point.xg,
          minute: point.minute,
          half,
        };
        if (half === "first") first.push(item);
        else second.push(item);
      }
      return { first, second };
    }

    function xgRaceTeamLineDatasets(team, timeline, isFocus, order) {
      const { first, second } = xgRaceSeriesSplit(team.series, timeline);
      const shared = {
        borderColor: team.color,
        backgroundColor: team.color + "30",
        stepped: "after",
        tension: 0,
        pointRadius: 0,
        borderWidth: isFocus ? 3 : 2.25,
        order,
      };
      return [
        { ...shared, label: team.name, data: first, fill: isFocus },
        { ...shared, label: team.name, data: second, fill: isFocus },
      ];
    }

    function xgRaceTickMarks(timeline) {
      const shChartStart = xgRaceSecondHalfChartStart();
      const gapMid = XG_FH_CHART_END + XG_HT_GAP / 2;
      const fhEndLabel = timeline.hasFirstHalfStoppage
        ? `45+${Math.max(1, Math.round(timeline.firstHalfStoppageMinutes))}`
        : "45";
      const shEndLabel = timeline.hasSecondHalfStoppage
        ? `90+${Math.max(1, Math.round(timeline.secondHalfStoppageMinutes))}`
        : "90";
      return [
        { value: 0, label: "0" },
        { value: 15, label: "15" },
        { value: 30, label: "30" },
        { value: XG_FH_CHART_END, label: fhEndLabel },
        { value: gapMid, label: "", inGap: true },
        { value: shChartStart, label: "45" },
        { value: shChartStart + 15, label: "60" },
        { value: shChartStart + 30, label: "75" },
        { value: shChartStart + 45, label: shEndLabel },
      ];
    }

    function collectXgGoals(home, away, timeline) {
      const markers = [];
      goalMarkerData(home.series).forEach((g) => {
        const half = g.half || "second";
        markers.push({
          ...g,
          x: xgMinuteToChartX(g.minute, timeline, half),
          color: home.color,
          label: xgFormatMatchMinute(g.minute, timeline, half),
        });
      });
      goalMarkerData(away.series).forEach((g) => {
        const half = g.half || "second";
        markers.push({
          ...g,
          x: xgMinuteToChartX(g.minute, timeline, half),
          color: away.color,
          label: xgFormatMatchMinute(g.minute, timeline, half),
        });
      });
      return markers;
    }

    function renderXgGoalOverlay(chart, overlayId = "xgGoalOverlayOverview") {
      const overlay = document.getElementById(overlayId);
      if (!overlay || !chart.chartArea) return;
      const goals = chart.$xgGoals || [];
      overlay.innerHTML = goals.map((g) => {
        const x = chart.scales.x.getPixelForValue(g.x);
        const y = chart.scales.y.getPixelForValue(g.y);
        const label = g.label || `${Math.round(g.minute)}`;
        return `<div class="xg-goal-overlay__marker" style="left:${x}px;top:${y}px" title="Goal ${label}'">
          <span class="xg-goal-overlay__ball">⚽</span>
          <span class="xg-goal-overlay__min" style="color:${g.color}">${label}'</span>
        </div>`;
      }).join("");
    }

    function xgRaceChartPlugins(overlayId, timeline) {
      const shChartStart = xgRaceSecondHalfChartStart();
      return [
        {
          id: "xgHalfSplit",
          afterDatasetsDraw(chart) {
            const { ctx, chartArea, scales } = chart;
            if (!chartArea) return;
            const gapLeft = scales.x.getPixelForValue(XG_FH_CHART_END);
            const gapRight = scales.x.getPixelForValue(shChartStart);
            const gapW = Math.max(gapRight - gapLeft, 1);
            const gapMid = (gapLeft + gapRight) / 2;
            ctx.save();
            ctx.fillStyle = "#eef2f7";
            ctx.fillRect(gapLeft, chartArea.top, gapW, chartArea.bottom - chartArea.top);
            ctx.strokeStyle = "rgba(148, 163, 184, 0.45)";
            ctx.lineWidth = 1;
            ctx.setLineDash([3, 4]);
            ctx.beginPath();
            ctx.moveTo(gapLeft + 4, chartArea.top + 6);
            ctx.lineTo(gapRight - 4, chartArea.bottom - 6);
            ctx.stroke();
            ctx.setLineDash([]);
            ctx.strokeStyle = "rgba(15, 23, 42, 0.35)";
            ctx.lineWidth = 1.5;
            [gapLeft, gapRight].forEach((x) => {
              ctx.beginPath();
              ctx.moveTo(x, chartArea.top);
              ctx.lineTo(x, chartArea.bottom);
              ctx.stroke();
            });
            const badgeW = 30;
            const badgeH = 17;
            const badgeX = gapMid - badgeW / 2;
            const badgeY = chartArea.top + 4;
            ctx.fillStyle = "#0f172a";
            if (typeof ctx.roundRect === "function") {
              ctx.beginPath();
              ctx.roundRect(badgeX, badgeY, badgeW, badgeH, 4);
              ctx.fill();
            } else {
              ctx.fillRect(badgeX, badgeY, badgeW, badgeH);
            }
            ctx.fillStyle = "#f8fafc";
            ctx.font = "800 11px Barlow Condensed, sans-serif";
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.fillText("HT", gapMid, badgeY + badgeH / 2 + 0.5);
            ctx.restore();
          },
        },
        {
          id: "xgGoalOverlay",
          afterDatasetsDraw(chart) {
            renderXgGoalOverlay(chart, overlayId);
          },
        },
      ];
    }

    function metaTierClass(pct) {
      if (pct == null || Number.isNaN(Number(pct))) return "momentum-meta--none";
      const value = Number(pct);
      if (value >= 75) return "momentum-meta--elite";
      if (value >= 50) return "momentum-meta--strong";
      if (value >= 25) return "momentum-meta--mid";
      return "momentum-meta--low";
    }

    function duelPctTierClass(pct) {
      return metaTierClass(pct);
    }

    function pressEffTierClass(pct) {
      if (pct == null || Number.isNaN(Number(pct))) return "momentum-meta--none";
      const value = Number(pct);
      if (value >= 55) return "momentum-meta--elite";
      if (value >= 45) return "momentum-meta--strong";
      if (value >= 35) return "momentum-meta--mid";
      return "momentum-meta--low";
    }

    function pressIntensityDescriptor(value) {
      if (value == null || Number.isNaN(Number(value))) return null;
      const score = Number(value);
      if (score >= 65) return { band: "High", score };
      if (score >= 45) return { band: "Medium", score };
      return { band: "Low", score };
    }

    function renderOverviewSlide(report) {
      const phase = report.gameByPhase;
      const momentum = report.momentumBlocks;
      const race = report.xgRace;
      if (!phase || !momentum || !race) return "";

      const phaseSegments = phase.phases.map((p) => `
        <div class="phase-segment" style="flex:${p.percent}; background:${p.color}">
          <span class="phase-segment__pct">${p.percent}%</span>
          <span class="phase-segment__label">${p.label}</span>
        </div>`).join("");

      const baseline = phase.baseline;
      const baselineById = baseline && baseline.phases
        ? Object.fromEntries(baseline.phases.map((p) => [p.id, p]))
        : {};
      const baselineSegments = baseline
        ? phase.phases.map((p) => {
            const b = baselineById[p.id];
            if (!b || b.percent <= 0) return "";
            return `<div class="phase-segment" style="flex:${b.percent}; background:${b.color}">
              <span class="phase-segment__pct">${b.percent}%</span>
              <span class="phase-segment__label">${p.label}</span>
            </div>`;
          }).join("")
        : "";
      const baselineCaption = baseline
        ? `Last ${baseline.gameCount} games average (${baseline.gamesUsed} matches)`
        : "";

      const blockCount = momentum.blocks.length;
      const momentumGrid = `grid-template-columns: repeat(${blockCount}, minmax(0, 1fr))`;
      const blockMinutes = momentum.blockMinutes || 15;
      const axisMarks = ["0'"];
      momentum.blocks.forEach((b) => {
        if (b.endMinute === 45) axisMarks.push("HT");
        else if (b.endMinute < 90) axisMarks.push(`${b.endMinute}'`);
      });
      if (!axisMarks.includes("90'")) axisMarks.push("90'");
      const axisHtml = axisMarks.map((m) => `<span>${m}</span>`).join("");

      const focusName = momentum.focusIsHome ? momentum.home.name : momentum.away.name;
      const oppName = momentum.focusIsHome ? momentum.away.name : momentum.home.name;
      const focusShort = focusName.replace(/^FC\s+/i, "");
      const oppShort = oppName.replace(/^FC\s+/i, "");
      const summary = momentum.summary || {};

      const momentumFlow = momentum.blocks.map((b) => {
        const focusShare = b.focusSharePercent ?? 50;
        const oppShare = b.opponentSharePercent ?? (100 - focusShare);
        const upHeight = Math.max(12, Math.round(focusShare));
        const downHeight = Math.max(12, Math.round(oppShare));
        const duelBracket = b.focusDuelTotal > 0 && b.focusDuelWinPct != null
          ? `<span class="momentum-flow__duel-pct ${duelPctTierClass(b.focusDuelWinPct)}">(${Math.round(b.focusDuelWinPct)}% duels won)</span>`
          : b.focusDuelTotal === 0
            ? `<span class="momentum-flow__duel-pct momentum-meta--none">(no duels)</span>`
            : "";
        const pressEffBracket = b.focusPressCount > 0 && b.focusRegainRate != null
          ? `<span class="momentum-flow__press-eff ${pressEffTierClass(b.focusRegainRate)}">(${Math.round(b.focusRegainRate)}% press eff.)</span>`
          : "";
        const tooltip = [
          `${b.label}`,
          `${focusShort} dominance ${Math.round(focusShare)}%`,
          `${oppShort} ${Math.round(oppShare)}%`,
          b.focusDuelTotal > 0 && b.focusDuelWinPct != null
            ? `${Math.round(b.focusDuelWinPct)}% of ${b.focusDuelTotal} duels won`
            : null,
          b.focusPressCount > 0 && b.focusRegainRate != null
            ? `${Math.round(b.focusRegainRate)}% press effectiveness (${b.focusRegains || 0}/${b.focusPressCount} regains)`
            : null,
          b.focusXg != null ? `${focusShort} xG ${Number(b.focusXg).toFixed(2)}` : null,
          b.opponentXg != null ? `${oppShort} xG ${Number(b.opponentXg).toFixed(2)}` : null,
          b.focusRegains != null ? `${b.focusRegains} regains` : null,
          b.focusDuelWins != null ? `${b.focusDuelWins} duels won` : null,
        ].filter(Boolean).join(" · ");
        return `<div class="momentum-flow__col" title="${tooltip}">
          <div class="momentum-flow__top">
            <div class="momentum-flow__bar-up" style="height:${upHeight}%">
              <span class="momentum-flow__pct">${Math.round(focusShare)}%</span>
            </div>
          </div>
          <div class="momentum-flow__axis"></div>
          <div class="momentum-flow__bottom">
            <div class="momentum-flow__bar-down" style="height:${downHeight}%">
              <span class="momentum-flow__pct">${Math.round(oppShare)}%</span>
            </div>
          </div>
          <span class="momentum-flow__label">${b.label}${duelBracket}${pressEffBracket}</span>
        </div>`;
      }).join("");

      const momentumPress = momentum.blocks.map((b) => {
        const meanPressure = b.focusMeanPressure;
        const pressCount = b.focusPressCount || 0;
        const regains = b.focusRegains || 0;
        const duelWins = b.focusDuelWins || 0;
        const regainRate = b.focusRegainRate;
        const intensity = pressIntensityDescriptor(meanPressure);
        const intensityLine = intensity
          ? `Intensity · ${intensity.band} (${intensity.score})`
          : "Intensity · —";
        const regainLine = regainRate != null
          ? `${regains} regains`
          : `${regains} regains`;
        const effClass = pressEffTierClass(regainRate);
        const effBlock = pressCount > 0 && regainRate != null
          ? `<div class="momentum-press-card__eff ${effClass}">${Math.round(regainRate)}%</div>
             <div class="momentum-press-card__eff-label ${effClass}">Press eff.</div>`
          : "";
        const pressTooltip = [
          `${b.label}`,
          regainRate != null ? `${Math.round(regainRate)}% press effectiveness` : null,
          `${pressCount} press actions on opponent`,
          intensity ? `Average pressure ${intensity.score}/100 (${intensity.band})` : null,
          regainLine,
          `${duelWins} duels won`,
        ].filter(Boolean).join(" · ");
        const emptyClass = pressCount === 0 && regains === 0 && duelWins === 0
          ? " momentum-press-card--empty"
          : "";
        return `<div class="momentum-press-cell" title="${pressTooltip}">
          <div class="momentum-press-card${emptyClass}">
            <div class="momentum-press-card__count">${pressCount}</div>
            <div class="momentum-press-card__label">Presses</div>
            ${effBlock}
            <div class="momentum-press-card__intensity">${intensityLine}</div>
            <div class="momentum-press-card__wins">
              <span>${regainLine}</span>
              <span>${duelWins} duels won</span>
            </div>
          </div>
        </div>`;
      }).join("");

      const momentumXg = momentum.blocks.map((b) => {
        const focusXg = Number(b.focusXg || 0);
        const oppXg = Number(b.opponentXg || 0);
        const totalXg = focusXg + oppXg;
        const focusShare = totalXg > 0 ? Math.round((focusXg / totalXg) * 100) : 50;
        const oppShare = totalXg > 0 ? 100 - focusShare : 50;
        const focusShots = b.focusShots || 0;
        const oppShots = b.opponentShots || 0;
        const blockGoals = (b.goals || []);
        const focusGoalCount = blockGoals.filter((g) => g.isFocus).length;
        const oppGoalCount = blockGoals.filter((g) => !g.isFocus).length;
        const goalsLine = focusGoalCount || oppGoalCount
          ? `<span class="momentum-xg-cell__goals">⚽ ${focusGoalCount || 0}–${oppGoalCount || 0}</span>`
          : "";
        const emptyClass = totalXg <= 0 && focusShots === 0 && oppShots === 0
          ? " momentum-xg-cell--empty"
          : "";
        const xgTooltip = [
          `${b.label}`,
          `${focusShort} ${focusXg.toFixed(2)} xG (${focusShots} shot${focusShots === 1 ? "" : "s"})`,
          `${oppShort} ${oppXg.toFixed(2)} xG (${oppShots} shot${oppShots === 1 ? "" : "s"})`,
          focusGoalCount || oppGoalCount ? `Goals ${focusGoalCount}–${oppGoalCount}` : null,
        ].filter(Boolean).join(" · ");
        return `<div class="momentum-xg-cell${emptyClass}" title="${xgTooltip}">
          <div class="momentum-xg-cell__vals">
            <span class="momentum-xg-cell__focus">${focusXg.toFixed(2)}</span>
            <span class="momentum-xg-cell__sep">·</span>
            <span class="momentum-xg-cell__opp">${oppXg.toFixed(2)}</span>
          </div>
          <div class="momentum-xg-cell__track" aria-hidden="true">
            <div class="momentum-xg-cell__bar-focus" style="width:${focusShare}%"></div>
            <div class="momentum-xg-cell__bar-opp" style="width:${oppShare}%"></div>
          </div>
          <span class="momentum-xg-cell__shots">${focusShots}–${oppShots} shots</span>
          ${goalsLine}
        </div>`;
      }).join("");

      const goalMarkers = (momentum.goals || []).map((g) => {
        const pct = Math.min(100, Math.max(0, (g.minute / 90) * 100));
        const color = g.isFocus ? "#22c55e" : "#3b82f6";
        const minuteLabel = `${Math.round(g.minute)}'`;
        return `<div class="momentum-goal-marker" style="left:${pct}%" title="Goal ${minuteLabel}">
          <span class="momentum-goal-marker__icon" style="color:${color}">⚽</span>
          <span class="momentum-goal-marker__min">${minuteLabel}</span>
        </div>`;
      }).join("");

      const focusGoals = (momentum.goals || []).filter((g) => g.isFocus).map((g) => `${Math.round(g.minute)}'`).join(", ") || "—";
      const oppGoals = (momentum.goals || []).filter((g) => !g.isFocus).map((g) => `${Math.round(g.minute)}'`).join(", ") || "—";
      let bestBlock = null;
      for (const b of momentum.blocks) {
        if (!bestBlock || (b.focusSharePercent ?? 0) > (bestBlock.focusSharePercent ?? 0)) {
          bestBlock = b;
        }
      }
      const bestSpell = bestBlock
        ? `${bestBlock.label} (${Math.round(bestBlock.focusSharePercent)}%)`
        : "—";

      let bestPressBlock = null;
      for (const b of momentum.blocks) {
        if (b.focusRegainRate == null) continue;
        if (!bestPressBlock || b.focusRegainRate > (bestPressBlock.focusRegainRate ?? 0)) {
          bestPressBlock = b;
        }
      }
      const bestPressSpell = bestPressBlock
        ? `${bestPressBlock.label} (${Math.round(bestPressBlock.focusRegainRate)}% eff.)`
        : "—";
      let bestXgBlock = null;
      for (const b of momentum.blocks) {
        const diff = Number(b.focusXg || 0) - Number(b.opponentXg || 0);
        if (!bestXgBlock || diff > (Number(bestXgBlock.focusXg || 0) - Number(bestXgBlock.opponentXg || 0))) {
          bestXgBlock = b;
        }
      }
      const bestXgSpell = bestXgBlock
        ? `${bestXgBlock.label} (${Number(bestXgBlock.focusXg || 0).toFixed(2)}–${Number(bestXgBlock.opponentXg || 0).toFixed(2)})`
        : "—";
      const matchFocusXg = Number(summary.matchFocusXg ?? 0).toFixed(2);
      const matchOppXg = Number(summary.matchOpponentXg ?? 0).toFixed(2);

      const statBoxes = `
        <div class="momentum-stat-box">
          <span class="momentum-stat-box__label">Blocks led</span>
          <div class="momentum-stat-rows">
            <div class="momentum-stat-row">
              <span class="momentum-stat-row__name" style="color:#16a34a">${focusShort}</span>
              <span class="momentum-stat-row__val">${summary.focusBlocksWon || 0}</span>
            </div>
            <div class="momentum-stat-row">
              <span class="momentum-stat-row__name" style="color:#2563eb">${oppShort}</span>
              <span class="momentum-stat-row__val">${summary.opponentBlocksWon || 0}</span>
            </div>
          </div>
        </div>
        <div class="momentum-stat-box">
          <span class="momentum-stat-box__label">Goal times</span>
          <div class="momentum-stat-rows">
            <div class="momentum-stat-row">
              <span class="momentum-stat-row__name" style="color:#16a34a">${focusShort}</span>
              <span class="momentum-stat-row__val" style="color:#16a34a">${focusGoals}</span>
            </div>
            <div class="momentum-stat-row">
              <span class="momentum-stat-row__name" style="color:#2563eb">${oppShort}</span>
              <span class="momentum-stat-row__val" style="color:#2563eb">${oppGoals}</span>
            </div>
          </div>
        </div>
        <div class="momentum-stat-box momentum-stat-box--highlight">
          <span class="momentum-stat-box__label">Best ${focusShort} spell</span>
          <span class="momentum-stat-box__value">${bestSpell}</span>
          <span class="momentum-stat-box__sub">Best press: ${bestPressSpell}</span>
        </div>
        <div class="momentum-stat-box">
          <span class="momentum-stat-box__label">xG by block</span>
          <div class="momentum-stat-rows">
            <div class="momentum-stat-row">
              <span class="momentum-stat-row__name" style="color:#16a34a">${focusShort}</span>
              <span class="momentum-stat-row__val" style="color:#16a34a">${matchFocusXg}</span>
            </div>
            <div class="momentum-stat-row">
              <span class="momentum-stat-row__name" style="color:#2563eb">${oppShort}</span>
              <span class="momentum-stat-row__val" style="color:#2563eb">${matchOppXg}</span>
            </div>
          </div>
          <span class="momentum-stat-box__sub">Best spell: ${bestXgSpell}</span>
        </div>
        <div class="momentum-stat-box">
          <span class="momentum-stat-box__label">Press & ball wins</span>
          <span class="momentum-stat-box__value">${summary.matchPressCount || 0} presses</span>
          <span class="momentum-stat-box__sub">${summary.matchRegains || 0} regains · ${summary.matchDuelWins || 0}/${summary.matchDuelTotal || 0} duels${summary.matchDuelWinPct != null ? ` (${summary.matchDuelWinPct}%)` : ""}${summary.matchRegainRate != null ? ` · ${summary.matchRegainRate}% regain rate` : ""}</span>
        </div>`;

      const homeShort = race.home.name.replace(/^FC\s+/i, "");
      const awayShort = race.away.name.replace(/^FC\s+/i, "");
      const homeXg = Number(race.home.totalXg || 0).toFixed(2);
      const awayXg = Number(race.away.totalXg || 0).toFixed(2);
      const xgRaceScoreline = `
        <div class="xg-race-scoreline">
          <span class="xg-race-scoreline__team" style="color:${race.home.color}">${homeShort}</span>
          <span class="xg-race-scoreline__xg">${homeXg} xG</span>
          <span class="xg-race-scoreline__vs">vs</span>
          <span class="xg-race-scoreline__xg">${awayXg} xG</span>
          <span class="xg-race-scoreline__team" style="color:${race.away.color}">${awayShort}</span>
          <span class="xg-race-scoreline__hint">· ⚽ goal</span>
        </div>`;

      return `
        <section class="slide slide--data slide--overview">
          <header class="slide__header">
            <h2>Game development</h2>
            <p>Match story — momentum, pressing & xG on one timeline · Port Vale perspective</p>
          </header>
          <div class="phase-section">
            <h3>Game by Phase</h3>
            <div class="phase-bar">${phaseSegments}</div>
            ${baselineSegments ? `
            <div class="phase-bar phase-bar--baseline">${baselineSegments}</div>
            <p class="phase-baseline-caption">${baselineCaption}</p>` : ""}
          </div>
          <div class="overview-grid">
            <div class="overview-story">
              <div class="overview-story__head">
                <h3>Match story · ${blockMinutes}-minute blocks</h3>
                ${xgRaceScoreline}
              </div>
              <p class="momentum-hint">
                <span style="color:#22c55e">↑ ${focusShort} dominance</span>
                <span> · </span>
                <span style="color:#3b82f6">↓ ${oppShort}</span>
                <span> · </span>
                <span style="color:#f59e0b">presses · regains · duels</span>
                <span> · </span>
                <span>duel % · press eff. · xG for/against per block</span>
                <span> · </span>
                <span>xG race below</span>
              </p>
              <div class="momentum-body">
                <div class="overview-story__momentum">
                  <div class="momentum-ht-marker" aria-hidden="true"></div>
                  <div class="momentum-wrap">
                    <div class="momentum-flow-row">
                      <div class="momentum-flow" style="${momentumGrid}">${momentumFlow}</div>
                    </div>
                    <div class="momentum-press-row" style="${momentumGrid}">${momentumPress}</div>
                    <div class="momentum-xg-row" style="${momentumGrid}">${momentumXg}</div>
                    <div class="momentum-goal-track">${goalMarkers}</div>
                    <div class="momentum-axis">${axisHtml}</div>
                  </div>
                </div>
                <div class="overview-story__xg-divider">
                  <span class="overview-story__xg-label">${race.title || "Shot-based xG race"}</span>
                </div>
                <div class="overview-story__xg-chart">
                  <canvas id="xgRaceChartOverview"></canvas>
                  <div class="xg-goal-overlay" id="xgGoalOverlayOverview"></div>
                </div>
                <div class="momentum-stat-boxes">${statBoxes}</div>
                <p class="momentum-summary">
                  <span class="momentum-legend">
                    <span class="momentum-swatch momentum-swatch--focus"></span>${focusShort} up
                  </span>
                  <span class="momentum-legend">
                    <span class="momentum-swatch momentum-swatch--opp"></span>${oppShort} down
                  </span>
                  <span class="momentum-legend">
                    <span class="momentum-swatch momentum-swatch--press"></span>Presses / regains / duels
                  </span>
                  <span class="momentum-legend">
                    <span class="momentum-swatch" style="background:#22c55e;height:3px;width:9px;border-radius:999px;"></span>
                    <span class="momentum-swatch" style="background:#3b82f6;height:3px;width:9px;border-radius:999px;"></span>
                    xG for · against
                  </span>
                  <span class="momentum-legend">
                    <span class="momentum-swatch" style="background:${race.home.color};height:3px;width:18px;border-radius:999px;"></span>${homeShort} xG
                  </span>
                  <span class="momentum-legend">
                    <span class="momentum-swatch" style="background:${race.away.color};height:3px;width:18px;border-radius:999px;"></span>${awayShort} xG
                  </span>
                </p>
              </div>
            </div>
          </div>
        </section>`;
    }

    // Impect grid: 3 vertical columns + flat seam (no dome). One shallow arc on AM bottom only.
    const PITCH_MX = 120;
    const PITCH_LX = 48;
    const PITCH_RX = 192;
    const PITCH_TOP = 14;
    const PITCH_SEAM = 90;
    const PITCH_AM_BASE = 126;
    const PITCH_IB_TOP = PITCH_TOP + 8;
    const PITCH_SEAM_CURVE = PITCH_SEAM - 6;

    const ZONE_LAYOUT = {
      IBWL: {
        d: `M8,${PITCH_IB_TOP} Q18,${PITCH_TOP} ${PITCH_LX},${PITCH_IB_TOP} L${PITCH_LX},${PITCH_SEAM} L8,${PITCH_SEAM} Z`,
        cx: 28, valY: 52, nameY: 64,
        name: ["In-Behind", "Wide Left"],
        narrow: true, variant: "ib",
      },
      IBWR: {
        d: `M${PITCH_RX},${PITCH_IB_TOP} Q222,${PITCH_TOP} 232,${PITCH_IB_TOP} L232,${PITCH_SEAM} L${PITCH_RX},${PITCH_SEAM} Z`,
        cx: 212, valY: 52, nameY: 64,
        name: ["In-Behind", "Wide Right"],
        narrow: true, variant: "ib",
      },
      IB: {
        d: `M${PITCH_LX},${PITCH_IB_TOP} Q${PITCH_MX},${PITCH_TOP} ${PITCH_RX},${PITCH_IB_TOP} L${PITCH_RX},${PITCH_SEAM} Q${PITCH_MX},${PITCH_SEAM_CURVE} ${PITCH_LX},${PITCH_SEAM} Z`,
        cx: PITCH_MX, valY: 52, nameY: 64,
        name: ["In-Behind", "Central"],
        variant: "ib",
      },
      WL: {
        d: `M8,${PITCH_SEAM} L${PITCH_LX},${PITCH_SEAM} L${PITCH_LX},162 L8,162 Z`,
        cx: 28, valY: 124, nameY: 138,
        name: ["Wide Left"],
        narrow: true, variant: "conv",
      },
      WR: {
        d: `M${PITCH_RX},${PITCH_SEAM} L232,${PITCH_SEAM} L232,162 L${PITCH_RX},162 Z`,
        cx: 212, valY: 124, nameY: 138,
        name: ["Wide Right"],
        narrow: true, variant: "conv",
      },
      AM: {
        d: `M${PITCH_LX},${PITCH_SEAM} Q${PITCH_MX},${PITCH_SEAM_CURVE} ${PITCH_RX},${PITCH_SEAM} L${PITCH_RX},${PITCH_AM_BASE} Q${PITCH_MX},136 ${PITCH_LX},${PITCH_AM_BASE} Z`,
        cx: PITCH_MX, valY: 104, nameY: 116,
        name: ["Attacking-Mid"],
        variant: "conv",
      },
    };

    const ZONE_DRAW_ORDER = ["WL", "WR", "AM", "IBWL", "IBWR", "IB"];

    function fmtTouchStat(value) {
      if (value == null) return "—";
      const n = Number(value);
      return Number.isInteger(n) ? String(n) : (Math.round(n * 10) / 10).toFixed(1);
    }

    function ibTouchHeat(value, maxVal) {
      if (value <= 0) {
        return { fill: "rgba(8, 28, 18, 0.75)", text: "#94a3b8" };
      }
      const t = Math.min(1, Math.max(0, value / maxVal));
      const r = Math.round(18 + t * 56);
      const g = Math.round(68 + t * 160);
      const b = Math.round(48 + t * 80);
      const text = t > 0.38 ? "#0f172a" : "#f8fafc";
      return { fill: `rgb(${r}, ${g}, ${b})`, text };
    }

    function conversionZoneHeat(value, maxVal) {
      if (value <= 0) {
        return { fill: "rgba(8, 24, 16, 0.65)", text: "#94a3b8" };
      }
      const t = Math.min(1, Math.max(0, value / maxVal));
      const r = Math.round(110 + t * (220 - 110));
      const g = Math.round(82 + t * (170 - 82));
      const b = Math.round(12 + t * 8);
      const text = t > 0.32 ? "#0f172a" : "#fef9c3";
      return { fill: `rgb(${r}, ${g}, ${b})`, text };
    }

    function renderZoneName(cx, nameY, lines, fill, narrow) {
      const cls = narrow ? "zone-name zone-name--narrow" : "zone-name";
      if (!lines?.length) return "";
      if (lines.length === 1) {
        return `<text class="${cls}" x="${cx}" y="${nameY}" text-anchor="middle" fill="${fill}">${lines[0]}</text>`;
      }
      const lh = narrow ? 8.2 : 9;
      const startY = nameY - lh / 2;
      const tspans = lines.map((line, i) =>
        `<tspan x="${cx}" dy="${i === 0 ? 0 : lh}">${line}</tspan>`).join("");
      return `<text class="${cls}" x="${cx}" y="${startY}" text-anchor="middle" fill="${fill}">${tspans}</text>`;
    }

    function renderPitchZone(zone, id, maxVal) {
      const layout = ZONE_LAYOUT[id];
      if (!layout) return "";
      const val = zone?.value ?? 0;
      const colors = layout.variant === "ib"
        ? ibTouchHeat(val, maxVal)
        : conversionZoneHeat(val, maxVal);
      const shown = fmtTouchStat(val);
      const sideClass = layout.narrow ? " zone-val--side" : "";
      const valClass = `zone-val zone-val--${layout.variant}${sideClass}`;
      const labelText = layout.name.join(" ");
      const title = layout.variant === "ib"
        ? `${shown} touches · ${labelText}`
        : `${shown} passes from ${labelText}`;
      return `
        <g class="zone-group">
          <title>${title}</title>
          <path class="zone-path" d="${layout.d}" fill="${colors.fill}"/>
          <text class="${valClass}" x="${layout.cx}" y="${layout.valY}"
                text-anchor="middle" fill="${colors.text}">${shown}</text>
          ${renderZoneName(layout.cx, layout.nameY, layout.name, colors.text, layout.narrow)}
        </g>`;
    }

    function renderCompactTouchGraphic(inBehindZones, conversionZones, maxTouch, maxConv, svgKey) {
      const ibById = Object.fromEntries((inBehindZones || []).map((z) => [z.id, z]));
      const convById = Object.fromEntries((conversionZones || []).map((z) => [z.id, z]));
      const gid = `pitch-${svgKey}`;

      const zonePaths = ZONE_DRAW_ORDER.map((id) => {
        const layout = ZONE_LAYOUT[id];
        const zone = layout.variant === "ib"
          ? (ibById[id] || { id, value: 0 })
          : (convById[id] || { id, value: 0 });
        const maxVal = layout.variant === "ib" ? maxTouch : maxConv;
        return renderPitchZone(zone, id, maxVal);
      }).join("");

      return `
        <div class="touch-map" role="img"
             aria-label="In-behind touches and passes into in-behind by zone">
          <svg class="touch-map__svg touch-map-svg" viewBox="0 0 240 170" preserveAspectRatio="xMidYMid meet">
            <defs>
              <linearGradient id="${gid}-grass" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stop-color="#1d6b42"/>
                <stop offset="50%" stop-color="#145a35"/>
                <stop offset="100%" stop-color="#0a3220"/>
              </linearGradient>
              <pattern id="${gid}-stripes" width="14" height="170" patternUnits="userSpaceOnUse">
                <rect width="7" height="170" fill="rgba(255,255,255,0.025)"/>
              </pattern>
            </defs>
            <rect x="6" y="6" width="228" height="158" rx="10" fill="url(#${gid}-grass)"/>
            <rect x="6" y="6" width="228" height="158" rx="10" fill="url(#${gid}-stripes)"/>
            <rect x="6" y="6" width="228" height="158" rx="10" fill="none"
                  stroke="rgba(255,255,255,0.22)" stroke-width="0.8"/>
            ${zonePaths}
          </svg>
        </div>`;
    }

    function renderTouchPlayerCards(players, variant) {
      const countKey = variant === "pass" ? "passCount" : "touchCount";
      const countClass = variant === "pass"
        ? "touch-player-card__count touch-player-card__count--pass"
        : "touch-player-card__count";
      return (players || []).map((row) => `
          <div class="touch-player-card">
            <span class="touch-player-card__name">${row.playerName}</span>
            <span class="${countClass}">${fmtTouchStat(row[countKey])}</span>
          </div>`).join("");
    }

    function renderInBehindListPanels(detail, isAvg) {
      if (!detail) {
        return `<p class="touch-detail__empty">No in-behind data.</p>`;
      }
      const touchPlayers = isAvg
        ? (detail.touchPlayers || []).slice(0, 5)
        : detail.touchPlayers;
      const passPlayers = isAvg
        ? (detail.passPlayers || []).slice(0, 5)
        : detail.passPlayers;
      const touchCards = renderTouchPlayerCards(touchPlayers, "touch");
      const passCards = renderTouchPlayerCards(passPlayers, "pass");
      const avgNote = isAvg ? " · top 5 per game" : "";

      return `
        <div class="touch-lists__grid">
          <div class="touch-list-panel touch-list-panel--touch">
            <p class="touch-list-panel__title">Who touched in-behind${avgNote}</p>
            ${touchCards
              ? `<div class="touch-player-cards">${touchCards}</div>`
              : `<p class="touch-detail__empty">None recorded.</p>`}
          </div>
          <div class="touch-list-panel touch-list-panel--pass">
            <p class="touch-list-panel__title">Who passed in-behind${avgNote}</p>
            ${passCards
              ? `<div class="touch-player-cards">${passCards}</div>`
              : `<p class="touch-detail__empty">None recorded.</p>`}
          </div>
        </div>`;
    }

    function renderTouchColumn(opts) {
      const {
        title,
        titleClass = "",
        columnClass = "",
        inBehindZones,
        conversionZones,
        maxTouch,
        maxConv,
        inBehind,
        passTotal,
        touchTotal,
        isAvg,
        svgKey,
      } = opts;

      const stats = `
        <div class="touch-column__stats">
          <div class="touch-stat touch-stat--green">
            <span class="touch-stat__val">${fmtTouchStat(touchTotal)}</span>
            <span class="touch-stat__lbl">touches</span>
          </div>
          <div class="touch-stat touch-stat--gold">
            <span class="touch-stat__val">${fmtTouchStat(passTotal)}</span>
            <span class="touch-stat__lbl">passes</span>
          </div>
        </div>`;

      return `
        <div class="touch-column ${columnClass}">
          <div class="touch-column__head">
            <p class="touch-column__title ${titleClass}">${title}</p>
            ${stats}
          </div>
          ${renderCompactTouchGraphic(inBehindZones, conversionZones, maxTouch, maxConv, svgKey)}
          ${renderInBehindListPanels(inBehind, isAvg)}
        </div>`;
    }

    function inBehindZonesFromAll(zones) {
      return (zones || []).filter((z) => z.isInBehind);
    }

    function renderOffensiveTouchesSlide(report) {
      const data = report.offensiveTouchesZones;
      if (!data) return "";
      const baseline = data.baseline || {};

      const matchIb = inBehindZonesFromAll(data.zones);
      const avgIb = inBehindZonesFromAll(baseline.zones);
      const matchConv = data.conversionZones || [];
      const avgConv = baseline.conversionZones || [];

      const allTouch = [...matchIb, ...avgIb].map((z) => z.value || 0);
      const allConv = [...matchConv, ...avgConv].map((z) => z.value || 0);
      const maxTouch = Math.max(...allTouch, 1);
      const maxConv = Math.max(...allConv, 1);

      return `
        <section class="slide slide--data slide--touch">
          <header class="slide__header">
            <h2>${data.title}</h2>
            <p>Green row = touches in in-behind zones · gold row = passes from wide L / att mid / wide R into in-behind</p>
          </header>
          <div class="touch-columns">
            ${renderTouchColumn({
              title: "This match",
              inBehindZones: matchIb,
              conversionZones: matchConv,
              maxTouch,
              maxConv,
              inBehind: data.inBehind,
              passTotal: data.totalPassesIntoInBehind,
              touchTotal: data.inBehind?.totalTouches,
              isAvg: false,
              svgKey: "match",
            })}
            ${renderTouchColumn({
              title: "7-game average",
              titleClass: "touch-column__title--avg",
              columnClass: "touch-column--avg",
              inBehindZones: avgIb,
              conversionZones: avgConv,
              maxTouch,
              maxConv,
              inBehind: baseline.inBehind,
              passTotal: baseline.totalPassesIntoInBehind,
              touchTotal: baseline.inBehind?.totalTouches,
              isAvg: true,
              svgKey: "avg",
            })}
          </div>
        </section>`;
    }

    function renderFieldTiltSlide(report) {
      const tilt = report.fieldTilt;
      if (!tilt) return "";
      const home = tilt.home;
      const away = tilt.away;
      const focusPct = tilt.focusTiltPercent;
      const oppPct = 100 - focusPct;

      const timelineBlocks = tilt.timeline || [];
      const baselineByStart = tilt.baseline && tilt.baseline.timeline
        ? Object.fromEntries(tilt.baseline.timeline.map((b) => [b.startMinute, b]))
        : {};
      const tiltGrid = `grid-template-columns: repeat(${timelineBlocks.length}, minmax(0, 1fr))`;

      const timeline = timelineBlocks.map((block) => {
        const focusWidth = block.focusTiltPercent ?? (
          tilt.focusSquadId === tilt.home.squadId
            ? block.homeTiltPercent
            : block.awayTiltPercent
        );
        const baseline = baselineByStart[block.startMinute];
        const avgClass = baseline
          ? tiltCompareClass(focusWidth, baseline.focusTiltPercent)
          : "tilt-compare--neutral";
        const avgHtml = baseline
          ? `<span class="tilt-block__avg ${avgClass}">avg ${Math.round(baseline.focusTiltPercent)}%</span>`
          : "";
        return `
          <div class="tilt-block-wrap">
            <div class="tilt-block" title="${block.label}">
              <div class="tilt-block__focus" style="width:${focusWidth}%"></div>
              <span class="tilt-block__label">${Math.round(focusWidth)}%</span>
            </div>
            <span class="tilt-block__time">${block.label}</span>
            ${avgHtml}
          </div>`;
      }).join("");

      const focusName = tilt.focusSquadId === tilt.home.squadId ? home.name : away.name;
      const oppName = tilt.focusSquadId === tilt.home.squadId ? away.name : home.name;

      const baselineFocus = tilt.baseline?.focusTiltPercent ?? null;
      const compareClass = baselineFocus != null
        ? tiltCompareClass(focusPct, baselineFocus)
        : "tilt-compare--neutral";
      const matchPctLabel = Math.round(focusPct);
      const avgPctLabel = baselineFocus != null ? Math.round(baselineFocus) : null;
      const matchMarkerLeft = tiltMarkerLeft(focusPct);
      const avgMarkerLeft = baselineFocus != null ? tiltMarkerLeft(baselineFocus) : null;
      const baselineBarHtml = baselineFocus != null
        ? `
          <div class="tilt-baseline">
            <div class="tilt-baseline__ruler">
              <div class="tilt-baseline__marker tilt-baseline__marker--match" style="left:${matchMarkerLeft}%">
                <span class="tilt-baseline__tag">This match <strong>${matchPctLabel}%</strong></span>
                <span class="tilt-baseline__tick"></span>
              </div>
              <div class="tilt-baseline__marker tilt-baseline__marker--avg" style="left:${avgMarkerLeft}%">
                <span class="tilt-baseline__tag">7-game avg <strong>${avgPctLabel}%</strong></span>
                <span class="tilt-baseline__tick"></span>
              </div>
              <div>
                <div class="tilt-baseline__row-label">7-game average</div>
                <div class="tilt-block tilt-block--baseline-avg">
                  <div class="tilt-block__focus" style="width:${baselineFocus}%"></div>
                  <span class="tilt-block__label">${avgPctLabel}%</span>
                </div>
              </div>
            </div>
            <p class="tilt-baseline__summary ${compareClass}">${fmtTiltDeltaPhrase(focusPct, baselineFocus)}</p>
          </div>`
        : "";

      return `
        <section class="slide slide--data slide--tilt">
          <header class="slide__header">
            <h2>${tilt.title}</h2>
            <p>${tilt.description}</p>
          </header>
          <div class="tilt-body">
            <div class="tilt-viz">
              <div class="tilt-bar">
                <div class="tilt-segment" style="flex:${focusPct}; background:#22c55e; color:#111">
                  ${focusName} ${focusPct}%
                </div>
                <div class="tilt-segment" style="flex:${oppPct}; background:#3b82f6; color:#fff">
                  ${oppName} ${oppPct}%
                </div>
              </div>
              ${baselineBarHtml}
              <div class="tilt-timeline" style="${tiltGrid}">${timeline}</div>
            </div>
            <div class="tilt-coach-note">
              <div class="tilt-coach-note__section">
                <p class="tilt-coach-note__heading">What is field tilt?</p>
                <p class="tilt-coach-note__text">
                  Field tilt is the share of possession in the attacking third compared to the opponent.
                </p>
                <p class="tilt-coach-note__text">
                  It is not total possession. It shows who controlled the ball in dangerous areas and who spent more time on it in the attacking third.
                </p>
              </div>
              <div class="tilt-coach-note__section tilt-coach-note__section--why">
                <p class="tilt-coach-note__heading tilt-coach-note__heading--why">Why coaches use it</p>
                <ul class="tilt-coach-note__list">
                  <li>
                    <span class="tilt-coach-note__bullet"></span>
                    <span><strong>Territorial dominance</strong> — who is controlling the ball in the areas that create danger, not just who has more of the ball overall</span>
                  </li>
                  <li>
                    <span class="tilt-coach-note__bullet"></span>
                    <span><strong>Pressure and chance creation</strong> — a higher tilt usually means sustained pressure, pinning the opposition back, and better conditions to attack</span>
                  </li>
                  <li>
                    <span class="tilt-coach-note__bullet"></span>
                    <span><strong>What possession hides</strong> — e.g. 60% possession with low tilt if much of that ball is in your own half</span>
                  </li>
                </ul>
              </div>
            </div>
          </div>
        </section>`;
    }

    function drawXgRaceChart(report, canvasId = "xgRaceChartOverview") {
      const race = report.xgRace;
      const canvas = document.getElementById(canvasId);
      if (!race || !canvas || typeof Chart === "undefined") return;

      if (xgRaceChartInstance) {
        xgRaceChartInstance.destroy();
      }
      const overlay = document.getElementById("xgGoalOverlayOverview");
      if (overlay) overlay.innerHTML = "";

      const home = race.home;
      const away = race.away;
      const timeline = xgRaceTimeline(report);
      const focusId = report.focusSquadId;
      const homeIsFocus = focusId === home.squadId;
      const maxY = Math.max(
        home.totalXg || 0,
        away.totalXg || 0,
        0.8,
      );
      const xgGoals = collectXgGoals(home, away, timeline);
      const tickMarks = xgRaceTickMarks(timeline);
      const chartMaxX = xgRaceChartMaxX();

      xgRaceChartInstance = new Chart(canvas, {
        type: "line",
        plugins: xgRaceChartPlugins("xgGoalOverlayOverview", timeline),
        data: {
          datasets: [
            ...xgRaceTeamLineDatasets(home, timeline, homeIsFocus, homeIsFocus ? 1 : 2),
            ...xgRaceTeamLineDatasets(away, timeline, !homeIsFocus, homeIsFocus ? 2 : 1),
            {
              label: `${home.name} goals`,
              type: "scatter",
              data: xgGoals.filter((g) => g.color === home.color),
              pointRadius: 0,
              pointHitRadius: 14,
              showLine: false,
              order: 0,
              goalRingColor: home.color,
            },
            {
              label: `${away.name} goals`,
              type: "scatter",
              data: xgGoals.filter((g) => g.color === away.color),
              pointRadius: 0,
              pointHitRadius: 14,
              showLine: false,
              order: 0,
              goalRingColor: away.color,
            },
          ],
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          layout: { padding: { top: 12, bottom: 6, left: 4, right: 6 } },
          interaction: { mode: "nearest", intersect: false },
          plugins: {
            legend: { display: false },
            tooltip: {
              titleFont: { family: "Barlow Condensed", weight: "800", size: 13 },
              bodyFont: { family: "DM Sans", weight: "600", size: 12 },
              callbacks: {
                title(items) {
                  const item = items[0];
                  if (!item) return "";
                  const minute = item.raw?.minute ?? item.parsed.x;
                  const half = item.raw?.half || "second";
                  return `${xgFormatMatchMinute(minute, timeline, half)}'`;
                },
                label(ctx) {
                  if (ctx.dataset.label?.endsWith(" goals")) {
                    const team = ctx.dataset.label.replace(" goals", "");
                    return `⚽ ${team} goal · ${Number(ctx.parsed.y).toFixed(2)} xG`;
                  }
                  return `${ctx.dataset.label}: ${Number(ctx.parsed.y).toFixed(2)} xG`;
                },
              },
            },
          },
          scales: {
            x: {
              type: "linear",
              min: 0,
              max: chartMaxX,
              afterBuildTicks(scale) {
                scale.ticks = tickMarks
                  .filter((tick) => !tick.inGap)
                  .map((tick) => ({ value: tick.value }));
              },
              ticks: {
                autoSkip: false,
                maxRotation: 0,
                padding: 6,
                font: {
                  family: "Barlow Condensed",
                  size: 11,
                  weight: "700",
                },
                color: "#334155",
                callback(value) {
                  const tick = tickMarks.find((item) => item.value === value);
                  return tick ? tick.label : "";
                },
              },
              grid: {
                color(context) {
                  const value = context.tick?.value;
                  if (value > XG_FH_CHART_END && value < xgRaceSecondHalfChartStart()) {
                    return "transparent";
                  }
                  return "rgba(148, 163, 184, 0.32)";
                },
                lineWidth: 1,
                drawTicks: true,
              },
              border: { color: "#cbd5e1" },
              title: {
                display: true,
                text: "Minute",
                color: "#475569",
                font: { family: "Barlow Condensed", size: 12, weight: "800" },
