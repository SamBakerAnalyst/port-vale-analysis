                padding: { top: 4 },
              },
            },
            y: {
              min: 0,
              max: Math.ceil(maxY * 10) / 10 + 0.1,
              ticks: {
                stepSize: 0.2,
                font: {
                  family: "Barlow Condensed",
                  size: 11,
                  weight: "700",
                },
                color: "#334155",
              },
              grid: { color: "rgba(148, 163, 184, 0.32)" },
              border: { color: "#cbd5e1" },
            },
          },
        },
      });
      xgRaceChartInstance.$xgGoals = xgGoals;
      renderXgGoalOverlay(xgRaceChartInstance, "xgGoalOverlayOverview");
    }

    function fmtOrdinal(rank) {
      const n = Number(rank);
      if (!Number.isFinite(n)) return "";
      const mod100 = n % 100;
      let suffix = "th";
      if (mod100 < 11 || mod100 > 13) {
        const mod10 = n % 10;
        if (mod10 === 1) suffix = "st";
        else if (mod10 === 2) suffix = "nd";
        else if (mod10 === 3) suffix = "rd";
      }
      return `${n}${suffix}`;
    }

    function progRankClass(rank, leagueSize) {
      const n = Number(rank);
      if (!Number.isFinite(n)) return "";
      const size = Number(leagueSize) || 24;
      if (n <= 7) return "prog-table__rank--top";
      if (n >= 20 && n <= size) return "prog-table__rank--bottom";
      return "";
    }

    function progSoftColor(hex, alpha = 0.32) {
      const raw = String(hex || "").replace("#", "");
      if (raw.length !== 6) return hex;
      const r = parseInt(raw.slice(0, 2), 16);
      const g = parseInt(raw.slice(2, 4), 16);
      const b = parseInt(raw.slice(4, 6), 16);
      return `rgba(${r}, ${g}, ${b}, ${alpha})`;
    }

    function renderProgTeamMetricRows(rows, leagueSize) {
      return (rows || []).map((row) => {
        const rankHtml = row.avgRank
          ? `<span class="prog-table__rank ${progRankClass(row.avgRank, leagueSize)}">(${fmtOrdinal(row.avgRank)})</span>`
          : "";
        return `
          <tr>
            <td class="prog-table__metric" style="background:${progSoftColor(row.metricColor)}">
              ${row.label}
            </td>
            <td class="prog-table__avg">
              <div class="prog-table__avg-inner">
                <span class="prog-table__avg-val">${row.avgDisplay ?? "—"}</span>
                ${rankHtml}
              </div>
            </td>
            <td class="prog-table__top7">${row.top7AvgDisplay ?? "—"}</td>
            <td class="prog-table__match prog-table__match--${row.matchBand}">
              ${row.matchDisplay ?? "—"}
            </td>
          </tr>`;
      }).join("");
    }

    function renderProgTeamMetricTable(rows, opponent, leagueSize, caption = "") {
      const body = renderProgTeamMetricRows(rows, leagueSize);
      const captionHtml = caption
        ? `<p class="duels-team-stack__caption">${caption}</p>`
        : "";
      return `
        ${captionHtml}
        <table class="prog-table prog-team-table duels-team-table">
          <thead>
            <tr>
              <th>Metric</th>
              <th>7 Game Avg</th>
              <th>Top 7 Avg</th>
              <th>Vs ${opponent}</th>
            </tr>
          </thead>
          <tbody>${body || `<tr><td colspan="4">No data</td></tr>`}</tbody>
        </table>`;
    }

    function renderPerfLegend(legend) {
      const items = legend && legend.length
        ? legend
        : [
            { id: "blue", label: "Blue = top 10% of that player's own season" },
            { id: "gold", label: "Gold = top 10% for that position across the whole league this season" },
          ];
      return `<div class="perf-legend">${items.map((item) => `
        <span>
          <span class="perf-legend__swatch perf-legend__swatch--${item.id || "blue"}"></span>
          ${item.label}
        </span>`).join("")}</div>`;
    }

    function renderPerfCell(value, avgDisplay, highlight) {
      const bandClass = highlight === "gold"
        ? "perf-cell--gold"
        : highlight === "blue"
          ? "perf-cell--blue"
          : "";
      const avgHtml = avgDisplay
        ? `<span class="perf-cell__avg">${avgDisplay}</span>`
        : "";
      return `<td class="perf-cell ${bandClass}">
        <div class="perf-cell__stack">
          <span class="perf-cell__val">${value ?? "—"}</span>
          ${avgHtml}
        </div>
      </td>`;
    }

    function renderBallProgressionSlide(report) {
      const data = report.ballProgression;
      if (!data || !data.teamMetrics?.length) return "";

      const opponent = data.opponentLabel || "Opponent";
      const leagueSize = data.leagueSize || 24;
      const teamRows = renderProgTeamMetricRows(data.teamMetrics, leagueSize);

      const players = (data.players || [])
        .slice()
        .sort((a, b) => (b.breakingOpponentDefence ?? 0) - (a.breakingOpponentDefence ?? 0));
      const playerRows = players.length
        ? players.map((row) => `
          <tr>
            <td class="prog-table__metric">${row.playerName ?? "—"}</td>
            <td>${row.minutes ?? "—"}</td>
            ${renderPerfCell(row.breakingOpponentDefence ?? 0, row.breakingOpponentDefenceAvgDisplay, row.breakingOpponentDefenceHighlight)}
            ${renderPerfCell(row.ballProgression ?? 0, row.ballProgressionAvgDisplay, row.ballProgressionHighlight)}
            ${renderPerfCell(row.defensiveBallControl ?? 0, row.defensiveBallControlAvgDisplay, row.defensiveBallControlHighlight)}
          </tr>`).join("")
        : `<tr><td colspan="5">No player data for this match.</td></tr>`;

      return `
        <section class="slide slide--progression">
          <div class="prog-keynote">
            <div class="prog-keynote__bar">In-Possession — Ball Progression</div>
            <div class="prog-keynote__body">
              <table class="prog-table prog-team-table">
                <thead>
                  <tr>
                    <th>Metric</th>
                    <th>7 Game Avg</th>
                    <th>Top 7 Avg</th>
                    <th>Vs ${opponent}</th>
                  </tr>
                </thead>
                <tbody>${teamRows}</tbody>
              </table>
              <div>
                ${renderPerfLegend(data.legend)}
                <table class="prog-table prog-player-table">
                  <thead>
                    <tr>
                      <th>Player</th>
                      <th>Played Minutes</th>
                      <th>Breaking Opponent Defence</th>
                      <th>Ball Progression</th>
                      <th>Defensive Ball Control</th>
                    </tr>
                  </thead>
                  <tbody>${playerRows}</tbody>
                </table>
              </div>
            </div>
          </div>
        </section>`;
    }

    function renderExpectedThreatSlide(report) {
      const data = report.expectedThreat;
      if (!data || !data.teamMetrics?.length) return "";

      const opponent = data.opponentLabel || "Opponent";
      const leagueSize = data.leagueSize || 24;
      const teamRows = renderProgTeamMetricRows(data.teamMetrics, leagueSize);
      const columns = data.playerColumns || [
        { id: "passes", label: "Passes" },
        { id: "dribbles", label: "Dribbles" },
        { id: "shots", label: "Shots" },
        { id: "receptions", label: "Receptions" },
        { id: "ballWins", label: "Ball Wins" },
        { id: "setPieces", label: "Set Pieces" },
      ];

      const fmtPxt = (value) => {
        if (value == null || Number.isNaN(Number(value))) return "—";
        return Number(value).toFixed(2);
      };

      const players = (data.players || []).slice().sort((a, b) => (b.total ?? 0) - (a.total ?? 0));
      const playerRows = players.length
        ? players.map((row) => `
          <tr>
            <td class="prog-table__metric">${row.playerName ?? "—"}</td>
            <td>${row.minutes ?? "—"}</td>
            ${columns.map((col) => renderPerfCell(
              fmtPxt(row[col.id]),
              row[`${col.id}AvgDisplay`],
              row[`${col.id}Highlight`],
            )).join("")}
            ${renderPerfCell(fmtPxt(row.total), row.totalAvgDisplay, row.totalHighlight)}
          </tr>`).join("")
        : `<tr><td colspan="${columns.length + 3}">No player data for this match.</td></tr>`;

      return `
        <section class="slide slide--progression slide--expected-threat">
          <div class="prog-keynote">
            <div class="prog-keynote__bar">In-Possession — Expected Threat</div>
            <div class="prog-keynote__body">
              <table class="prog-table prog-team-table">
                <thead>
                  <tr>
                    <th>Metric</th>
                    <th>7 Game Avg</th>
                    <th>Top 7 Avg</th>
                    <th>Vs ${opponent}</th>
                  </tr>
                </thead>
                <tbody>${teamRows}</tbody>
              </table>
              <div>
                ${renderPerfLegend(data.legend)}
                <table class="prog-table prog-player-table prog-player-table--pxt">
                  <thead>
                    <tr>
                      <th>Player</th>
                      <th>Min</th>
                      ${columns.map((col) => `<th>${col.label}</th>`).join("")}
                      <th>Total</th>
                    </tr>
                  </thead>
                  <tbody>${playerRows}</tbody>
                </table>
              </div>
            </div>
          </div>
        </section>`;
    }

    function crossLaneFill(value, maxValue) {
      const ratio = maxValue > 0 ? value / maxValue : 0;
      const alpha = 0.22 + ratio * 0.55;
      return `rgba(74, 222, 128, ${alpha.toFixed(2)})`;
    }

    function crossImpectToSvg(impectX, impectY, pitch, drawW = 360, plotHeight = null, plotYOffset = null, padX = 12, padY = 12) {
      const drawH = (pitch.depthM / pitch.widthM) * drawW;
      const plotH = plotHeight ?? drawH;
      const plotY = plotYOffset ?? padY;
      const halfW = pitch.widthM / 2;
      const xRange = pitch.goalX - pitch.minX;
      // Impect +y = left wing; screen left = left wing when attacking toward top of SVG.
      return {
        x: padX + ((halfW - impectY) / pitch.widthM) * drawW,
        y: plotY + ((pitch.goalX - impectX) / xRange) * plotH,
        drawW,
        drawH,
        padX,
        padY,
        plotH,
        plotY,
      };
    }

    function crossBoundsToSvg(bounds, pitch, drawW = 360, plotHeight = null, plotYOffset = null) {
      const tl = crossImpectToSvg(bounds.xMax, bounds.yMax, pitch, drawW, plotHeight, plotYOffset);
      const br = crossImpectToSvg(bounds.xMin, bounds.yMin, pitch, drawW, plotHeight, plotYOffset);
      return {
        x: tl.x,
        y: tl.y,
        w: br.x - tl.x,
        h: br.y - tl.y,
        cx: (tl.x + br.x) / 2,
        cy: (tl.y + br.y) / 2,
      };
    }

    function renderCrossLaneStrip(lanes, maxLane, pitchX, drawW, bandTop, bandHeight, baselineLanes, maxBaselineLane, baselineGameCount, stripTitle, lowerIsBetter) {
      const hasBaseline = baselineLanes && baselineLanes.length > 0;
      const titleBlockH = 18;
      const baselineBlockH = hasBaseline ? 28 : 0;
      const matchRowH = bandHeight - titleBlockH - baselineBlockH;
      const titleY = bandTop + 11;
      const barY = bandTop + titleBlockH;
      const laneW = drawW / lanes.length;

      const segments = (lanes || []).map((lane, index) => {
        const lx = pitchX + index * laneW;
        const fill = crossLaneFill(lane.value, maxLane);
        const label = (lane.label || "").toUpperCase();
        const words = label.split(" ");
        const line1 = words.slice(0, 2).join(" ");
        const line2 = words.slice(2).join(" ");
        const labelBlock = line2
          ? `<tspan x="${lx + laneW / 2}" dy="0" font-weight="800">${line1}</tspan><tspan x="${lx + laneW / 2}" dy="9" font-weight="800">${line2}</tspan>`
          : `<tspan font-weight="800">${label}</tspan>`;
        return `
          <rect x="${lx}" y="${barY}" width="${laneW}" height="${matchRowH}"
            fill="${fill}" stroke="rgba(255,255,255,0.55)" stroke-width="0.7" />
          <text x="${lx + laneW / 2}" y="${barY + matchRowH * 0.38}" text-anchor="middle" dominant-baseline="middle"
            fill="#111" font-family="Barlow Condensed, sans-serif" font-size="18" font-weight="800">${lane.value}</text>
          <text x="${lx + laneW / 2}" y="${barY + matchRowH * 0.72}" text-anchor="middle" dominant-baseline="middle"
            fill="#111" font-family="Barlow Condensed, sans-serif" font-size="7.2" font-weight="800">${labelBlock}</text>`;
      }).join("");

      const baselineSegments = hasBaseline
        ? baselineLanes.map((lane, index) => {
          const lx = pitchX + index * laneW;
          const baselineBarY = barY + matchRowH + 10;
          const baselineBarH = baselineBlockH - 12;
          const fill = crossLaneFill(lane.value, maxBaselineLane || 1);
          const matchLane = lanes[index];
          const delta = matchLane ? lane.value - matchLane.value : 0;
          const good = lowerIsBetter ? delta > 0 : delta < 0;
          const deltaClass = good ? "#15803d" : delta === 0 ? "#475569" : "#b91c1c";
          return `
            <rect x="${lx}" y="${baselineBarY}" width="${laneW}" height="${baselineBarH}"
              fill="${fill}" stroke="rgba(255,255,255,0.35)" stroke-width="0.6" opacity="0.92" />
            <text x="${lx + laneW / 2}" y="${baselineBarY + baselineBarH * 0.42}" text-anchor="middle" dominant-baseline="middle"
              fill="${deltaClass}" font-family="Barlow Condensed, sans-serif" font-size="13" font-weight="800">${lane.value}</text>
            <text x="${lx + laneW / 2}" y="${baselineBarY + baselineBarH * 0.78}" text-anchor="middle" dominant-baseline="middle"
              fill="#cbd5e1" font-family="Barlow Condensed, sans-serif" font-size="5.8" font-weight="700"
              letter-spacing="0.04em">AVG</text>`;
        }).join("")
        : "";

      const baselineTitle = hasBaseline
        ? `<text x="${pitchX + drawW / 2}" y="${barY + matchRowH + 6}" text-anchor="middle" dominant-baseline="middle"
            fill="#cbd5e1" font-family="Barlow Condensed, sans-serif" font-size="6.2" font-weight="800"
            letter-spacing="0.08em">${baselineGameCount || 7}-GAME AVERAGE</text>`
        : "";

      const laneTitle = stripTitle || "DEFENDERS BYPASSED BY FLANK";
      return `
        <text x="${pitchX + drawW / 2}" y="${titleY}" text-anchor="middle" dominant-baseline="middle"
          fill="#fff" font-family="Barlow Condensed, sans-serif" font-size="8.5" font-weight="800"
          letter-spacing="0.1em">${laneTitle}</text>
        ${segments}
        ${baselineTitle}
        ${baselineSegments}`;
    }

    function crossThreatDotColor(threat) {
      const value = Number(threat) || 0;
      if (value > 0) {
        if (value >= 10) return { fill: "#6ee7b7", stroke: "#059669" };
        if (value >= 2) return { fill: "#86efac", stroke: "#16a34a" };
        return { fill: "#bbf7d0", stroke: "#22c55e" };
      }
      if (value >= -0.5) return { fill: "#f3f4f6", stroke: "#9ca3af" };
      if (value >= -2) return { fill: "#fecaca", stroke: "#dc2626" };
      return { fill: "#f87171", stroke: "#b91c1c" };
    }

    function crossThreatChipClass(threat, avg) {
      if (avg == null || threat == null) return "";
      if (threat >= avg + 5) return " cross-summary__chip--good";
      if (threat <= avg - 5) return "";
      return "";
    }

    function renderCrossSummaryChips(summary) {
      if (!summary) return "";
      const chips = [
        `<span class="cross-summary__chip">${summary.total} crosses</span>`,
        `<span class="cross-summary__chip">${summary.highCross} high · ${summary.lowCross} low</span>`,
        `<span class="cross-summary__chip${summary.successful > 0 ? " cross-summary__chip--good" : ""}">${summary.successful} successful · ${summary.failed} failed</span>`,
      ];
      if (summary.alteredThreat != null) {
        const avg = summary.alteredThreatAvg;
        const threatClass = crossThreatChipClass(summary.alteredThreat, avg);
        const avgLine = avg != null
          ? `<span class="cross-summary__stack-sub">7-game avg ${avg.toFixed(2)}%</span>`
          : "";
        chips.push(
          `<span class="cross-summary__chip cross-summary__chip--stacked${threatClass}">
            <span class="cross-summary__stack-line">Altered threat ${summary.alteredThreat.toFixed(2)}%</span>
            ${avgLine}
          </span>`,
        );
      }
      return `<div class="cross-summary">${chips.join("")}</div>`;
    }

    function renderCrossPenaltyArc(pitch, pitchX, pitchY, drawW, plotH, penDepth) {
      const spotDepthM = pitch.penaltySpotM ?? 11;
      const arcRadiusM = pitch.penaltyArcM ?? 9.15;
      const boxDepthM = pitch.penaltyBoxDepthM ?? 16.5;
      const edgeFromSpotM = boxDepthM - spotDepthM;
      const arcHalfM = Math.sqrt(Math.max(0, arcRadiusM * arcRadiusM - edgeFromSpotM * edgeFromSpotM));
      const paLineY = pitchY + penDepth;
      const arcHalfSvg = (arcHalfM / pitch.widthM) * drawW;
      const cx = pitchX + drawW / 2;
      const rx = arcHalfSvg;
      const ry = (arcRadiusM / pitch.depthM) * plotH;
      return `<path d="M ${cx - rx} ${paLineY} A ${rx} ${ry} 0 0 1 ${cx + rx} ${paLineY}"
        fill="none" stroke="#fff" stroke-width="0.9" opacity="0.9" />`;
    }

    function crossDotInitialsColor(fill) {
      const lightFills = new Set(["#f3f4f6", "#bbf7d0", "#86efac", "#6ee7b7", "#fecaca", "#f87171"]);
      return lightFills.has(fill) ? "#1f2937" : "#fff";
    }

    function renderCrossZoneLabels(pitch, pitchY, drawW, plotH, plotBottom, padX = 12) {
      const halfW = pitch.widthM / 2;
      const boundaries = [-halfW, ...(pitch.channelBoundariesM || [-20.4, -13.6, 13.6, 20.4]), halfW];
      const zoneNames = [
        ["RIGHT", "WING"],
        ["RIGHT", "HALF-SPACE"],
        ["CENTRE"],
        ["LEFT", "HALF-SPACE"],
        ["LEFT", "WING"],
      ];
      const labelY = plotBottom - 30;
      return boundaries.slice(0, -1).map((yMin, index) => {
        const yMax = boundaries[index + 1];
        const leftSvg = crossImpectToSvg(pitch.minX, yMin, pitch, drawW, plotH, pitchY, padX);
        const rightSvg = crossImpectToSvg(pitch.minX, yMax, pitch, drawW, plotH, pitchY, padX);
        const cx = (leftSvg.x + rightSvg.x) / 2;
        const zoneW = Math.abs(rightSvg.x - leftSvg.x);
        const lines = zoneNames[index] || ["ZONE"];
        const badgeH = lines.length === 1 ? 12 : 18;
        const badgeW = Math.min(zoneW - 3, lines.length === 1 ? 36 : 45);
        const text = lines.length === 1
          ? `<tspan x="${cx}" dy="0">${lines[0]}</tspan>`
          : `<tspan x="${cx}" dy="-2.5">${lines[0]}</tspan><tspan x="${cx}" dy="7">${lines[1]}</tspan>`;
        return `
          <g opacity="0.94">
            <rect x="${cx - badgeW / 2}" y="${labelY - badgeH / 2}" width="${badgeW}" height="${badgeH}" rx="2.5"
              fill="rgba(0,0,0,0.26)" stroke="rgba(255,255,255,0.16)" stroke-width="0.4" />
            <text x="${cx}" y="${labelY}" text-anchor="middle" dominant-baseline="middle"
              fill="rgba(255,255,255,0.88)" font-family="Barlow Condensed, sans-serif" font-size="6.1" font-weight="800"
              letter-spacing="0.05em">${text}</text>
          </g>`;
      }).join("");
    }

    function renderCrossChannelLines(pitch, pitchX, pitchY, drawW, plotH, plotBottom, padX = 12) {
      const boundaries = pitch.channelBoundariesM || [-20.4, -13.6, 13.6, 20.4];
      return boundaries.map((impectY) => {
        const svg = crossImpectToSvg(pitch.minX, impectY, pitch, drawW, plotH, pitchY, padX);
        return `<line x1="${svg.x}" y1="${pitchY}" x2="${svg.x}" y2="${plotBottom}"
          stroke="rgba(255,255,255,0.42)" stroke-width="0.65" stroke-dasharray="3 2" />`;
      }).join("");
    }

    function renderCrossPitchSvg(data) {
      const pitch = data.pitch || { goalX: 52.5, minX: 17.5, widthM: 68, depthM: 35 };
      const points = data.crossPoints || [];
      const lanes = data.lanes || [];
      const maxLane = data.maxLaneValue || 1;
      const baselineLanes = data.lanesBaseline || [];
      const maxBaselineLane = data.maxLaneBaselineValue || 1;
      const baselineGameCount = data.baselineGameCount || data.summary?.baselineGameCount || 7;
      const laneStripTitle = data.laneStripTitle || "DEFENDERS BYPASSED BY FLANK";
      const laneStripLowerIsBetter = Boolean(data.defensive);
      const drawW = 520;
      const padX = 6;
      const padY = 6;
      const { drawH } = crossImpectToSvg(pitch.minX, 0, pitch, drawW);
      const laneBandH = baselineLanes.length > 0 ? 78 : 52;
      const plotH = drawH - laneBandH;
      const vbW = padX * 2 + drawW;
      const vbH = padY + drawH + padY;

      const pitchX = padX;
      const pitchY = padY;
      const penDepth = ((pitch.penaltyBoxDepthM ?? 16.5) / pitch.depthM) * plotH;
      const penWidth = (40.32 / pitch.widthM) * drawW;
      const sixDepth = (5.5 / pitch.depthM) * plotH;
      const sixWidth = (18.32 / pitch.widthM) * drawW;
      const penX = pitchX + (drawW - penWidth) / 2;
      const sixX = pitchX + (drawW - sixWidth) / 2;
      const pitchBottom = pitchY + drawH;
      const plotBottom = pitchY + plotH;
      const laneBandTop = pitchBottom - laneBandH;

      const dots = points.map((pt) => {
        const svg = crossImpectToSvg(pt.impectX, pt.impectY, pitch, drawW, plotH, pitchY, padX, padY);
        const colors = crossThreatDotColor(pt.alteredThreat);
        const initials = pt.playerInitials || "";
        const initialsColor = crossDotInitialsColor(colors.fill);
        return `
          <g>
            <circle cx="${svg.x}" cy="${svg.y}" r="7.1" fill="rgba(255,255,255,0.92)" opacity="0.95" />
            <circle cx="${svg.x}" cy="${svg.y}" r="5.9" fill="${colors.fill}" stroke="${colors.stroke}" stroke-width="1.2" />
            ${initials ? `<text x="${svg.x}" y="${svg.y + 0.3}" text-anchor="middle" dominant-baseline="middle"
              fill="${initialsColor}" font-family="Barlow Condensed, sans-serif" font-size="5.9" font-weight="700"
              letter-spacing="0.04em">${initials}</text>` : ""}
          </g>`;
      }).join("");

      const channelLines = renderCrossChannelLines(pitch, pitchX, pitchY, drawW, plotH, plotBottom, padX);
      const zoneLabels = renderCrossZoneLabels(pitch, pitchY, drawW, plotH, plotBottom, padX);
      const penaltyArc = renderCrossPenaltyArc(pitch, pitchX, pitchY, drawW, plotH, penDepth);
      const laneStrip = renderCrossLaneStrip(
        lanes,
        maxLane,
        pitchX,
        drawW,
        laneBandTop,
        laneBandH,
        baselineLanes,
        maxBaselineLane,
        baselineGameCount,
        laneStripTitle,
        laneStripLowerIsBetter,
      );

      return `
        <svg class="cross-pitch" viewBox="0 0 ${vbW} ${vbH}" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <defs>
            <pattern id="crossPitchStripes" width="8" height="8" patternUnits="userSpaceOnUse" patternTransform="rotate(18)">
              <rect width="4" height="8" fill="#fff" />
            </pattern>
          </defs>
          <rect x="${pitchX}" y="${pitchY}" width="${drawW}" height="${drawH}" fill="#3f9f45" stroke="#fff" stroke-width="1.4" />
          <rect x="${pitchX}" y="${pitchY}" width="${drawW}" height="${drawH}" fill="url(#crossPitchStripes)" opacity="0.1" />
          ${channelLines}
          ${zoneLabels}
          <rect x="${penX}" y="${pitchY}" width="${penWidth}" height="${penDepth}" fill="none" stroke="#fff" stroke-width="1" opacity="0.9" />
          <rect x="${sixX}" y="${pitchY}" width="${sixWidth}" height="${sixDepth}" fill="none" stroke="#fff" stroke-width="0.85" opacity="0.8" />
          ${penaltyArc}
          <line x1="${pitchX}" y1="${plotBottom}" x2="${pitchX + drawW}" y2="${plotBottom}" stroke="#fff" stroke-width="0.9" opacity="0.65" />
          ${dots}
          <rect x="${pitchX}" y="${laneBandTop}" width="${drawW}" height="${laneBandH}" fill="rgba(0,0,0,0.22)" />
          <line x1="${pitchX}" y1="${laneBandTop}" x2="${pitchX + drawW}" y2="${laneBandTop}" stroke="#fff" stroke-width="0.9" opacity="0.55" />
          ${laneStrip}
        </svg>`;
    }

    function renderCrossesSlideContent(data, slideClass = "slide--crosses") {
      if (!data) return "";

      const playerRows = (data.players || []).length
        ? data.players.map((row) => {
          const threatClass = row.highlightThreat
            ? "cross-threat--top"
            : row.alteredThreat > 0
              ? "cross-threat--pos"
              : "cross-threat--neg";
          const successDetail = row.successful > 0
            ? `<span class="cross-player-table__detail">${row.successful} successful</span>`
            : `<span class="cross-player-table__detail">0 successful</span>`;
          return `
          <tr>
            <td class="cross-player-table__name">${row.playerName}</td>
            <td class="cross-player-table__crosses">
              <div class="cross-player-table__stack">
                <span class="cross-player-table__val">${row.crosses}</span>
                ${successDetail}
              </div>
            </td>
            <td class="cross-player-table__threat ${threatClass}">${row.alteredThreat.toFixed(2)}%</td>
          </tr>`;
        }).join("")
        : `<tr><td colspan="3">No crosses recorded for this match.</td></tr>`;

      return `
        <section class="slide ${slideClass}">
          <div class="cross-keynote">
            <div class="cross-keynote__bar">${data.title || "Crosses"}</div>
            <div class="cross-keynote__body">
              <div class="cross-visual">
                ${renderCrossSummaryChips(data.summary)}
                <div class="cross-pitch-wrap">${renderCrossPitchSvg(data)}</div>
              </div>
              <div class="cross-players-panel">
                <table class="cross-player-table">
                  <colgroup>
                    <col class="cross-player-table__col-name" />
                    <col class="cross-player-table__col-crosses" />
                    <col class="cross-player-table__col-threat" />
                  </colgroup>
                  <thead>
                    <tr>
                      <th>Player</th>
                      <th>Crosses</th>
                      <th>Threat</th>
                    </tr>
                  </thead>
                  <tbody>${playerRows}</tbody>
                </table>
              </div>
            </div>
          </div>
        </section>`;
    }

    function renderCrossesSlide(report) {
      return renderCrossesSlideContent(report.crosses, "slide--crosses");
    }

    function renderOpponentCrossesSlide(report) {
      return renderCrossesSlideContent(report.opponentCrosses, "slide--crosses slide--crosses-oop");
    }

    function shotImpectToSvg(impectX, impectY, pitch, drawW, plotH, pitchY, padX = 8) {
      return crossImpectToSvg(impectX, impectY, pitch, drawW, plotH, pitchY, padX, padX);
    }

    function shotLegendShapeSvg(shape, fill = "#d1d5db") {
      if (shape === "diamond") {
        return `<svg viewBox="0 0 12 12" aria-hidden="true"><rect x="2.2" y="2.2" width="7.6" height="7.6" fill="${fill}" stroke="#111" stroke-width="0.8" transform="rotate(45 6 6)"/></svg>`;
      }
      if (shape === "square") {
        return `<svg viewBox="0 0 12 12" aria-hidden="true"><rect x="2" y="2" width="8" height="8" rx="0.8" fill="${fill}" stroke="#111" stroke-width="0.8"/></svg>`;
      }
      return `<svg viewBox="0 0 12 12" aria-hidden="true"><circle cx="6" cy="6" r="4.8" fill="${fill}" stroke="#111" stroke-width="0.8"/></svg>`;
    }

    function shotXgGoldStroke(xg, maxXg) {
      if (!xg || xg <= 0.04) return { width: 0, opacity: 0 };
      const ref = Math.max(maxXg || xg, 0.12);
      const ratio = Math.min(1, xg / ref);
      if (ratio < 0.2) return { width: 0, opacity: 0 };
      return {
        width: 0.55 + ratio * 2.15,
        opacity: 0.45 + ratio * 0.55,
      };
    }

    const SHOT_MARKER_TEXT_STYLE = 'fill="#fff" stroke="#111" stroke-width="0.45" paint-order="stroke fill"';
    const SHOT_MARKER_LABEL_COLOR = "#111";

    function renderShotMarker(x, y, outcome, phase, initials, xgDisplay, xgValue, maxXg) {
      const colors = {
        scored: "#22c55e",
        saved: "#facc15",
        off_target: "#ef4444",
      };
      const fill = colors[outcome] || "#9ca3af";
      const gold = shotXgGoldStroke(Number(xgValue) || 0, maxXg);
      const baseStroke = "#111";
      const baseStrokeWidth = 0.85;
      const init = initials || "";
      const xg = xgDisplay || "";
      let shape = "";
      if (phase === "Transition") {
        shape = `<rect x="-10" y="-10" width="20" height="20" fill="${fill}" stroke="${baseStroke}" stroke-width="${baseStrokeWidth}" transform="rotate(45)"/>`;
      } else if (phase === "Set Play") {
        shape = `<rect x="-10" y="-10" width="20" height="20" rx="1.4" fill="${fill}" stroke="${baseStroke}" stroke-width="${baseStrokeWidth}"/>`;
      } else {
        shape = `<circle r="10.5" fill="${fill}" stroke="${baseStroke}" stroke-width="${baseStrokeWidth}"/>`;
      }
      const goldRing = gold.width > 0
        ? (phase === "Transition"
          ? `<rect x="-10" y="-10" width="20" height="20" fill="none" stroke="#fbbf24" stroke-width="${gold.width}" opacity="${gold.opacity}" transform="rotate(45)"/>`
          : phase === "Set Play"
            ? `<rect x="-10" y="-10" width="20" height="20" rx="1.4" fill="none" stroke="#fbbf24" stroke-width="${gold.width}" opacity="${gold.opacity}"/>`
            : `<circle r="10.5" fill="none" stroke="#fbbf24" stroke-width="${gold.width}" opacity="${gold.opacity}"/>`)
        : "";
      const xgText = xg
        ? `<text y="1" text-anchor="middle" dominant-baseline="middle"
            ${SHOT_MARKER_TEXT_STYLE} font-family="Barlow Condensed, sans-serif" font-size="9.2" font-weight="800">${xg}</text>`
        : "";
      const initialsText = init
        ? `<text y="18" text-anchor="middle" dominant-baseline="middle"
            fill="${SHOT_MARKER_LABEL_COLOR}" font-family="Barlow Condensed, sans-serif" font-size="9.5" font-weight="800"
            letter-spacing="0.04em">${init}</text>`
        : "";
      return `
        <g transform="translate(${x}, ${y - 4})">
          ${shape}
          ${goldRing}
          ${xgText}
          ${initialsText}
        </g>`;
    }

    function renderShotsPitchSvg(data) {
      const pitch = data.pitch || { goalX: 52.5, minX: 17.5, widthM: 68, depthM: 35 };
      const points = data.shotPoints || [];
      const drawW = 640;
      const padX = 14;
      const padY = 8;
      const { drawH } = shotImpectToSvg(pitch.minX, 0, pitch, drawW, null, padY, padX);
      const plotH = drawH;
      const vbW = padX * 2 + drawW;
      const vbH = padY + drawH + padY;
      const pitchX = padX;
      const pitchY = padY;
      const plotBottom = pitchY + plotH;
      const penDepth = ((pitch.penaltyBoxDepthM ?? 16.5) / pitch.depthM) * plotH;
      const penWidth = (40.32 / pitch.widthM) * drawW;
      const sixDepth = (5.5 / pitch.depthM) * plotH;
      const sixWidth = (18.32 / pitch.widthM) * drawW;
      const penX = pitchX + (drawW - penWidth) / 2;
      const sixX = pitchX + (drawW - sixWidth) / 2;
      const cx = pitchX + drawW / 2;

      const boundaries = [-20.4, -13.6, 13.6, 20.4];
      const gridLines = boundaries.map((impectY) => {
        const svg = shotImpectToSvg(pitch.minX, impectY, pitch, drawW, plotH, pitchY, padX);
        return `<line x1="${svg.x}" y1="${pitchY}" x2="${svg.x}" y2="${plotBottom}"
          stroke="rgba(255,255,255,0.28)" stroke-width="0.55" />`;
      }).join("");
      const horizontalGrid = [1 / 3, 2 / 3].map((ratio) => {
        const y = pitchY + plotH * ratio;
        return `<line x1="${pitchX}" y1="${y}" x2="${pitchX + drawW}" y2="${y}"
          stroke="rgba(255,255,255,0.28)" stroke-width="0.55" />`;
      }).join("");

      const spotDepthM = pitch.penaltySpotM ?? 11;
      const arcRadiusM = pitch.penaltyArcM ?? 9.15;
      const boxDepthM = pitch.penaltyBoxDepthM ?? 16.5;
      const edgeFromSpotM = boxDepthM - spotDepthM;
      const arcHalfM = Math.sqrt(Math.max(0, arcRadiusM * arcRadiusM - edgeFromSpotM * edgeFromSpotM));
      const paLineY = pitchY + penDepth;
      const arcHalfSvg = (arcHalfM / pitch.widthM) * drawW;
      const ry = (arcRadiusM / pitch.depthM) * plotH;
      const penaltyArc = `<path d="M ${cx - arcHalfSvg} ${paLineY} A ${arcHalfSvg} ${ry} 0 0 1 ${cx + arcHalfSvg} ${paLineY}"
        fill="none" stroke="#fff" stroke-width="0.9" opacity="0.9" />`;

      const maxXg = points.reduce((max, pt) => Math.max(max, Number(pt.xg) || 0), 0);

      const markers = points.filter((pt) => pt.hasLocation !== false && pt.impectX != null && pt.impectY != null).map((pt) => {
        const svg = shotImpectToSvg(pt.impectX, pt.impectY, pitch, drawW, plotH, pitchY, padX);
        return renderShotMarker(
          svg.x,
          svg.y,
          pt.outcome,
          pt.phase,
          pt.playerInitials,
          pt.xgDisplay,
          pt.xg,
          maxXg,
        );
      }).join("");

      return `
        <svg class="shots-pitch" viewBox="0 0 ${vbW} ${vbH}" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <defs>
            <pattern id="shotsPitchStripes" width="8" height="8" patternUnits="userSpaceOnUse" patternTransform="rotate(18)">
              <rect width="4" height="8" fill="#fff" />
            </pattern>
          </defs>
          <rect x="${pitchX}" y="${pitchY}" width="${drawW}" height="${drawH}" fill="#3f9f45" stroke="#fff" stroke-width="1.4" />
          <rect x="${pitchX}" y="${pitchY}" width="${drawW}" height="${drawH}" fill="url(#shotsPitchStripes)" opacity="0.1" />
          ${gridLines}
          ${horizontalGrid}
          <rect x="${penX}" y="${pitchY}" width="${penWidth}" height="${penDepth}" fill="none" stroke="#fff" stroke-width="1" opacity="0.9" />
          <rect x="${sixX}" y="${pitchY}" width="${sixWidth}" height="${sixDepth}" fill="none" stroke="#fff" stroke-width="0.85" opacity="0.8" />
          ${penaltyArc}
          <line x1="${pitchX}" y1="${plotBottom}" x2="${pitchX + drawW}" y2="${plotBottom}" stroke="#fff" stroke-width="1" opacity="0.85" />
          ${markers}
        </svg>`;
    }

    function renderShotsSummaryChips(summary) {
      if (!summary) return "";
      const chips = [
        `<span class="shots-summary__chip">${summary.totalShots} shots</span>`,
        `<span class="shots-summary__chip">${summary.totalXgDisplay ?? summary.totalXg} shot xG</span>`,
        `<span class="shots-summary__chip${summary.goals > 0 ? " shots-summary__chip--good" : ""}">${summary.goals} goal${summary.goals === 1 ? "" : "s"}</span>`,
        `<span class="shots-summary__chip">${summary.onTarget} on target</span>`,
      ];

        chips.push(
          `<span class="shots-summary__chip shots-summary__chip--avg">7-game avg · ${avgLine}</span>`,
        );

      return `<div class="shots-summary">${chips.join("")}</div>`;
    }

      const phaseRows = (data.phases || []).map((row) => `

      return `
        <section class="slide ${slideClass}">
          <div class="shots-keynote">
            <div class="shots-keynote__bar">${data.title || "Shots"}</div>
            <div class="shots-keynote__body">
              <div class="shots-sidebar">
                ${summaryChips}
                <div class="shots-metrics-panel">
                  <table class="prog-table shots-team-table">

              <div class="shots-center">

                <div class="shots-pitch-wrap">${renderShotsPitchSvg(data)}</div>
              </div>
              <div class="shots-bottom">
                <table class="shots-player-table">
                  <thead>
                    <tr>
                      <th>Player</th>
                      <th>Shots</th>
                      <th>xG</th>
                    </tr>
                  </thead>
                  <tbody>${playerRows}</tbody>
                </table>
                <div class="shots-phase-panel">
                  <table class="shots-phase-table">
                    <thead>
                      <tr>
                        <th>Phase</th>
                        <th>Shots</th>
                        <th>xG</th>
                      </tr>
                    </thead>
                    <tbody>${phaseRows}</tbody>
                  </table>
                </div>
              </div>
            </div>
          </div>
        </section>`;
    }

    function renderShotsSlide(report) {
      return renderShotsSlideContent(report.shots, "slide--shots");
    }

    function renderShotsAgainstSlide(report) {
      return renderShotsSlideContent(report.shotsAgainst, "slide--shots slide--shots-oop");

    function duelsFractionWinPct(fraction) {
      if (fraction == null || fraction === "0" || fraction === "-") return null;
      const parts = String(fraction).split("/");
      if (parts.length !== 2) return null;
      const won = Number(parts[0]);
      const total = Number(parts[1]);
      if (!Number.isFinite(won) || !Number.isFinite(total) || total <= 0) return null;
      return (won / total) * 100;
    }

    function renderDuelsDuelCell(value) {
      const display = value ?? "0";
      const isEmpty = display === "0" || display === "-";
      const tierClass = isEmpty
        ? "duels-cell--none"
        : duelsWinPctTierClass(duelsFractionWinPct(display));
      return `<td class="duels-duel-cell duels-cell ${tierClass}${isEmpty ? " duels-duel-cell--empty" : ""}">${display}</td>`;
    }

    function duelsWinPctTierClass(pct) {
      if (pct == null || Number.isNaN(Number(pct))) return "duels-cell--none";
      const value = Number(pct);
      if (value >= 75) return "duels-cell--win-elite";
      if (value >= 50) return "duels-cell--win-strong";
      if (value >= 25) return "duels-cell--win-mid";
      return "duels-cell--win-low";
    }

    function renderDuelsWinPctCell(value, avgDisplay, pct) {
      const bandClass = duelsWinPctTierClass(pct);
      const avgHtml = avgDisplay
        ? `<span class="duels-cell__avg">${avgDisplay}</span>`
        : "";
      return `
        <td class="duels-cell ${bandClass}">
          <div class="duels-cell__stack">
            <span class="duels-cell__val">${value ?? "—"}</span>
            ${avgHtml}

        </td>`;
    }

    function renderDuelsMetricCell(value, avgDisplay, band) {
      const bandClass = band ? `duels-cell--${band}` : "duels-cell--none";
      const avgHtml = avgDisplay
        ? `<span class="duels-cell__avg">${avgDisplay}</span>`

      return `
        <td class="duels-cell ${bandClass}">

    function renderDuelsSlide(report) {

      if (!data || (!duelMetrics.length && !pressingMetrics.length)) return "";

      const opponent = data.opponentLabel || "Opponent";
      const leagueSize = data.leagueSize || 24;
      const duelTable = renderProgTeamMetricTable(duelMetrics, opponent, leagueSize, "Duels");
      const pressingTable = pressingMetrics.length
        ? renderProgTeamMetricTable(pressingMetrics, opponent, leagueSize, "Pressing")
        : "";

      const playerRows = (data.players || []).length
        ? data.players.map((row) => `
          <tr>
            <td class="duels-player-name">${row.playerName ?? "—"}</td>
            ${renderDuelsDuelCell(row.groundDuelsWin)}
            ${renderDuelsDuelCell(row.aerialDuelsWin)}
            ${renderDuelsWinPctCell(
              row.totalWinDisplay ?? "-",
              row.totalWinPctAvgDisplay,
              row.totalWinPct,
            )}
            ${renderDuelsMetricCell(
              row.offensiveInterventions ?? 0,

            ${renderDuelsMetricCell(
              row.defensiveInterventions ?? 0,

            ${renderDuelsMetricCell(

        : `<tr><td colspan="7">No player data for this match.</td></tr>`;

      return `
        <section class="slide slide--duels">
          <div class="prog-keynote">
