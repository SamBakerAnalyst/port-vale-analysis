                <thead>
                  <tr>
                    <th>Player</th>
                    <th>Ground Duels Win</th>
                    <th>Aerial Duels Win</th>
                    <th>Total Win %</th>
                    <th>Offensive Interventions</th>
                    <th>Defensive Interventions</th>
                    <th>Ball Wins From Opposition Defenders</th>
                  </tr>
                </thead>
                <tbody>${playerRows}</tbody>
              </table>
            </div>
          </div>
        </section>`;
    }

    function oopMapToSvg(impectX, impectY, pitch, drawW, padX, padY) {
      const halfL = pitch.halfLengthM ?? 52.5;
      const halfW = pitch.halfWidthM ?? 34;
      const lengthM = pitch.lengthM ?? halfL * 2;
      const widthM = pitch.widthM ?? halfW * 2;
      const drawH = (lengthM / widthM) * drawW;
      return {
        x: padX + ((halfW - impectY) / widthM) * drawW,
        y: padY + ((halfL - impectX) / lengthM) * drawH,
        drawW,
        drawH,
      };
    }

    function oopUnstackMarkerPositions(points, pitch, drawW, padX, padY, markerR) {
      const placed = (points || []).map((pt) => {
        const svg = oopMapToSvg(pt.impectX, pt.impectY, pitch, drawW, padX, padY);
        return {
          pt,
          ox: svg.x,
          oy: svg.y,
          x: svg.x,
          y: svg.y,
          offset: false,
        };
      });
      if (placed.length < 2) return placed;

      const minDist = markerR * 2.15;
      const parent = placed.map((_, i) => i);
      const find = (i) => {
        while (parent[i] !== i) i = parent[i] = parent[parent[i]];
        return i;
      };
      const unite = (a, b) => {
        const ra = find(a);
        const rb = find(b);
        if (ra !== rb) parent[rb] = ra;
      };

      for (let i = 0; i < placed.length; i += 1) {
        for (let j = i + 1; j < placed.length; j += 1) {
          const dx = placed[i].ox - placed[j].ox;
          const dy = placed[i].oy - placed[j].oy;
          if (Math.hypot(dx, dy) < minDist) unite(i, j);
        }
      }

      const groups = new Map();
      placed.forEach((item, i) => {
        const root = find(i);
        if (!groups.has(root)) groups.set(root, []);
        groups.get(root).push(item);
      });

      const { drawH } = oopMapToSvg(0, 0, pitch, drawW, padX, padY);
      const minX = padX + markerR + 2;
      const maxX = padX + drawW - markerR - 2;
      const minY = padY + markerR + 2;
      const maxY = padY + drawH - markerR - 2;
      const clamp = (item) => {
        item.x = Math.min(maxX, Math.max(minX, item.x));
        item.y = Math.min(maxY, Math.max(minY, item.y));
      };

      for (const group of groups.values()) {
        if (group.length < 2) {
          group.forEach(clamp);
          continue;
        }
        const cx = group.reduce((s, g) => s + g.ox, 0) / group.length;
        const cy = group.reduce((s, g) => s + g.oy, 0) / group.length;
        const n = group.length;
        const ring = Math.max(markerR * 1.35, markerR * (0.55 + n * 0.42));
        const start = -Math.PI / 2;
        group.forEach((item, i) => {
          const angle = start + (i * 2 * Math.PI) / n;
          item.x = cx + Math.cos(angle) * ring;
          item.y = cy + Math.sin(angle) * ring;
          item.offset = true;
          item.cx = cx;
          item.cy = cy;
          clamp(item);
        });
      }
      return placed;
    }

    function renderDuelsActivityLayerMarkers(layer, pitch, drawW, padX, padY) {
      const color = layer.color || "#64748b";
      const shape = layer.shape || layer.id;
      const isPress = shape === "circle" || layer.id === "press";
      const isRegain = shape === "diamond" || layer.id === "defenderRegain";
      const isDuel = shape === "square" || layer.id === "duelWin";
      const r = isPress ? 4.2 : isRegain ? 19.5 : 17.5;
      const stroke = isRegain ? "#9f1239" : isDuel ? "#854d0e" : "#b45309";
      const fontSize = isRegain ? 13.5 : isDuel ? 12.5 : 5.2;
      const placed = isPress
        ? (layer.points || []).map((pt) => {
            const svg = oopMapToSvg(pt.impectX, pt.impectY, pitch, drawW, padX, padY);
            return { pt, x: svg.x, y: svg.y, ox: svg.x, oy: svg.y, offset: false };
          })
        : oopUnstackMarkerPositions(layer.points || [], pitch, drawW, padX, padY, r);

      return placed.map((item) => {
        const pt = item.pt;
        const x = item.x;
        const y = item.y;
        const titleBits = [pt.playerName, pt.subtypeLabel, pt.zone].filter(Boolean).join(" · ");
        const title = titleBits
          ? `<title>${titleBits.replace(/[<>&]/g, "")}</title>`
          : "";
        const initials = (pt.playerInitials || "").slice(0, 3);
        const label = initials && !isPress
          ? `<text x="${x}" y="${y + 0.6}" text-anchor="middle" dominant-baseline="middle"
              fill="${isRegain ? "#fff" : "#111"}" font-family="Barlow Condensed, sans-serif"
              font-size="${fontSize}" font-weight="800"
              paint-order="stroke" stroke="${isRegain ? "rgba(136,19,55,0.55)" : "rgba(255,255,255,0.9)"}" stroke-width="2.2">${initials}</text>`
          : "";
        const leader = item.offset
          ? `<line x1="${item.cx}" y1="${item.cy}" x2="${x}" y2="${y}"
              stroke="rgba(15,23,42,0.45)" stroke-width="1.2" stroke-dasharray="3 2" />
             <circle cx="${item.cx}" cy="${item.cy}" r="2.2" fill="rgba(15,23,42,0.55)" />`
          : "";
        if (isRegain) {
          return `<g>${title}
            ${leader}
            <polygon points="${x},${y - r} ${x + r * 0.92},${y} ${x},${y + r} ${x - r * 0.92},${y}"
              fill="${color}" fill-opacity="0.98" stroke="#fff" stroke-width="2.1" />
            <polygon points="${x},${y - r} ${x + r * 0.92},${y} ${x},${y + r} ${x - r * 0.92},${y}"
              fill="none" stroke="${stroke}" stroke-width="1.4" />
            ${label}
          </g>`;
        }
        if (isDuel) {
          const isAerial = pt.subtype === "aerial" || String(pt.subtypeLabel || "").toLowerCase() === "aerial";
          const fill = isAerial ? "#38bdf8" : "#facc15";
          const duelStroke = isAerial ? "#0369a1" : "#a16207";
          return `<g>${title}
            ${leader}
            <rect x="${x - r}" y="${y - r}" width="${r * 2}" height="${r * 2}" rx="2.4"
              fill="${fill}" fill-opacity="0.98" stroke="#fff" stroke-width="2" />
            <rect x="${x - r}" y="${y - r}" width="${r * 2}" height="${r * 2}" rx="2.4"
              fill="none" stroke="${duelStroke}" stroke-width="1.3" />
            ${label}
          </g>`;
        }
        return `<g>${title}
          <circle cx="${x}" cy="${y}" r="${r}" fill="${color}" fill-opacity="0.7" stroke="${stroke}" stroke-width="0.75" />
        </g>`;
      }).join("");
    }

    function renderOopZoneOverlay(pitch, drawW, padX, padY, { labels = true } = {}) {
      const halfL = pitch.halfLengthM ?? 52.5;
      const halfW = pitch.halfWidthM ?? 34;
      const lengthM = pitch.lengthM ?? halfL * 2;
      const widthM = pitch.widthM ?? halfW * 2;
      const drawH = (lengthM / widthM) * drawW;
      const pitchX = padX;
      const pitchY = padY;
      // Third lines at x = ±17.5; channel lines at y = ±11 (Impect).
      const thirdAtt = oopMapToSvg(17.5, 0, pitch, drawW, padX, padY);
      const thirdDef = oopMapToSvg(-17.5, 0, pitch, drawW, padX, padY);
      const leftCh = oopMapToSvg(0, 11, pitch, drawW, padX, padY);
      const rightCh = oopMapToSvg(0, -11, pitch, drawW, padX, padY);
      const label = (x, y, text) =>
        `<text x="${x}" y="${y}" text-anchor="middle" fill="rgba(255,255,255,0.62)"
          font-family="Barlow Condensed, sans-serif" font-size="7.4" font-weight="700" letter-spacing="0.06em">${text}</text>`;
      const midX = pitchX + drawW / 2;
      const guideLabels = labels
        ? `${label(midX, (pitchY + thirdAtt.y) / 2 + 2, "ATTACKING THIRD")}
        ${label(midX, (thirdAtt.y + thirdDef.y) / 2 + 2, "MIDDLE THIRD")}
        ${label(midX, (thirdDef.y + pitchY + drawH) / 2 + 2, "DEFENSIVE THIRD")}
        ${label((pitchX + leftCh.x) / 2, pitchY + 18, "L")}
        ${label(midX, pitchY + 18, "C")}
        ${label((rightCh.x + pitchX + drawW) / 2, pitchY + 18, "R")}`
        : "";
      return `
        <rect x="${pitchX}" y="${pitchY}" width="${drawW}" height="${thirdAtt.y - pitchY}" fill="rgba(255,255,255,0.05)" />
        <rect x="${pitchX}" y="${thirdDef.y}" width="${drawW}" height="${pitchY + drawH - thirdDef.y}" fill="rgba(0,0,0,0.08)" />
        <line x1="${pitchX}" y1="${thirdAtt.y}" x2="${pitchX + drawW}" y2="${thirdAtt.y}" stroke="rgba(255,255,255,0.55)" stroke-width="1" stroke-dasharray="4 3" />
        <line x1="${pitchX}" y1="${thirdDef.y}" x2="${pitchX + drawW}" y2="${thirdDef.y}" stroke="rgba(255,255,255,0.55)" stroke-width="1" stroke-dasharray="4 3" />
        <line x1="${leftCh.x}" y1="${pitchY}" x2="${leftCh.x}" y2="${pitchY + drawH}" stroke="rgba(255,255,255,0.35)" stroke-width="0.8" stroke-dasharray="3 3" />
        <line x1="${rightCh.x}" y1="${pitchY}" x2="${rightCh.x}" y2="${pitchY + drawH}" stroke="rgba(255,255,255,0.35)" stroke-width="0.8" stroke-dasharray="3 3" />
        ${guideLabels}
      `;
    }

    function oopZoneCellBounds(key) {
      // Impect: attack +x (top), left +y (viewer left when attack is up).
      const thirds = {
        "Attacking third": { xMin: 17.5, xMax: 52.5 },
        "Middle third": { xMin: -17.5, xMax: 17.5 },
        "Defensive third": { xMin: -52.5, xMax: -17.5 },
      };
      const sides = {
        left: { yMin: 11, yMax: 34 },
        centre: { yMin: -11, yMax: 11 },
        right: { yMin: -34, yMax: -11 },
      };
      const parts = String(key || "").split(" · ");
      const third = thirds[parts[0]];
      const side = sides[parts[1]];
      if (!third || !side) return null;
      return { ...third, ...side };
    }

    const OOP_ZONE_KEYS = [
      "Attacking third · left",
      "Attacking third · centre",
      "Attacking third · right",
      "Middle third · left",
      "Middle third · centre",
      "Middle third · right",
      "Defensive third · left",
      "Defensive third · centre",
      "Defensive third · right",
    ];

    function buildOopZoneHeatFromLayer(layer) {
      if (Array.isArray(layer.zoneHeat) && layer.zoneHeat.length) return layer.zoneHeat;
      const counts = Object.create(null);
      for (const key of OOP_ZONE_KEYS) counts[key] = 0;
      for (const pt of layer.points || []) {
        const key = pt.zone;
        if (key && key in counts) counts[key] += 1;
      }
      if (!(layer.points || []).length) {
        for (const row of layer.breakdown || []) {
          if (row.label && row.label in counts) counts[row.label] = Number(row.count) || 0;
        }
      }
      const total = Object.values(counts).reduce((a, b) => a + b, 0) || 1;
      const maxCount = Math.max(0, ...Object.values(counts));
      return OOP_ZONE_KEYS.map((key) => ({
        key,
        count: counts[key],
        sharePct: Math.round((100 * counts[key]) / total),
        intensity: maxCount ? counts[key] / maxCount : 0,
      }));
    }

    function layerUsesZoneHeat(layer) {
      return layer.renderMode === "zoneHeat" || layer.id === "press";
    }

    function renderOopZoneHeatHtml(layer) {
      const cells = buildOopZoneHeatFromLayer(layer);
      const byKey = Object.fromEntries(cells.map((cell) => [cell.key, cell]));
      const densestKey = layer.densestZone || "";
      const cellHtml = OOP_ZONE_KEYS.map((key) => {
        const cell = byKey[key] || { count: 0, sharePct: 0, intensity: 0 };
        const intensity = Math.max(0, Math.min(1, Number(cell.intensity) || 0));
        const empty = !(cell.count > 0);
        const densest = !empty && key === densestKey;
        const body = empty
          ? `<span class="duels-zone-heat__empty">—</span>`
          : `<span class="duels-zone-heat__count">${cell.count}</span>
             <span class="duels-zone-heat__share">${cell.sharePct}%</span>`;
        return `<div class="duels-zone-heat__cell${empty ? " is-empty" : ""}${densest ? " is-densest" : ""}"
          style="--intensity:${intensity}" title="${key}: ${cell.count} (${cell.sharePct}%)">
          ${body}
        </div>`;
      }).join("");
      return `
        <div class="duels-zone-heat" aria-hidden="true">
          <div class="duels-zone-heat__end">Opp goal</div>
          <div class="duels-zone-heat__grid">${cellHtml}</div>
          <div class="duels-zone-heat__channels"><span>L</span><span>C</span><span>R</span></div>
          <div class="duels-zone-heat__end">Our goal</div>
        </div>`;
    }

    function renderOopZoneHeat(layer, pitch, drawW, padX, padY) {
      const cells = buildOopZoneHeatFromLayer(layer);
      // Warm amber scale that stays readable on grass without looking muddy.
      const fillFor = (intensity, hasCount) => {
        if (!hasCount) return { fill: "#f8fafc", opacity: 0.14 };
        const t = Math.max(0, Math.min(1, intensity));
        // #fef3c7 → #f59e0b → #b45309
        const r = Math.round(254 - t * (254 - 180));
        const g = Math.round(243 - t * (243 - 83));
        const b = Math.round(199 - t * (199 - 9));
        return { fill: `rgb(${r},${g},${b})`, opacity: 0.42 + t * 0.48 };
      };
      return cells.map((cell) => {
        const bounds = oopZoneCellBounds(cell.key);
        if (!bounds) return "";
        const tl = oopMapToSvg(bounds.xMax, bounds.yMax, pitch, drawW, padX, padY);
        const br = oopMapToSvg(bounds.xMin, bounds.yMin, pitch, drawW, padX, padY);
        const x = Math.min(tl.x, br.x);
        const y = Math.min(tl.y, br.y);
        const w = Math.abs(br.x - tl.x);
        const h = Math.abs(br.y - tl.y);
        const intensity = Math.max(0, Math.min(1, Number(cell.intensity) || 0));
        const { fill, opacity } = fillFor(intensity, cell.count > 0);
        const cx = x + w / 2;
        const cy = y + h / 2;
        const pillW = Math.min(72, w * 0.72);
        const pillH = 36;
        const pillX = cx - pillW / 2;
        const pillY = cy - pillH / 2;
        const densest = intensity >= 0.999 && cell.count > 0;
        const countLabel = cell.count
          ? `<rect x="${pillX}" y="${pillY}" width="${pillW}" height="${pillH}" rx="8"
              fill="rgba(255,255,255,0.92)" stroke="${densest ? "#92400e" : "rgba(15,23,42,0.12)"}" stroke-width="${densest ? 1.6 : 1}" />
             <text x="${cx}" y="${cy - 5}" text-anchor="middle" dominant-baseline="middle"
              fill="#0f172a" font-family="Barlow Condensed, sans-serif" font-size="18" font-weight="800">${cell.count}</text>
             <text x="${cx}" y="${cy + 11}" text-anchor="middle" dominant-baseline="middle"
              fill="#64748b" font-family="Barlow Condensed, sans-serif" font-size="9.5" font-weight="700">${cell.sharePct}% of presses</text>`
          : `<text x="${cx}" y="${cy}" text-anchor="middle" dominant-baseline="middle"
              fill="rgba(255,255,255,0.55)" font-family="Barlow Condensed, sans-serif" font-size="13" font-weight="700">—</text>`;
        return `<g>
          <title>${cell.key}: ${cell.count} presses (${cell.sharePct}% of all)</title>
          <rect x="${x + 1.2}" y="${y + 1.2}" width="${Math.max(0, w - 2.4)}" height="${Math.max(0, h - 2.4)}" rx="4"
            fill="${fill}" fill-opacity="${opacity}" stroke="rgba(255,255,255,0.55)" stroke-width="1.1" />
          ${countLabel}
        </g>`;
      }).join("");
    }

    function renderDuelsActivityMapSvg(activityMap, layersOverride = null) {
      const pitch = activityMap.pitch || {};
      const layers = layersOverride || activityMap.layers || [];
      const heatLayer = layers.find((layer) => layerUsesZoneHeat(layer));
      const pointLayers = layers.filter((layer) => !layerUsesZoneHeat(layer));
      // Point markers (regain diamonds / duel squares) need room outside the touchline.
      const drawW = 640;
      const padX = heatLayer && !pointLayers.length ? 14 : 34;
      const padY = heatLayer && !pointLayers.length ? 14 : 34;
      const { drawH } = oopMapToSvg(0, 0, pitch, drawW, padX, padY);
      const vbW = padX * 2 + drawW;
      const vbH = padY * 2 + drawH;
      const pitchX = padX;
      const pitchY = padY;
      const widthM = pitch.widthM ?? 68;
      const lengthM = pitch.lengthM ?? 105;
      const midY = pitchY + drawH / 2;
      const penDepth = (16.5 / lengthM) * drawH;
      const penWidth = (40.32 / widthM) * drawW;
      const sixDepth = (5.5 / lengthM) * drawH;
      const sixWidth = (18.32 / widthM) * drawW;
      const penX = pitchX + (drawW - penWidth) / 2;
      const sixX = pitchX + (drawW - sixWidth) / 2;

      const heat = heatLayer ? renderOopZoneHeat(heatLayer, pitch, drawW, padX, padY) : "";
      const markers = pointLayers.map((layer) =>
        renderDuelsActivityLayerMarkers(layer, pitch, drawW, padX, padY)
      ).join("");
      // Heat map: quiet grid only (no third name clutter). Event layers keep full labels.
      const zones = renderOopZoneOverlay(pitch, drawW, padX, padY, { labels: !heatLayer });
      const channelHints = (() => {
        if (!heatLayer) return "";
        const leftCh = oopMapToSvg(0, 11, pitch, drawW, padX, padY);
        const rightCh = oopMapToSvg(0, -11, pitch, drawW, padX, padY);
        const midX = pitchX + drawW / 2;
        const tip = (x, text) =>
          `<text x="${x}" y="${pitchY + 14}" text-anchor="middle" fill="rgba(255,255,255,0.7)"
            font-family="Barlow Condensed, sans-serif" font-size="8" font-weight="800" letter-spacing="0.08em">${text}</text>`;
        return `${tip((pitchX + leftCh.x) / 2, "L")}${tip(midX, "C")}${tip((rightCh.x + pitchX + drawW) / 2, "R")}`;
      })();

      const pitchMarkings = heatLayer
        ? `<line x1="${pitchX}" y1="${midY}" x2="${pitchX + drawW}" y2="${midY}" stroke="#fff" stroke-width="0.9" opacity="0.35" />
          <rect x="${penX}" y="${pitchY}" width="${penWidth}" height="${penDepth}" fill="none" stroke="#fff" stroke-width="0.7" opacity="0.35" />
          <rect x="${penX}" y="${pitchY + drawH - penDepth}" width="${penWidth}" height="${penDepth}" fill="none" stroke="#fff" stroke-width="0.7" opacity="0.35" />`
        : `<line x1="${pitchX}" y1="${midY}" x2="${pitchX + drawW}" y2="${midY}" stroke="#fff" stroke-width="1" opacity="0.85" />
          <circle cx="${pitchX + drawW / 2}" cy="${midY}" r="${(9.15 / widthM) * drawW}" fill="none" stroke="#fff" stroke-width="0.9" opacity="0.85" />
          <rect x="${penX}" y="${pitchY}" width="${penWidth}" height="${penDepth}" fill="none" stroke="#fff" stroke-width="0.9" opacity="0.9" />
          <rect x="${sixX}" y="${pitchY}" width="${sixWidth}" height="${sixDepth}" fill="none" stroke="#fff" stroke-width="0.8" opacity="0.8" />
          <rect x="${penX}" y="${pitchY + drawH - penDepth}" width="${penWidth}" height="${penDepth}" fill="none" stroke="#fff" stroke-width="0.9" opacity="0.9" />
          <rect x="${sixX}" y="${pitchY + drawH - sixDepth}" width="${sixWidth}" height="${sixDepth}" fill="none" stroke="#fff" stroke-width="0.8" opacity="0.8" />`;

      return `
        <svg class="duels-map-pitch" viewBox="0 0 ${vbW} ${vbH}" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <rect x="0" y="0" width="${vbW}" height="${vbH}" fill="#3f9f45" />
          <rect x="${pitchX}" y="${pitchY}" width="${drawW}" height="${drawH}" fill="#3f9f45" stroke="#fff" stroke-width="1.4" />
          ${heat}
          ${zones}
          ${pitchMarkings}
          ${channelHints}
          <text x="${pitchX + drawW / 2}" y="${pitchY + 11}" text-anchor="middle" fill="rgba(255,255,255,0.75)"
            font-family="Barlow Condensed, sans-serif" font-size="8" font-weight="800" letter-spacing="0.08em">OPP GOAL</text>
          <text x="${pitchX + drawW / 2}" y="${pitchY + drawH - 5}" text-anchor="middle" fill="rgba(255,255,255,0.75)"
            font-family="Barlow Condensed, sans-serif" font-size="8" font-weight="800" letter-spacing="0.08em">OUR GOAL</text>
          ${markers}
        </svg>`;
    }

    function renderDuelsMapKey(layer) {
      if (layer.id === "duelWin") {
        return `
          <div class="duels-map-key">
            <p class="duels-map-key__title">Key</p>
            <div class="duels-map-key__rows">
              <div class="duels-map-key__row">
                <span class="duels-map-key__mark duels-map-key__mark--square is-ground">MS</span>
                <span class="duels-map-key__label">Ground duel won</span>
              </div>
              <div class="duels-map-key__row">
                <span class="duels-map-key__mark duels-map-key__mark--square is-aerial">MS</span>
                <span class="duels-map-key__label">Aerial duel won</span>
              </div>
            </div>
            <p class="duels-map-key__hint">Initials = who won · nearby markers fan out (dot = true spot)</p>
          </div>`;
      }
      if (layer.id === "defenderRegain") {
        return `
          <div class="duels-map-key">
            <p class="duels-map-key__title">Key</p>
            <div class="duels-map-key__rows">
              <div class="duels-map-key__row">
                <span class="duels-map-key__mark duels-map-key__mark--diamond" aria-hidden="true"></span>
                <span class="duels-map-key__label">Regain vs defender</span>
              </div>
            </div>
            <p class="duels-map-key__hint">Initials = who regained · nearby markers fan out (dot = true spot)</p>
          </div>`;
      }
      if (layer.id === "press") {
        return `
          <div class="duels-map-key">
            <p class="duels-map-key__title">Key</p>
            <div class="duels-map-key__rows">
              <div class="duels-map-key__row">
                <span class="duels-map-key__mark duels-map-key__mark--heat" aria-hidden="true"></span>
                <span class="duels-map-key__label">More pressure → darker</span>
              </div>
            </div>
            <p class="duels-map-key__hint">% = share of all presses</p>
          </div>`;
      }
      return `<p class="duels-map-panel__note">${layer.note || "Attack toward top."}</p>`;
    }

    function shortOopZoneLabel(key) {
      return String(key || "")
        .replace("Attacking third · left", "Att · L")
        .replace("Attacking third · centre", "Att · C")
        .replace("Attacking third · right", "Att · R")
        .replace("Middle third · left", "Mid · L")
        .replace("Middle third · centre", "Mid · C")
        .replace("Middle third · right", "Mid · R")
        .replace("Defensive third · left", "Def · L")
        .replace("Defensive third · centre", "Def · C")
        .replace("Defensive third · right", "Def · R");
    }

    function renderDuelsActivityLayerPanel(layer) {
      const breakdownTitle = layer.breakdownMode === "subtype" ? "By type" : "By zone";
      const playersTitle =
        layer.id === "defenderRegain"
          ? "Who got the regains"
          : layer.id === "duelWin"
            ? "Top duel winners"
            : "Top pressers";
      const breakdownRows =
        layer.breakdownMode === "zone"
          ? buildOopZoneHeatFromLayer(layer).map((cell) => ({
              label: shortOopZoneLabel(cell.key),
              count: cell.count,
              sharePct: cell.sharePct,
            }))
          : (layer.breakdown || []).slice(0, 6);
      const densestShort = layer.densestZone ? shortOopZoneLabel(layer.densestZone) : "";
      const breakdown = breakdownRows
        .map(
          (row) => `<div class="duels-map-breakdown__row">
            <span class="duels-map-breakdown__label">${row.label}</span>
            <span class="duels-map-breakdown__value">${row.count} · ${row.sharePct}%</span>
          </div>`,
        )
        .join("") || `<div class="duels-map-breakdown__row"><span class="duels-map-breakdown__label">No events</span></div>`;
      const players = (layer.topPlayers || [])
        .map(
          (row, index) => `<div class="duels-map-player">
            <span class="duels-map-player__rank">${index + 1}</span>
            <div>
              <div class="duels-map-player__name">${row.playerName}</div>
              ${row.detail ? `<div class="duels-map-player__detail">${row.detail}</div>` : ""}
            </div>
            <span class="duels-map-player__count">${row.count}</span>
          </div>`,
        )
        .join("") || `<div class="duels-map-player"><span class="duels-map-player__name">No players</span></div>`;

      return `
        <aside class="duels-map-panel">
          <h3 class="duels-map-panel__title">${layer.title || layer.label}</h3>
          <div class="duels-map-panel__meta">
            <span class="duels-map-panel__chip">
              ${layer.id === "duelWin"
                ? `<span class="duels-map-summary__swatch" style="background:#facc15"></span><span class="duels-map-summary__swatch" style="background:#38bdf8;margin-left:2px;"></span>`
                : `<span class="duels-map-summary__swatch" style="background:${layer.color}"></span>`}
              ${layer.count} ${layer.label}
            </span>
            ${densestShort ? `<span class="duels-map-panel__chip">Densest · ${densestShort}</span>` : ""}
          </div>
          <p class="duels-map-panel__section-title">${breakdownTitle}</p>
          <div class="duels-map-breakdown">${breakdown}</div>
          <p class="duels-map-panel__section-title">${playersTitle}</p>
          <div class="duels-map-players">${players}</div>
          ${renderDuelsMapKey(layer)}
        </aside>`;
    }

    function renderDuelsActivityMapSlides(report) {
      const data = report.duels;
      const activityMap = data?.activityMap;
      if (!data || !activityMap || !(activityMap.layers || []).length) return "";
      return (activityMap.layers || [])
        .map((layer) => {
          const title = layer.title || layer.label || "Activity Map";
          const mapHtml = layerUsesZoneHeat(layer)
            ? renderOopZoneHeatHtml(layer)
            : renderDuelsActivityMapSvg(activityMap, [layer]);
          return `
            <section class="slide slide--duels slide--duels-map slide--duels-map-detail">
              <div class="prog-keynote">
                <div class="prog-keynote__bar">Out of Possession — ${title}</div>
                <div class="prog-keynote__body">
                  <div class="duels-map-wrap">${mapHtml}</div>
                  ${renderDuelsActivityLayerPanel(layer)}
                </div>
              </div>
            </section>`;
        })
        .join("");
    }

    function renderOutOfPossessionDivideSlide() {
      return `
        <section class="slide slide--divide slide--divide-oop">
          <div class="divide-keynote">
            <div class="divide-keynote__body">
              <p class="divide-keynote__eyebrow">Section</p>
              <div class="divide-keynote__rule" aria-hidden="true"></div>
              <h2 class="divide-keynote__title">Out of Possession</h2>
              <div class="divide-keynote__rule" aria-hidden="true"></div>
            </div>
          </div>
        </section>`;
    }

    function renderSquadCompare(report) {
      const meta = report.meta;
      const focusName = report.focusSide === "home" ? meta.home.name : meta.away.name;
      const opponentName = report.focusSide === "home" ? meta.away.name : meta.home.name;
      const cards = report.squadCompare.map((row) => `
        <div class="kpi-card">
          <span class="kpi-card__label">${row.label}</span>
          <div class="kpi-card__values">
            <div class="kpi-card__team">
              <span class="kpi-card__team-name">${focusName}</span>
              <strong>${fmtNum(row.focus, row.format)}</strong>
            </div>
            <div class="kpi-card__team kpi-card__team--muted">
              <span class="kpi-card__team-name">${opponentName}</span>
              <strong>${fmtNum(row.opponent, row.format)}</strong>
            </div>
          </div>
        </div>`).join("");
      return `
        <section class="slide slide--data">
          <header class="slide__header">
            <h2>Squad comparison</h2>
            <p>Live from Impect · ${focusName} vs ${opponentName}</p>
          </header>
          <div class="kpi-grid">${cards}</div>
        </section>`;
    }

    function renderPlayerBars(report) {
      const bars = report.playerBars;
      const max = Math.max(...bars.players.map((p) => p.value), 1);
      const rows = bars.players.length
        ? bars.players.map((p) => `
            <div class="bar-row">
              <span class="bar-row__name">${p.name}</span>
              <div class="bar-row__track">
                <div class="bar-row__fill" style="width:${(p.value / max) * 100}%"></div>
                <span class="bar-row__value">${p.value}</span>
              </div>
            </div>`).join("")
        : "<p style='color:#9ca3af'>No player data for this metric yet.</p>";
      return `
        <section class="slide slide--data">
          <header class="slide__header">
            <h2>${bars.label}</h2>
            <p>Port Vale player breakdown · Impect match KPIs</p>
          </header>
          <div class="bar-chart">${rows}</div>
        </section>`;
    }

    function setPlayKpiTone(pct, { defending = false, invertWhenDefending = false, higherIsBetter = true } = {}) {
      if (pct == null || Number.isNaN(Number(pct))) return "";
      const value = Number(pct);
      let good = higherIsBetter ? value >= 50 : value <= 50;
      if (defending && invertWhenDefending) good = !good;
      return good ? " set-plays-kpi--good" : " set-plays-kpi--bad";
    }

    function renderSetPlayKpiBox(value, label, { tone = "", sub = "" } = {}) {
      return `
        <div class="set-plays-kpi${tone}">
          <span class="set-plays-kpi__value">${value}</span>
          <span class="set-plays-kpi__label">${label}</span>
          ${sub ? `<span class="set-plays-kpi__sub">${sub}</span>` : ""}
        </div>`;
    }

    function renderSetPlaySummaryChips(summary) {
      if (!summary) return "";
      const defending = Boolean(summary.defending);
      const routines = summary.chains || 0;
      const intoBoxPct = summary.intoBoxPct;
      const contactPct = summary.firstContactWonPct;
      const shotPct = summary.shotPct;
      const xg = Number(summary.shotXg || 0).toFixed(2);
      const contactLabel = defending ? "1st won (us)" : "1st contact won";
      const contested = summary.contested ?? summary.firstContacts ?? 0;

      const intoTone = setPlayKpiTone(intoBoxPct, {
        defending,
        invertWhenDefending: true,
        higherIsBetter: true,
      });
      const contactTone = setPlayKpiTone(contactPct, {
        defending,
        invertWhenDefending: false,
        higherIsBetter: true,
      });
      const shotTone = setPlayKpiTone(shotPct, {
        defending,
        invertWhenDefending: true,
        higherIsBetter: true,
      });

      const boxes = [
        renderSetPlayKpiBox(String(routines), "Routines"),
        renderSetPlayKpiBox(
          intoBoxPct != null ? `${intoBoxPct}%` : "—",
          "Into box",
          {
            tone: intoTone,
            sub: summary.intoBox != null
              ? `${summary.intoBox}/${summary.deliverable ?? routines}`
              : "",
          },
        ),
        renderSetPlayKpiBox(
          contactPct != null ? `${contactPct}%` : "—",
          contactLabel,
          {
            tone: contactTone,
            sub: contested ? `${summary.firstContactWon || 0}/${contested} contested` : "no contest",
          },
        ),
        renderSetPlayKpiBox(
          shotPct != null ? `${shotPct}%` : "—",
          "Shot rate",
          {
            tone: shotTone,
            sub: summary.shotRoutines != null ? `${summary.shotRoutines}/${routines}` : "",
          },
        ),
        renderSetPlayKpiBox(
          xg,
          "xG",
          {
            tone: summary.goals > 0 ? " set-plays-kpi--good" : "",
            sub: summary.goals > 0 ? `${summary.goals} goal${summary.goals === 1 ? "" : "s"}` : `${summary.shots || 0} shots`,
          },
        ),
      ];
      return `<div class="set-plays-summary">${boxes.join("")}</div>`;
    }

    function setPlayFirstContactWon(pointOrContact, defendingFallback = false) {
      if (!pointOrContact) return null;
      if (typeof pointOrContact.won === "boolean") return pointOrContact.won;
      if (typeof pointOrContact.sameTeam !== "boolean") return null;
      const defending = Boolean(pointOrContact.defending ?? defendingFallback);
      return defending ? !pointOrContact.sameTeam : pointOrContact.sameTeam;
    }

    function setPlayMarkerStyle(point) {
      if (point.kind === "take") {
        if (point.deliveryThreat) return { fill: "#fde047", stroke: "#a16207" };
        return { fill: "#cbd5e1", stroke: "#475569" };
      }
      if (point.kind === "delivery") {
        if (point.result === "success") return { fill: "#f8fafc", stroke: "#0f172a" };
        if (point.result === "fail") return { fill: "#fb7185", stroke: "#9f1239" };
        return { fill: "#e2e8f0", stroke: "#64748b" };
      }
      const won = setPlayFirstContactWon(point);
      if (won === true) return { fill: "#38bdf8", stroke: "#0369a1" };
      if (won === false) return { fill: "#fb7185", stroke: "#9f1239" };
      return { fill: "#e2e8f0", stroke: "#64748b" };
    }

    function renderSetPlayPitchSvg(side, pitch) {
      const points = (side && side.mapPoints) || [];
      const fullPitch = Boolean(pitch.fullPitch);
      const drawW = fullPitch ? 320 : 480;
      const padX = 8;
      const padY = 8;
      const { drawH } = crossImpectToSvg(pitch.minX, 0, pitch, drawW);
      const plotH = drawH;
      const vbW = padX * 2 + drawW;
      const vbH = padY + drawH + padY;
      const pitchX = padX;
      const pitchY = padY;
      const plotBottom = pitchY + plotH;
      const midY = pitchY + plotH / 2;
      const penDepth = ((pitch.penaltyBoxDepthM ?? 16.5) / pitch.depthM) * plotH;
      const penWidth = (40.32 / pitch.widthM) * drawW;
      const sixDepth = (5.5 / pitch.depthM) * plotH;
      const sixWidth = (18.32 / pitch.widthM) * drawW;
      const penX = pitchX + (drawW - penWidth) / 2;
      const sixX = pitchX + (drawW - sixWidth) / 2;
      const finalThird = fullPitch
        ? crossImpectToSvg(17.5, 0, pitch, drawW, plotH, pitchY, padX, padY)
        : null;

      const markers = points.map((pt) => {
        const svg = crossImpectToSvg(pt.impectX, pt.impectY, pitch, drawW, plotH, pitchY, padX, padY);
        const colors = setPlayMarkerStyle(pt);
        const isTake = pt.kind === "take";
        const isDelivery = pt.kind === "delivery";
        const r = isTake ? 6.2 : isDelivery ? 5.8 : 5.6;
        const shape = isTake || isDelivery
          ? `<circle cx="${svg.x}" cy="${svg.y}" r="${r}" fill="${colors.fill}" stroke="${colors.stroke}" stroke-width="1.3" />`
          : `<polygon points="${svg.x},${svg.y - r} ${svg.x + r * 0.9},${svg.y} ${svg.x},${svg.y + r} ${svg.x - r * 0.9},${svg.y}" fill="${colors.fill}" stroke="${colors.stroke}" stroke-width="1.2" />`;
        const label = pt.playerInitials
          ? `<text x="${svg.x}" y="${svg.y + 0.35}" text-anchor="middle" dominant-baseline="middle"
              fill="#111" font-family="Barlow Condensed, sans-serif" font-size="${isTake ? 5.8 : 5.4}" font-weight="800">${pt.playerInitials}</text>`
          : "";
        const kindLabel = isTake ? "Take" : isDelivery ? "Delivery" : "First contact";
        return `<g><title>${pt.minuteLabel || ""} ${kindLabel}</title>${shape}${label}</g>`;
      }).join("");

      const ownBox = fullPitch
        ? `<rect x="${penX}" y="${plotBottom - penDepth}" width="${penWidth}" height="${penDepth}" fill="none" stroke="#fff" stroke-width="0.9" opacity="0.9" />
           <rect x="${sixX}" y="${plotBottom - sixDepth}" width="${sixWidth}" height="${sixDepth}" fill="none" stroke="#fff" stroke-width="0.8" opacity="0.8" />
           <line x1="${pitchX}" y1="${midY}" x2="${pitchX + drawW}" y2="${midY}" stroke="#fff" stroke-width="0.9" opacity="0.8" />
           <line x1="${pitchX}" y1="${finalThird.y}" x2="${pitchX + drawW}" y2="${finalThird.y}" stroke="rgba(255,255,255,0.55)" stroke-width="1" stroke-dasharray="4 3" />
           <text x="${pitchX + drawW / 2}" y="${pitchY + 10}" text-anchor="middle" fill="rgba(255,255,255,0.7)"
             font-family="Barlow Condensed, sans-serif" font-size="7" font-weight="800">OPP GOAL</text>
           <text x="${pitchX + drawW / 2}" y="${plotBottom - 4}" text-anchor="middle" fill="rgba(255,255,255,0.7)"
             font-family="Barlow Condensed, sans-serif" font-size="7" font-weight="800">OUR GOAL</text>`
        : `<line x1="${pitchX}" y1="${plotBottom}" x2="${pitchX + drawW}" y2="${plotBottom}" stroke="#fff" stroke-width="0.8" opacity="0.75" />`;

      return `
        <svg class="set-plays-pitch" viewBox="0 0 ${vbW} ${vbH}" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <rect x="${pitchX}" y="${pitchY}" width="${drawW}" height="${drawH}" fill="#3f9f45" stroke="#fff" stroke-width="1.2" />
          <rect x="${penX}" y="${pitchY}" width="${penWidth}" height="${penDepth}" fill="none" stroke="#fff" stroke-width="0.9" opacity="0.9" />
          <rect x="${sixX}" y="${pitchY}" width="${sixWidth}" height="${sixDepth}" fill="none" stroke="#fff" stroke-width="0.8" opacity="0.8" />
          ${ownBox}
          ${markers}
        </svg>`;
    }

    function renderSetPlayChainsTable(chains, { defending = false } = {}) {
      if (!chains || !chains.length) {
        return `<div class="set-plays-table-wrap set-plays-table-wrap--sparse" style="--set-play-rows:1"><table class="set-plays-table"><tbody><tr><td>No set play chains recorded.</td></tr></tbody></table></div>`;
      }
      const rows = chains.map((chain) => {
        const deliveryClass = chain.deliveryResult === "success"
          ? "set-plays-table__won"
          : chain.deliveryResult === "fail"
            ? "set-plays-table__lost"
            : "";
        const fc = chain.firstContact;
        const won = setPlayFirstContactWon(fc, defending);
        const fcText = fc
          ? `${fc.playerName || fc.playerInitials || "—"}${won === true ? " ✓" : won === false ? " ✗" : ""}`
          : "—";
        const fcClass = won === true
          ? "set-plays-table__won"
          : won === false
            ? "set-plays-table__lost"
            : "";
        return `<tr>
          <td>${chain.minuteLabel}</td>
          <td>${chain.typeLabel}</td>
          <td>${chain.delivererName || chain.delivererInitials || "—"}</td>
          <td class="${deliveryClass}">${chain.deliveryResult || "—"}</td>
          <td class="${fcClass}">${fcText}</td>
          <td>${chain.outcome || "—"}</td>
        </tr>`;
      }).join("");
      const sparse = chains.length <= 5 ? " set-plays-table-wrap--sparse" : "";
      return `<div class="set-plays-table-wrap${sparse}" style="--set-play-rows:${Math.max(1, chains.length)}">
        <table class="set-plays-table">
          <thead>
            <tr>
              <th>Min</th>
              <th>Type</th>
              <th>Deliverer</th>
              <th>Del.</th>
              <th>1st contact</th>
              <th>Outcome</th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      </div>`;
    }

    function renderSetPlayPanel(side, title, pitch, { solo = false, against = false, freeKicks = false } = {}) {
      if (!side) return "";
      const defending = Boolean(against || side.defending || side.summary?.defending);
      const routines = Number(side.summary?.chains ?? side.chains?.length ?? 0);
      const mapPoints = side.mapPoints || [];
      const empty = routines <= 0 && mapPoints.length === 0;
      const contactWonLabel = defending ? "1st contact won (us)" : "1st contact won";
      const contactLostLabel = defending ? "1st contact lost (them)" : "1st contact lost";
      const scope = side.summary?.scopeNote
        ? `<p class="set-plays-scope">${side.summary.scopeNote}</p>`
        : freeKicks
          ? `<p class="set-plays-scope">Final-third free kicks only (deep/recycle restarts excluded).</p>`
          : "";
      if (empty && !solo) {
        const emptyLabel = freeKicks
          ? "No free kicks from this side"
          : "No corners from this side";
        return `
          <div class="set-plays-panel set-plays-panel--empty">
            <div class="set-plays-panel__title">${title}</div>
            ${renderSetPlaySummaryChips(side.summary)}
            ${scope}
            <div class="set-plays-empty"><p class="set-plays-empty__msg">${emptyLabel}</p></div>
          </div>`;
      }
      const legend = freeKicks
        ? `
          <span class="set-plays-legend__item"><span style="display:inline-block;width:8px;height:8px;border-radius:999px;background:#fde047;"></span> Take</span>
          <span class="set-plays-legend__item"><span style="display:inline-block;width:8px;height:8px;border-radius:999px;background:#f8fafc;border:1px solid #0f172a;"></span> Delivery end</span>
          <span class="set-plays-legend__item"><span style="display:inline-block;width:7px;height:7px;background:#38bdf8;transform:rotate(45deg);"></span> ${contactWonLabel}</span>
          <span class="set-plays-legend__item"><span style="display:inline-block;width:7px;height:7px;background:#fb7185;transform:rotate(45deg);"></span> ${contactLostLabel}</span>`
        : `
          <span class="set-plays-legend__item"><span style="display:inline-block;width:8px;height:8px;border-radius:999px;background:#f8fafc;border:1px solid #0f172a;"></span> Delivery success</span>
          <span class="set-plays-legend__item"><span style="display:inline-block;width:8px;height:8px;border-radius:999px;background:#fb7185;"></span> Delivery fail</span>
          <span class="set-plays-legend__item"><span style="display:inline-block;width:7px;height:7px;background:#38bdf8;transform:rotate(45deg);"></span> ${contactWonLabel}</span>
          <span class="set-plays-legend__item"><span style="display:inline-block;width:7px;height:7px;background:#fb7185;transform:rotate(45deg);"></span> ${contactLostLabel}</span>`;
      const table = freeKicks
        ? ""
        : renderSetPlayChainsTable(side.chains, { defending });
      return `
        <div class="set-plays-panel${solo ? " set-plays-panel--solo" : ""}">
          <div class="set-plays-panel__title">${title}</div>
          ${renderSetPlaySummaryChips(side.summary)}
          ${scope}
          <div class="set-plays-pitch-wrap">${renderSetPlayPitchSvg(side, pitch)}</div>
          <div class="set-plays-legend">${legend}</div>
          ${table}
        </div>`;
    }

    function renderSetPlaysDivideSlide() {
      return `
        <section class="slide slide--divide slide--divide-set-plays">
          <div class="divide-keynote">
            <div class="divide-keynote__body">
              <p class="divide-keynote__eyebrow">Section</p>
              <div class="divide-keynote__rule" aria-hidden="true"></div>
              <h2 class="divide-keynote__title">Set Plays</h2>
              <div class="divide-keynote__rule" aria-hidden="true"></div>
            </div>
          </div>
        </section>`;
    }

    function renderSetPlayKeynoteSlide(barTitle, panelsHtml, { metricsHtml = "" } = {}) {
      return `
        <section class="slide slide--data slide--set-plays">
          <div class="set-plays-keynote">
            <div class="set-plays-keynote__bar">${barTitle}</div>
            <div class="set-plays-keynote__body">
              ${panelsHtml}
              ${metricsHtml}
            </div>
          </div>
        </section>`;

    function renderCornersSlide(report, { against = false } = {}) {
      const data = report.setPlays;
      if (!data) return "";
      const opponent = data.opponentLabel || "Opponent";
      const corners = against ? data.cornersAgainst : data.cornersFor;
      if (!corners) return "";
      const left = corners.left || { summary: {}, chains: [], mapPoints: [] };
      const right = corners.right || { summary: {}, chains: [], mapPoints: [] };
      const barTitle = against
        ? `Corners Against — ${opponent}`
        : "Corners For";
      const leftTitle = against ? "Left side against" : "Left side";
      const rightTitle = against ? "Right side against" : "Right side";
      const panels = `
        <div class="set-plays-panels">
          ${renderSetPlayPanel(left, leftTitle, data.pitch, { against })}
          ${renderSetPlayPanel(right, rightTitle, data.pitch, { against })}
        </div>`;
      return renderSetPlayKeynoteSlide(barTitle, panels);
    }

    function renderFreeKicksSlide(report, { against = false } = {}) {
      const data = report.setPlays;
      if (!data) return "";
      const opponent = data.opponentLabel || "Opponent";
      const side = against ? data.freeKicksAgainst : data.freeKicksFor;
      if (!side) return "";
      const pitch = data.pitch;
      const barTitle = against
        ? `Free Kicks Against — ${opponent}`
        : "Free Kicks For";
      const panelTitle = against
        ? `Free kicks against (${opponent}) · final third`
        : "Our free kicks · final third";
      const panels = `
        <div class="set-plays-panels set-plays-panels--solo">
          ${renderSetPlayPanel(side, panelTitle, pitch, { solo: true, against, freeKicks: true })}
        </div>`;
      return renderSetPlayKeynoteSlide(barTitle, panels);
    }

    function renderSetPlayMetricsSlide(report) {
      const data = report.setPlays;
      if (!data || !(data.teamMetrics || []).length) return "";
      const leagueSize = data.leagueSize || 24;
      const teamRows = renderProgTeamMetricRows(data.teamMetrics, leagueSize);
      const metrics = `
        <div class="set-plays-metrics">
          <table class="prog-table">
            <thead>
              <tr>
                <th>Set play KPI</th>
                <th>7 Game Avg</th>
                <th>Top 7 Avg</th>
                <th>This match</th>
              </tr>
            </thead>
            <tbody>${teamRows}</tbody>
          </table>

      return renderSetPlayKeynoteSlide("Set Play KPIs", metrics);
    }

    function renderSetPlaysSlides(report) {
      return (
        renderSetPlaysDivideSlide() +
        renderSetPlayMetricsSlide(report) +
        renderCornersSlide(report, { against: false }) +
        renderCornersSlide(report, { against: true }) +

        <section class="slide slide--placeholder">

          <ul>
            <li>Set pieces breakdown</li>
          </ul>
        </section>`;
    }

    async function rasterizeExportSvgs(slide) {
      const targets = [
        ...[...slide.querySelectorAll("svg.duels-map-pitch")].map((svg) => ({
          svg,
          rasterClass: "duels-map-pitch duels-map-pitch--raster",
          wrapSel: ".duels-map-wrap",
          fit: "contain-height",
        })),
        ...[...slide.querySelectorAll("svg.touch-map__svg")].map((svg) => ({
          svg,
          rasterClass: "touch-map__svg touch-map__svg--raster",
          wrapSel: ".touch-map",
          fit: "contain-width",
        })),
      ];
      const restores = [];
      for (const { svg, rasterClass, wrapSel, fit } of targets) {
        const vb = svg.viewBox?.baseVal;
        const vbW = Math.max(1, vb?.width || svg.clientWidth || 544);
        const vbH = Math.max(1, vb?.height || svg.clientHeight || 840);
        const wrap = svg.closest(wrapSel);
        let outW;
        let outH;
        if (fit === "contain-width") {
          const targetW = Math.max(280, wrap?.clientWidth || svg.clientWidth || 640);
          outW = Math.round(targetW);
          outH = Math.round((vbH / vbW) * outW);
        } else {
          const targetH = Math.max(320, wrap?.clientHeight || svg.clientHeight || 900);
          outH = Math.round(targetH);
          outW = Math.round((vbW / vbH) * outH);
        }
        const clone = svg.cloneNode(true);
        clone.setAttribute("width", String(vbW));
        clone.setAttribute("height", String(vbH));
        clone.removeAttribute("class");
        const xml = new XMLSerializer().serializeToString(clone);
        const url = `data:image/svg+xml;charset=utf-8,${encodeURIComponent(xml)}`;
        const img = new Image();
        img.decoding = "sync";
        try {
          await new Promise((resolve, reject) => {
            img.onload = () => resolve();
            img.onerror = () => reject(new Error("SVG rasterize failed"));
            img.src = url;
          });
        } catch {
          continue;
        }
        const canvas = document.createElement("canvas");
        const scale = 2;
        canvas.width = Math.max(1, outW * scale);
        canvas.height = Math.max(1, outH * scale);
        const ctx = canvas.getContext("2d");
        if (!ctx) continue;
        ctx.imageSmoothingEnabled = true;
        ctx.imageSmoothingQuality = "high";
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        const raster = document.createElement("img");
        raster.className = rasterClass;
        raster.alt = "";
        raster.src = canvas.toDataURL("image/png");
        if (fit === "contain-width") {
          raster.style.width = "100%";
          raster.style.height = "auto";
          raster.style.maxWidth = "100%";
          raster.style.display = "block";
        } else {
          raster.style.height = "100%";
          raster.style.width = "auto";
          raster.style.maxHeight = "100%";
          raster.style.display = "block";
          raster.style.margin = "0 auto";
        }
        svg.replaceWith(raster);
        restores.push(() => {
          if (raster.parentNode) raster.replaceWith(svg);
        });
      }
      return () => {
        for (const restore of restores.reverse()) restore();
      };
    }

    async function waitForPaint() {
      await new Promise((resolve) => requestAnimationFrame(() => requestAnimationFrame(resolve)));
    }

    function fitProgressionTablesForExport(slide) {
      if (!slide.classList.contains("slide--progression")) return () => {};
      const body = slide.querySelector(".prog-keynote__body");
      const playerWrap = body?.querySelector(":scope > div");
      const playerTable = playerWrap?.querySelector(".prog-player-table");
      if (!body || !playerWrap || !playerTable) return () => {};

      const prev = {
        transform: playerWrap.style.transform,
        transformOrigin: playerWrap.style.transformOrigin,
        width: playerWrap.style.width,
      };
      playerWrap.style.transformOrigin = "top left";
      playerWrap.style.transform = "";
      playerWrap.style.width = "";

      const available = body.clientHeight;
      const needed = playerWrap.scrollHeight;
      if (available > 0 && needed > available + 2) {
        const scale = Math.max(0.72, Math.min(1, available / needed));
        playerWrap.style.transform = `scale(${scale})`;
        playerWrap.style.width = `${100 / scale}%`;
      }

      return () => {
        playerWrap.style.transform = prev.transform;
        playerWrap.style.transformOrigin = prev.transformOrigin;
        playerWrap.style.width = prev.width;
      };
    }

    function injectExportFooter(slide, pageNum, totalPages) {
      slide.querySelectorAll(".slide-export-footer").forEach((node) => node.remove());
      const footer = document.createElement("div");
      footer.className = "slide-export-footer";
      footer.textContent = `Port Vale FC  ·  ${exportDocumentTitle()}  ·  Page ${pageNum} of ${totalPages}`;
      slide.appendChild(footer);
      return () => {
        footer.remove();
      };
    }

    async function prepareSlideForExport(slide, { pageNum = 1, totalPages = 1 } = {}) {
      const prev = {
        width: slide.style.width,
        maxWidth: slide.style.maxWidth,
        height: slide.style.height,
        maxHeight: slide.style.maxHeight,
        minHeight: slide.style.minHeight,
        overflow: slide.style.overflow,
      };
      slide.classList.add("slide--pdf-capture");
      slide.style.width = `${SLIDE_EXPORT_WIDTH}px`;
      slide.style.maxWidth = `${SLIDE_EXPORT_WIDTH}px`;
      slide.style.height = `${SLIDE_EXPORT_HEIGHT}px`;
      slide.style.maxHeight = `${SLIDE_EXPORT_HEIGHT}px`;
      slide.style.minHeight = `${SLIDE_EXPORT_HEIGHT}px`;
      slide.style.overflow = "hidden";
      const restoreFooter = injectExportFooter(slide, pageNum, totalPages);
      let chartFontPrev = null;
      if (xgRaceChartInstance && slide.classList.contains("slide--overview")) {
        const opts = xgRaceChartInstance.options;
        chartFontPrev = {
          xSize: opts.scales?.x?.ticks?.font?.size,
          ySize: opts.scales?.y?.ticks?.font?.size,
          titleSize: opts.scales?.x?.title?.font?.size,
        };
        if (opts.scales?.x?.ticks?.font) opts.scales.x.ticks.font.size = 16;
        if (opts.scales?.y?.ticks?.font) opts.scales.y.ticks.font.size = 16;
        if (opts.scales?.x?.title?.font) opts.scales.x.title.font.size = 16;
        if (opts.scales?.x?.ticks) opts.scales.x.ticks.color = "#0f172a";
        if (opts.scales?.y?.ticks) opts.scales.y.ticks.color = "#0f172a";
        xgRaceChartInstance.update("none");
        xgRaceChartInstance.resize();
      }
      await waitForImages(slide);
      await waitForPaint();
      const restoreMaps = await rasterizeExportSvgs(slide);
      await waitForImages(slide);
      await waitForPaint();
      const restoreFit = fitProgressionTablesForExport(slide);
      await waitForPaint();
      return () => {
        restoreFit();
        restoreMaps();
        restoreFooter();
        slide.classList.remove("slide--pdf-capture");
        slide.style.width = prev.width;
        slide.style.maxWidth = prev.maxWidth;
        slide.style.height = prev.height;
        slide.style.maxHeight = prev.maxHeight;
        slide.style.minHeight = prev.minHeight;
        slide.style.overflow = prev.overflow;
        if (xgRaceChartInstance && slide.classList.contains("slide--overview")) {
          if (chartFontPrev) {
            const opts = xgRaceChartInstance.options;
            if (opts.scales?.x?.ticks?.font) opts.scales.x.ticks.font.size = chartFontPrev.xSize;
            if (opts.scales?.y?.ticks?.font) opts.scales.y.ticks.font.size = chartFontPrev.ySize;
            if (opts.scales?.x?.title?.font) opts.scales.x.title.font.size = chartFontPrev.titleSize;
            if (opts.scales?.x?.ticks) opts.scales.x.ticks.color = "#334155";
            if (opts.scales?.y?.ticks) opts.scales.y.ticks.color = "#334155";
            xgRaceChartInstance.update("none");
          }
          xgRaceChartInstance.resize();
        }
      };
    }

    async function waitForImages(root) {
      const images = root.querySelectorAll("img");
      await Promise.all(
        [...images].map((image) => {
          if (image.complete) return Promise.resolve();
          return new Promise((resolve) => {
            image.onload = () => resolve();
            image.onerror = () => resolve();
          });
        }),
      );
    }

    function slideExportBackground(slide) {
      if (slide.classList.contains("slide--title")) return "#eceff3";
      if (slide.classList.contains("slide--data")) return "#0c0c0c";
      if (slide.classList.contains("slide--overview")) return "#0c0c0c";
      if (slide.classList.contains("slide--touch")) return "#0c0c0c";
      if (slide.classList.contains("slide--tilt")) return "#0c0c0c";
      if (slide.classList.contains("slide--crosses")) return "#eef2f6";
      if (slide.classList.contains("slide--crosses-oop")) return "#eef2f6";
      if (slide.classList.contains("slide--shots")) return "#eef2f6";
      if (slide.classList.contains("slide--shots-oop")) return "#eef2f6";
      if (slide.classList.contains("slide--divide")) return "#eef2f6";
      if (slide.classList.contains("slide--progression")) return "#eef2f6";
      if (slide.classList.contains("slide--duels")) return "#eef2f6";
      if (slide.classList.contains("slide--duels-map")) return "#eef2f6";
      if (slide.classList.contains("slide--set-plays")) return "#0c0c0c";
      return "#0c0c0c";
    }

    async function captureSlideCanvas(slide) {
      return html2canvas(slide, {
        backgroundColor: slideExportBackground(slide),
        scale: EXPORT_SCALE,
        useCORS: true,
        logging: false,
        width: SLIDE_EXPORT_WIDTH,
        height: SLIDE_EXPORT_HEIGHT,
        windowWidth: SLIDE_EXPORT_WIDTH,
        windowHeight: SLIDE_EXPORT_HEIGHT,
        scrollX: 0,
        scrollY: -window.scrollY,
        onclone: (_doc, clonedSlide) => applyPdfCaptureStyles(clonedSlide),
      });
    }

    async function canvasToWhatsAppPageBlob(canvas) {
      let source = canvas;
      if (canvas.width > WHATSAPP_PDF_MAX_WIDTH) {
        const scale = WHATSAPP_PDF_MAX_WIDTH / canvas.width;
        const shrink = document.createElement("canvas");
        shrink.width = Math.round(canvas.width * scale);
        shrink.height = Math.round(canvas.height * scale);
        const ctx = shrink.getContext("2d");
        if (!ctx) throw new Error("Could not resize slide for WhatsApp PDF");
        ctx.imageSmoothingEnabled = true;
        ctx.imageSmoothingQuality = "high";
        ctx.drawImage(canvas, 0, 0, shrink.width, shrink.height);
        source = shrink;
      }
      const blob = await new Promise((resolve) =>
        source.toBlob(resolve, "image/jpeg", WHATSAPP_PDF_JPEG_QUALITY),
      );
      if (!blob) throw new Error("Failed to encode WhatsApp slide");
      return blob;
    }

    function slideExportFileStem() {
      const matchId = document.getElementById("matchId")?.value || "match";
      return `port-vale-post-match-${matchId}`;
    }

    function setExportButtonsDisabled(disabled) {
      const pdfBtn = document.getElementById("exportPdfBtn");
      const pngBtn = document.getElementById("exportPngBtn");
      if (pdfBtn) pdfBtn.disabled = disabled;
      if (pngBtn) pngBtn.disabled = disabled;
    }

    async function exportPdf() {
      if (typeof html2canvas !== "function") {
        setBanner("PDF export unavailable — reload the page.", "error");
        return;
      }
      const deck = document.querySelector(".deck");
      const slides = [...document.querySelectorAll(".deck .slide:not(.slide--placeholder)")];
      if (!slides.length) {
        setBanner("Load a report before exporting.", "error");
        return;
      }

      setExportButtonsDisabled(true);
      deck?.classList.add("deck--exporting");
      setBanner("Building WhatsApp PDF (1920×1080)…", "loading");
      try {
        const form = new FormData();
        form.append("document_title", exportDocumentTitle());
        for (let i = 0; i < slides.length; i += 1) {
          const slide = slides[i];
          setBanner(`Capturing slides… ${i + 1}/${slides.length}`, "loading");
          const restoreSlide = await prepareSlideForExport(slide, {
            pageNum: i + 1,
            totalPages: slides.length,
          });
          try {
            const canvas = await captureSlideCanvas(slide);
            const blob = await canvasToWhatsAppPageBlob(canvas);
            const page = String(i + 1).padStart(2, "0");
            form.append("pages", blob, `page-${page}.jpg`);
          } finally {
            restoreSlide();
          }
        }

        setBanner("Joining pages into one PDF…", "loading");
        const response = await fetch("/api/post-match/export-pdf-pages", {
          method: "POST",
          body: form,
        });
        if (!response.ok) throw new Error(await response.text());
        const blob = await response.blob();
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url;
        link.download = `${slideExportFileStem()}.pdf`;
        link.click();
        URL.revokeObjectURL(url);
        setBanner(`WhatsApp PDF ready (${(blob.size / (1024 * 1024)).toFixed(1)} MB)`);
        setTimeout(() => setBanner(""), 4000);
      } catch (err) {
        setBanner(err.message || "PDF export failed", "error");
      } finally {
        deck?.classList.remove("deck--exporting");
        setExportButtonsDisabled(false);
      }
    }

    async function exportPngs() {
      if (typeof html2canvas !== "function") {
        setBanner("PNG export unavailable — reload the page.", "error");
        return;
      }
      if (typeof JSZip !== "function") {
        setBanner("PNG zip unavailable — reload the page.", "error");
        return;
      }
      const deck = document.querySelector(".deck");
      const slides = [...document.querySelectorAll(".deck .slide:not(.slide--placeholder)")];
      if (!slides.length) {
        setBanner("Load a report before exporting.", "error");
        return;
      }

      setExportButtonsDisabled(true);
      deck?.classList.add("deck--exporting");
      setBanner("Building PNGs…", "loading");
      try {
        const zip = new JSZip();
        const folder = zip.folder(slideExportFileStem());
        for (let i = 0; i < slides.length; i += 1) {
          const slide = slides[i];
          setBanner(`Building PNGs… ${i + 1}/${slides.length}`, "loading");
          const restoreSlide = await prepareSlideForExport(slide, {
            pageNum: i + 1,
            totalPages: slides.length,
          });
          try {
            const canvas = await captureSlideCanvas(slide);
            const blob = await new Promise((resolve) => canvas.toBlob(resolve, "image/png"));
            if (!blob) throw new Error("Failed to encode PNG");
            const page = String(i + 1).padStart(2, "0");
            folder.file(`page-${page}.png`, blob);
          } finally {
            restoreSlide();
          }
        }
        const zipBlob = await zip.generateAsync({ type: "blob" });
        const url = URL.createObjectURL(zipBlob);
        const link = document.createElement("a");
        link.href = url;
        link.download = `${slideExportFileStem()}-pngs.zip`;
        link.click();
        URL.revokeObjectURL(url);
        setBanner("");
      } catch (err) {
        setBanner(err.message || "PNG export failed", "error");
      } finally {
        deck?.classList.remove("deck--exporting");
        setExportButtonsDisabled(false);
      }
    }

    async function loadReport() {
      const matchId = Number(document.getElementById("matchId").value);
      const btn = document.getElementById("refreshBtn");
      btn.disabled = true;
      setBanner("Pulling live Impect data…", "loading");
      try {
        if (!config) {
          config = await fetch("/api/post-match/config").then((r) => r.json());
          if (!document.getElementById("matchId").value) {
            document.getElementById("matchId").value = config.defaultMatchId;
          }
          const season = await fetch(
            `/api/post-match/iterations/${config.defaultIterationId}/matches?squad_id=${config.portValeSquadId}`,
          ).then(async (r) => {
            if (!r.ok) throw new Error(await r.text());
            return r.json();
          });
          seasonMatches = season.matches || [];
        }
        renderMatchBar(matchId);
        const report = await fetch(
          `/api/post-match/match/${matchId}/report?squad_id=${config.portValeSquadId}`,
        ).then(async (r) => {
          if (!r.ok) throw new Error(await r.text());
          return r.json();
        });
        setBanner("");
        document.getElementById("deck").innerHTML =
          renderTitle(report) +
          renderOverviewSlide(report) +
          renderFieldTiltSlide(report) +
          renderOffensiveTouchesSlide(report) +
          renderBallProgressionSlide(report) +
          renderExpectedThreatSlide(report) +
          renderCrossesSlide(report) +
          renderShotsSlide(report) +
          renderOutOfPossessionDivideSlide() +
          renderOpponentCrossesSlide(report) +
          renderShotsAgainstSlide(report) +
          renderDuelsSlide(report) +
          renderDuelsActivityMapSlides(report) +
          renderSetPlaysSlides(report);
        drawXgRaceChart(report, "xgRaceChartOverview");
      } catch (err) {
        setBanner(err.message || "Failed to load report", "error");
      } finally {
        btn.disabled = false;
        btn.textContent = "Refresh";
      }
    }

    async function initApp() {
      try {
        config = await fetch("/api/post-match/config").then((r) => r.json());
        document.getElementById("matchId").value = config.defaultMatchId;
        const season = await fetch(
          `/api/post-match/iterations/${config.defaultIterationId}/matches?squad_id=${config.portValeSquadId}`,
        ).then(async (r) => {
          if (!r.ok) throw new Error(await r.text());
          return r.json();
        });
        seasonMatches = season.matches || [];
      } catch (err) {
        setBanner(err.message || "Failed to load season matches", "error");
      }
      await loadReport();
    }

    document.getElementById("refreshBtn").addEventListener("click", loadReport);
    document.getElementById("exportPdfBtn").addEventListener("click", exportPdf);
    document.getElementById("exportPngBtn").addEventListener("click", exportPngs);
    initApp();
  </script>
</body>
</html>
