<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign in · Port Vale Analysis Hub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap"
    rel="stylesheet"
  />
  <style>
    :root {
      --bg: #0c0f14;
      --surface: #141a22;
      --surface-2: #1a222d;
      --border: #2a3544;
      --text: #e8edf4;
      --text-muted: #8b9bb0;
      --accent: #3d8bfd;
      --accent-hover: #5a9dff;
      --green: #34d399;
      --danger: #f87171;
      --radius: 12px;
      --font: "DM Sans", system-ui, sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 50% at 50% -20%, rgba(61, 139, 253, 0.18), transparent),
        radial-gradient(ellipse 60% 40% at 100% 100%, rgba(52, 211, 153, 0.06), transparent);
      pointer-events: none;
    }

    .login {
      position: relative;
      width: 100%;
      max-width: 420px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: calc(var(--radius) + 4px);
      padding: 2rem 2rem 1.75rem;
      box-shadow: 0 24px 48px rgba(0, 0, 0, 0.35);
    }

    .login__brand {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      margin-bottom: 1.75rem;
    }

    .login__badge {
      width: 4rem;
      height: auto;
      margin-bottom: 1rem;
      filter: drop-shadow(0 4px 14px rgba(0, 0, 0, 0.4));
    }

    .login__club {
      font-size: 0.8125rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    .login__title {
      margin: 0.35rem 0 0;
      font-size: 1.5rem;
      font-weight: 600;
      letter-spacing: -0.02em;
    }

    .login__subtitle {
      margin: 0.5rem 0 0;
      font-size: 0.9375rem;
      color: var(--text-muted);
    }

    .login__field {
      margin-bottom: 1rem;
    }

    .login__label {
      display: block;
      margin-bottom: 0.4rem;
      font-size: 0.8125rem;
      font-weight: 600;
      color: var(--text-muted);
    }

    .login__input {
      width: 100%;
      padding: 0.75rem 0.9rem;
      font: inherit;
      font-size: 1rem;
      color: var(--text);
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    .login__input:focus {
      border-color: rgba(61, 139, 253, 0.6);
      box-shadow: 0 0 0 3px rgba(61, 139, 253, 0.15);
    }

    .login__error {
      display: none;
      margin-bottom: 1rem;
      padding: 0.65rem 0.85rem;
      font-size: 0.875rem;
      color: var(--danger);
      background: rgba(248, 113, 113, 0.1);
      border: 1px solid rgba(248, 113, 113, 0.25);
      border-radius: var(--radius);
    }

    .login__error--visible {
      display: block;
    }

    .login__submit {
      width: 100%;
      margin-top: 0.25rem;
      padding: 0.85rem 1rem;
      font: inherit;
      font-size: 1rem;
      font-weight: 600;
      color: #fff;
      background: var(--accent);
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }

    .login__submit:hover:not(:disabled) {
      background: var(--accent-hover);
    }

    .login__submit:active:not(:disabled) {
      transform: scale(0.99);
    }

    .login__submit:disabled {
      opacity: 0.65;
      cursor: wait;
    }

    .login__footer {
      margin-top: 1.25rem;
      text-align: center;
      font-size: 0.8125rem;
      color: var(--text-muted);
    }
  </style>
</head>
<body>
  <main class="login">
    <div class="login__brand">
      <img class="login__badge" src="/standalone/port-vale-badge.png?v=2" width="64" height="78" alt="Port Vale FC crest" />
      <div class="login__club">Port Vale FC</div>
      <h1 class="login__title">Analysis Hub</h1>
      <p class="login__subtitle">Sign in to access the tools</p>
    </div>

    <div class="login__error" id="loginError" role="alert"></div>

    <form id="loginForm" novalidate>
      <div class="login__field">
        <label class="login__label" for="username">Username</label>
        <input class="login__input" id="username" name="username" type="text" autocomplete="username" placeholder="PortVale" required autofocus />
      </div>
      <div class="login__field">
        <label class="login__label" for="password">Password</label>
        <input class="login__input" id="password" name="password" type="password" autocomplete="current-password" required />
      </div>
      <button class="login__submit" type="submit" id="submitBtn">Sign in</button>
    </form>

    <p class="login__footer">For Port Vale staff use only</p>
  </main>

  <script>
    const form = document.getElementById("loginForm");
    const errorEl = document.getElementById("loginError");
    const submitBtn = document.getElementById("submitBtn");
    const params = new URLSearchParams(window.location.search);
    const nextUrl = params.get("next") || "/";

    function showError(message) {
      errorEl.textContent = message;
      errorEl.classList.add("login__error--visible");
    }

    function clearError() {
      errorEl.textContent = "";
      errorEl.classList.remove("login__error--visible");
    }

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      clearError();

      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value;
      if (!username || !password) {
        showError("Enter your username and password.");
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = "Signing in…";

      try {
        const loginUrl = `/api/auth/login?next=${encodeURIComponent(nextUrl)}`;
        const res = await fetch(loginUrl, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username, password }),
        });

        if (res.ok) {
          const data = await res.json();
          window.location.href = data.redirect || nextUrl;
          return;
        }

        let detail = "Invalid username or password.";
        try {
          const data = await res.json();
          if (data.detail) detail = typeof data.detail === "string" ? data.detail : detail;
        } catch (_) {
          /* ignore */
        }
        showError(detail);
      } catch (_) {
        showError("Could not reach the server. Try again.");
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = "Sign in";
      }
    });
  </script>
</body>
</html>
