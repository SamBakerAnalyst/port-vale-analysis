<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>League Two Strategy Report</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700;800&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&display=swap" media="print" onload="this.media='all'" />
  <noscript>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700;800&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&display=swap" />
  </noscript>
  <style>
    :root {
      --pv-gold: #f5c518;
      --pv-muted: #9ca3af;
      --slide-width: min(1100px, 100%);
      --slide-height: calc(var(--slide-width) * 9 / 16);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "DM Sans", system-ui, sans-serif;
      background: #0a0a0a;
      color: #f5f5f5;
    }
    .app { padding: 1.25rem 1.5rem 2.5rem; }
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      align-items: flex-end;
      justify-content: space-between;
      gap: 1rem;
      margin-bottom: 1.25rem;
    }
    .toolbar__eyebrow {
      margin: 0;
      font-size: 0.75rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--pv-gold);
      font-weight: 600;
    }
    .toolbar__title {
      margin: 0.15rem 0 0;
      font-family: "Barlow Condensed", sans-serif;
      font-size: 1.75rem;
      font-weight: 700;
    }
    .toolbar__meta {
      font-size: 0.8rem;
      color: var(--pv-muted);
      text-align: right;
    }
    .toolbar__right {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 0.65rem;
    }
    .toolbar__actions {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 0.35rem;
    }
    .toolbar__buttons {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 0.5rem;
    }
    .toolbar__btn {
      font-family: "Barlow Condensed", sans-serif;
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 0.45rem 0.9rem;
      border-radius: 6px;
      border: 1px solid rgba(245, 197, 24, 0.45);
      background: transparent;
      color: #f5f5f5;
      cursor: pointer;
      transition: background 0.15s ease, color 0.15s ease, border-color 0.15s ease;
    }
    .toolbar__btn:hover:not(:disabled) {
      background: rgba(245, 197, 24, 0.12);
      border-color: var(--pv-gold);
    }
    .toolbar__btn--primary {
      background: var(--pv-gold);
      color: #111;
      border-color: var(--pv-gold);
    }
    .toolbar__btn--primary:hover:not(:disabled) {
      background: #ffd84d;
      border-color: #ffd84d;
    }
    .toolbar__btn:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }
    .toolbar__export-status {
      min-height: 1rem;
      font-size: 0.72rem;
      color: var(--pv-muted);
      text-align: right;
      max-width: 22rem;
      line-height: 1.35;
    }
    .toolbar__export-status--loading { color: #fbbf24; }
    .toolbar__export-status--success { color: #86efac; }
    .toolbar__export-status--error { color: #fca5a5; }
    #export-overlay {
      position: fixed;
      inset: 0;
      z-index: 100000;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(10, 10, 10, 0.82);
      color: #f5f5f5;
      font-family: "Barlow Condensed", sans-serif;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      pointer-events: all;
    }
    #export-overlay.is-active { display: flex; }
    #export-stage { display: none; }
    .deck { display: flex; flex-direction: column; gap: 0; }
    .deck--loading {
      min-height: 12rem;
      align-items: center;
      justify-content: center;
    }
    .deck-loading {
      margin: 0;
      font-size: 0.85rem;
      color: var(--pv-muted);
      letter-spacing: 0.04em;
    }
    .slide--divider {
      position: relative;
      width: var(--slide-width);
      aspect-ratio: 16 / 9;
      margin: 2.5rem auto 0;
      background: repeating-linear-gradient(-35deg, #fff 0, #fff 2px, #f0f0f0 2px, #f0f0f0 18px);
      color: #111;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.45);
    }
    .slide--title + .slide--divider,
    .slide--title + .slide--data-dict,
    .slide--data-dict + .slide--divider,
    .slide--divider + .slide,
    .slide + .slide--divider,
    .slide--divider + .slide--divider {
      margin-top: 2.5rem;
    }
    .slide__divider-body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: calc(100% - 52px);
      padding: 2rem 2.5rem;
      text-align: center;
    }
    .slide__divider-badge {
      display: inline-block;
      margin: 0 0 1rem;
      padding: 0.38rem 0.95rem;
      border-radius: 999px;
      background: var(--pv-gold);
      color: #111;
      font-family: "Barlow Condensed", sans-serif;
      font-size: 0.95rem;
      font-weight: 800;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
    .slide__section-title {
      margin: 0;
      max-width: 16ch;
      font-family: "Barlow Condensed", sans-serif;
      font-size: 2.85rem;
      font-weight: 800;
      letter-spacing: 0.03em;
      line-height: 1.05;
      text-transform: uppercase;
    }
    .slide__section-sub {
      margin: 1rem 0 0;
      max-width: 28rem;
      font-size: 0.92rem;
      line-height: 1.45;
      color: #555;
      letter-spacing: 0.02em;
    }
    .slide__section-slides {
      margin: 1.35rem 0 0;
      font-family: "Barlow Condensed", sans-serif;
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #888;
    }
    .slide + .slide--conclusion,
    .slide--conclusion + .slide {
      margin-top: 2.5rem;
    }
    .slide + .slide { margin-top: 0; }
    .slide {
      width: var(--slide-width);
      margin: 0 auto;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.45);
    }
    .slide--title {
      position: relative;
      width: var(--slide-width);
      aspect-ratio: 16 / 9;
      background: repeating-linear-gradient(-35deg, #fff 0, #fff 2px, #f0f0f0 2px, #f0f0f0 18px);
      color: #111;
    }
    .slide__corner {
      position: absolute;
      top: 0;
      width: 42px;
      height: 72px;
      background: var(--pv-gold);
    }
    .slide__corner--left { left: 0; }
    .slide__corner--right { right: 0; }
    .slide__title-body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: calc(100% - 52px);
      padding: 2rem;
      text-align: center;
    }
    .slide__report-kicker {
      margin: 0 0 0.35rem;
      font-size: 0.8rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #666;
      font-weight: 600;
    }
    .slide__report-title {
      margin: 0;
      font-family: "Barlow Condensed", sans-serif;
      font-size: 3.25rem;
      font-weight: 800;
      letter-spacing: 0.04em;
      line-height: 1;
    }
    .slide__report-subtitle {
      margin: 0.75rem 0 0;
      font-family: "Barlow Condensed", sans-serif;
      font-size: 1.5rem;
      font-weight: 600;
      color: #333;
    }
    .slide__date {
      margin: 1.25rem 0 0;
      font-size: 0.9rem;
      color: #666;
    }
    .slide__footer-bar {
      background: #111;
      color: white;
      text-align: center;
      padding: 0.85rem;
      font-family: "Barlow Condensed", sans-serif;
      font-size: 1.35rem;
      letter-spacing: 0.08em;
    }
    .slide--benchmark {
      background: transparent;
      border-top: 3px solid #111;
      aspect-ratio: 16 / 9;
      display: flex;
      flex-direction: column;
    }
    .slide--benchmark .prog-keynote {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }
    .slide--benchmark .prog-keynote__body {
      padding: 0.4rem 0.48rem 0.45rem;
      gap: 0.32rem;
    }
    .slide--chart-table .prog-keynote__body {
      display: grid;
      grid-template-rows: minmax(0, 31%) minmax(0, 1fr) auto;
      gap: 0.22rem;
      align-content: stretch;
    }
    .slide--chart-table .prog-keynote__body > .benchmark-top {
      grid-row: 1;
      min-height: 0;
      overflow: hidden;
    }
    .slide--chart-table .prog-keynote__body > .prog-table {
      grid-row: 2;
      min-height: 0;
      align-self: stretch;
      margin: 0;
    }
    .slide--chart-table .prog-keynote__body > .slide-footnotes {
      grid-row: 3;
      margin: 0;
      padding-top: 0.04rem;
    }
    .slide--top7 .benchmark-top {
      flex: none;
      min-height: 0;
      overflow: visible;
      grid-template-columns: minmax(172px, 24%) 1fr;
    }
    .slide--top7 .bar-chart {
      padding: 0.42rem 0.48rem 0.4rem;
      gap: 0.3rem;
    }
    .slide--top7 .explainer-grid {
      justify-content: stretch;
      gap: 0.3rem;
      height: 100%;
    }
    .slide--top7 .explainer-grid:has(.explainer-card--split) {
      justify-content: stretch;
      gap: 0.32rem;
      height: 100%;
    }
    .slide--top7 .explainer-card--split {
      flex: 1 1 0;
      min-height: 0;
    }
    .slide--top7 .explainer-card:not(.explainer-card--split) {
      flex: 1 1 0;
      padding: 0;
      min-height: 0;
      justify-content: flex-start;
      overflow: hidden;
    }
    .slide--top7 .explainer-card:not(.explainer-card--split) .explainer-card__head {
      padding: 0.32rem 0.35rem 0.22rem;
    }
    .slide--top7 .explainer-card:not(.explainer-card--split) .explainer-card__title {
      font-size: 0.74rem;
      margin: 0;
    }
    .slide--top7 .explainer-card:not(.explainer-card--split) .explainer-card__desc {
      font-size: 0.54rem;
      line-height: 1.28;
      color: #334155;
      padding: 0.18rem 0.32rem;
    }
    .slide--top7 .explainer-card:not(.explainer-card--split) .explainer-card__foot {
      padding: 0.22rem 0.35rem 0.3rem;
    }
    .slide--top7 .explainer-card:not(.explainer-card--split) .explainer-card__stat {
      font-size: 1.32rem;
      margin: 0;
      line-height: 1;
    }
    .slide--top7 .explainer-card:not(.explainer-card--split) .explainer-card__range {
      font-size: 0.52rem;
      margin-top: 0.1rem;
    }
    .slide--top7 .bar-chart__title {
      font-size: 0.66rem;
    }
    .slide--top7 .bar-chart__seasons span,
    .slide--top7 .bar-row-label {
      font-size: 0.8rem;
    }
    .slide--top7 .bar-row-label small {
      font-size: 0.6rem;
    }
    .slide--top7 .bar-row__pts {
      font-size: 0.82rem;
      font-weight: 800;
    }
    .slide--top7 .prog-table--top7 {
      font-size: 0.7rem;
      min-height: 0;
      align-self: stretch;
      background: rgba(255, 255, 255, 0.72);
    }
    .slide--top7 .prog-table--top7 th {
      font-size: 0.68rem;
      padding: 0.32rem 0.22rem;
      line-height: 1.2;
    }
    .slide--chart-table .prog-table--top7 td {
      padding: 0.2rem 0.1rem;
      line-height: 1.15;
      vertical-align: middle;
    }
    .slide--chart-table .prog-table--top7 td.prog-table__team {
      font-size: inherit;
      white-space: normal;
      padding: 0.2rem 0.08rem;
    }
    .slide--top7 .prog-table__metric {
      font-size: 0.72rem;
    }
    .prog-table__team-stack {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.06rem;
      line-height: 1.1;
    }
    .prog-table__team-stack:not(.prog-table__team-stack--streak):not(.prog-table__team-stack--form) {
      gap: 0.03rem;
      line-height: 1.05;
      min-height: 2.35rem;
    }
    .prog-table__team-name {
      display: block;
      font-family: "Barlow Condensed", sans-serif;
      font-size: 0.64rem;
      font-weight: 700;
      letter-spacing: 0.01em;
      color: #334155;
      line-height: 1.15;
      word-break: break-word;
      hyphens: auto;
    }
    .slide--chart-table .prog-table__team-name {
      font-size: 0.58rem;
      line-height: 1.05;
    }
    .prog-table__team-val {
      display: block;
      font-family: "Barlow Condensed", sans-serif;
      font-size: 0.78rem;
      font-weight: 800;
      color: #111;
      line-height: 1;
    }
    .slide--chart-table .prog-table__team-val {
      font-size: 0.76rem;
      margin-top: 0.02rem;
    }
    .prog-table__team-formations {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.01rem;
      width: 100%;
      max-width: 5rem;
    }
    .prog-table__team-formation {
      display: block;
      font-family: "Barlow Condensed", sans-serif;
      font-size: 0.44rem;
      font-weight: 800;
      letter-spacing: 0.01em;
      line-height: 1.15;
      color: #64748b;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 100%;
    }
    .prog-table__team-formation strong {
      font-weight: 800;
      color: #475569;
    }
    .slide--chart-table .prog-table__team-formation {
      font-size: 0.46rem;
    }
    .prog-table__team-formations--empty {
      min-height: 0.9rem;
    }
    .slide--chart-table .prog-table__avg-row--zones td {
      padding: 0.18rem 0.1rem;
      vertical-align: middle;
    }
    .slide--chart-table .prog-table__zone-avg-label {
      font-size: 0.42rem;
      margin-bottom: 0.06rem;
      letter-spacing: 0.04em;
      line-height: 1.05;
    }
    .slide--top7 .prog-table__avg-val {
      font-size: 1.02rem;
    }
    .slide--top7 .prog-table__avg-pos {
      font-size: 0.6rem;
      margin-bottom: 0.1rem;
    }
    .slide--top7 .prog-table__avg-unit {
      font-size: 0.58rem;
      margin-top: 0.08rem;
    }
    .slide--benchmark .prog-table {
      flex-shrink: 0;
    }
    .prog-keynote {
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid #cbd5e1;
      background-color: #d9dde3;
      background-image: repeating-linear-gradient(
        135deg,
        rgba(255, 255, 255, 0.35) 0,
        rgba(255, 255, 255, 0.35) 2px,
        transparent 2px,
        transparent 10px
      );
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
    }
    .prog-keynote__bar {
      background: #111;
      color: #f8fafc;
      padding: 0.55rem 0.85rem;
      font-family: "Barlow Condensed", sans-serif;
      font-size: 0.95rem;
      font-weight: 800;
      letter-spacing: 0.07em;
      text-transform: uppercase;
    }
    .prog-keynote__body {
      display: flex;
      flex-direction: column;
      flex: 1;
      gap: 0.45rem;
      padding: 0.5rem 0.55rem;
      min-height: 0;
    }
    .benchmark-top {
      display: grid;
      grid-template-columns: minmax(180px, 27%) 1fr;
      gap: 0.45rem;
      align-items: stretch;
      flex: 1;
      min-height: 0;
    }
    .benchmark-side {
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
      height: 100%;
    }
    .prog-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.78rem;
      background: rgba(255, 255, 255, 0.55);
    }
    .prog-table th,
    .prog-table td {
      border: 1px solid #111;
      padding: 0.42rem 0.5rem;
      text-align: center;
      vertical-align: middle;
      line-height: 1.2;
      color: #111;
    }
    .prog-table th {
      background: #111;
      color: #fff;
      font-family: "Barlow Condensed", sans-serif;
      font-size: 0.74rem;
      font-weight: 800;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
    .prog-table td.prog-table__team {
      text-align: center;
      font-weight: 800;
      font-family: "Barlow Condensed", sans-serif;
      font-size: 0.72rem;
      letter-spacing: 0.01em;
      white-space: nowrap;
    }
    .prog-table--top7 {
      font-size: 0.7rem;
      table-layout: fixed;
    }
    .prog-table--top7 th:first-child,
    .prog-table--top7 td:first-child {
      width: 3.4rem;
    }
    .prog-table--top7 thead th[rowspan="2"] {
      vertical-align: middle;
    }
    .prog-table__head-group {
      letter-spacing: 0.06em;
    }
    .prog-table__zone-split {
      border-left: 3px solid #111 !important;
    }
    .prog-table__metric {
      font-family: "Barlow Condensed", sans-serif;
      font-size: 0.8rem;
      font-weight: 800;
      letter-spacing: 0.03em;
      text-transform: uppercase;
      color: #111;
      text-align: center;
    }
    .prog-table__avg {
      background: rgba(255, 255, 255, 0.75);
      font-weight: 700;
    }
    .prog-table__avg-row td {
      padding: 0.45rem 0.35rem;
      vertical-align: middle;
    }
    .prog-table__avg-row .prog-table__metric {
      font-size: 0.78rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      line-height: 1.2;
    }
    .prog-table__avg-cell {
      text-align: center;
    }
    .prog-table__avg-pos {
      display: block;
      font-family: "Barlow Condensed", sans-serif;
      font-size: 0.62rem;
      font-weight: 800;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: #64748b;
      margin-bottom: 0.12rem;
    }
    .prog-table__avg-val {
      display: block;
      font-family: "Barlow Condensed", sans-serif;
      font-size: 1.12rem;
      font-weight: 800;
      line-height: 1;
      color: #111;
    }
    .prog-table__avg-unit {
      display: block;
      margin-top: 0.1rem;
      font-size: 0.58rem;
      font-weight: 700;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .prog-table__match {
      font-family: "Barlow Condensed", sans-serif;
      font-size: 1rem;
      font-weight: 800;
      color: #111;
    }
    .prog-table__match--champion { background: rgba(134, 239, 172, 0.45); }
    .prog-table__match--auto { background: rgba(147, 197, 253, 0.45); }
    .prog-table__match--playoff { background: rgba(253, 224, 71, 0.42); }
    .explainer-grid {
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
      flex: 1;
      justify-content: space-between;
    }
    .explainer-card {
      background: rgba(255, 255, 255, 0.82);
      border: 1px solid #111;
      border-radius: 8px;
      padding: 0;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: stretch;
      justify-content: flex-start;
      flex: 1;
      box-shadow: 0 1px 0 rgba(255, 255, 255, 0.65) inset;
      overflow: hidden;
    }
    .explainer-card--champion {
      border-top: 4px solid #22c55e;
      border-left: 1px solid #111;
    }
    .explainer-card--auto {
      border-top: 4px solid #2563eb;
      border-left: 1px solid #111;
    }
    .explainer-card--playoff {
      border-top: 4px solid #f5c518;
      border-left: 1px solid #111;
    }
    .explainer-card__head {
      flex-shrink: 0;
      width: 100%;
      padding: 0.4rem 0.45rem 0.28rem;
      border-bottom: 1px solid rgba(17, 17, 17, 0.08);
      background: rgba(255, 255, 255, 0.35);
    }
    .explainer-card__title {
      display: block;
      font-family: "Barlow Condensed", sans-serif;
      font-size: 0.8rem;
      font-weight: 800;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #111;
      margin: 0;
      line-height: 1.1;
    }
    .explainer-card__desc {
      display: block;
      flex: 0 1 auto;
      margin: 0;
      padding: 0.24rem 0.4rem;
      font-size: 0.58rem;
      line-height: 1.28;
      color: #475569;
      text-align: center;
    }
    .explainer-card__foot {
      flex-shrink: 0;
      width: 100%;
      padding: 0.28rem 0.45rem 0.38rem;
      margin-top: auto;
      border-top: 1px solid rgba(17, 17, 17, 0.08);
      background: rgba(255, 255, 255, 0.45);
    }
    .explainer-card__stat {
      display: block;
      font-family: "Barlow Condensed", sans-serif;
      font-size: 1.42rem;
      font-weight: 800;
      color: #111;
      line-height: 1;
      margin: 0;
    }
    .explainer-card__range {
      display: block;
      margin-top: 0.14rem;
      font-family: "Barlow Condensed", sans-serif;
      font-size: 0.58rem;
      font-weight: 700;
      color: #64748b;

    function renderTeamFormations(seasonLabel, team) {

      if (!formations.length) {

      const lines = formations

    const AUTO_PROMO_FULL_INDICES = [0, 1, 2];
    const PLAYOFF_INDICES = [3, 4, 5, 6];
    const ALL_TOP7_INDICES = [0, 1, 2, 3, 4, 5, 6];

    const ZONE_CHART_LABELS = {
      champion: { title: "Champions", sub: "1st place" },
      auto: { title: "Automatic Promotion", sub: "Avg of 2nd & 3rd" },
      playoff: { title: "Play-offs", sub: "Avg of 4th–7th" },
    };

    const CHART_ZONE_NOTE = "Chart rows: Champions (1st) · Automatic promotion (avg of 2nd & 3rd) · Play-offs (avg of 4th, 5th, 6th & 7th)";
    const ZONE_SUBTITLE = "Champions (1st) · Automatic promotion (2nd & 3rd avg) · Play-offs (4th–7th avg)";

    function renderBarChartZoneLabels() {
      const { champion, auto, playoff } = ZONE_CHART_LABELS;
      return `

          <div class="bar-row-label bar-row-label--champion">${champion.title}<small>${champion.sub}</small></div>
          <div class="bar-row-label bar-row-label--auto">${auto.title}<small>${auto.sub}</small></div>
          <div class="bar-row-label bar-row-label--playoff">${playoff.title}<small>${playoff.sub}</small></div>
        </div>`;
    }

    /** Automatic promotion zone avg — defaults to 2nd & 3rd when Champions is shown separately. */
    function autoPromoValue(season, key, indices = AUTO_PROMO_INDICES) {
      return avg(indices.map((i) => season.top7[i][key]));
    }

    function playoffZoneValue(season, key) {
      return avg(PLAYOFF_INDICES.map((i) => season.top7[i][key]));
    }

    function playoffZoneStreak(season, key) {
      return avg(PLAYOFF_INDICES.map((i) => season.top7[i].streaks[key]));
    }

    function autoPromoSummary(seasons, key, indices = AUTO_PROMO_INDICES) {
      const vals = seasons.map((s) => autoPromoValue(s, key, indices));
      return { min: Math.min(...vals), max: Math.max(...vals), avg: avg(vals) };
    }

    function playoffPromoSummary(seasons, key) {
      const vals = seasons.map((s) => playoffZoneValue(s, key));
      return { min: Math.min(...vals), max: Math.max(...vals), avg: avg(vals) };
    }

    function championPromoSummary(seasons, key) {
      const vals = seasons.map((s) => s.top7[0][key]);
      return { min: Math.min(...vals), max: Math.max(...vals), avg: avg(vals) };
    }

    function playoffPhases(row, conceded = false) {
      const entries = PLAYOFF_INDICES.map((i) => row.top7[i]);
      const phases = Object.fromEntries(
        PHASE_ORDER.map((phase) => [
          phase,
          Math.round(avg(entries.map((e) => e.phases[phase] || 0))),
        ]),
      );
      const result = { phases };
      if (conceded) {
        result.cleanSheets = Math.round(avg(entries.map((e) => e.cleanSheets)));
      }
      return result;
    }

    function autoPromoPhases(row, conceded = false, indices = AUTO_PROMO_INDICES) {
      const entries = indices.map((i) => row.top7[i]);
      const phases = Object.fromEntries(
        PHASE_ORDER.map((phase) => [
          phase,
          Math.round(avg(entries.map((e) => e.phases[phase] || 0))),
        ]),
      );
      const result = { phases };
      if (conceded) {
        result.conceded = Math.round(avg(entries.map((e) => e.conceded)));
        result.cleanSheets = Math.round(avg(entries.map((e) => e.cleanSheets)));
      } else {
        result.goals = Math.round(avg(entries.map((e) => e.goals)));
      }
      return result;
    }

    function summary() {
      return {
        champion: championPromoSummary(DATA.seasons, "points"),
        auto: autoPromoSummary(DATA.seasons, "points"),
        playoff: playoffPromoSummary(DATA.seasons, "points"),
      };
    }

    const PHASE_COLORS = { Possession: "#2563eb", Transition: "#16a34a", "Set Play": "#ca8a04", Other: "#64748b" };
    const PHASE_ROLE_LABELS = { Possession: "Possession", Transition: "Transition", "Set Play": "Set play", Other: "Other" };
    const PHASE_BAR_LABELS = { Possession: "Possession", Transition: "Transition", "Set Play": "Set play", Other: "Other" };
    const PHASE_TABLE_LABELS = { Possession: "Poss", Transition: "Trans", "Set Play": "SP", Other: "Oth" };
    const PHASE_CUTOFFS = [
      { index: 0, label: "1st", summaryKey: "first", rowClass: "champion" },
      { index: 2, label: "3rd", summaryKey: "third", rowClass: "auto" },
      { index: 6, label: "7th", summaryKey: "seventh", rowClass: "playoff" },

    function goalsTeamLabel(entry) {
      return `<span class="prog-table__team-stack"><span class="prog-table__team-name">${entry.team}</span><span class="prog-table__team-val">${entry.goals}</span></span>`;

    function concededTeamLabel(entry) {
      return `<span class="prog-table__team-stack"><span class="prog-table__team-name">${entry.team}</span><span class="prog-table__team-val">${entry.conceded}</span></span>`;
    }

    function renderPhaseLine(phases, cleanSheets) {
      const phaseHtml = PHASE_ORDER.map((phase) => {
        const key = phase === "Set Play" ? "setplay" : phase.toLowerCase();
        return `<span class="phase-stat phase-stat--${key}"><span class="phase-stat__val">${phases[phase] || 0}</span><span class="phase-stat__lbl">${PHASE_TABLE_LABELS[phase]}</span></span>`;

    }

    function renderConcededPhaseCell(entry) {
      return `${concededTeamLabel(entry)}${renderPhaseLine(entry.phases, entry.cleanSheets)}`;
    }

    function phaseTotal(phases) {
      return PHASE_ORDER.reduce((sum, key) => sum + (phases[key] || 0), 0);
    }

    function phaseShare(value, total) {
      return total > 0 ? Math.round((value / total) * 100) : 0;
    }

    function phaseAvgForPosition(index, conceded = false) {
      const seasons = conceded ? GOALS_DATA.concededPhaseSeasons : GOALS_DATA.phaseSeasons;
      const avgPhase = (key) => avg(seasons.map((row) => row.top7[index].phases[key] || 0));
      const totalKey = conceded ? "conceded" : "goals";
      const result = {
        Possession: Math.round(avgPhase("Possession")),
        Transition: Math.round(avgPhase("Transition")),
        "Set Play": Math.round(avgPhase("Set Play")),
        totalGoals: avg(seasons.map((row) => row.top7[index][totalKey])),
      };
      if (conceded) {
        result.cleanSheets = Math.round(avg(seasons.map((row) => row.top7[index].cleanSheets)));
      }
      return result;
    }

    function renderPhaseTableRows(seasons, conceded = false) {
      const renderCell = conceded ? renderConcededPhaseCell : renderPhaseCell;
      return seasons.map((row) => `
        <tr>
          <td class="prog-table__metric">${row.season}</td>
          ${row.top7.map((entry, i) => `

        </tr>`).join("");
    }

    function phaseZoneSummary(indices, seasons, conceded = false) {
      const phases = Object.fromEntries(
        PHASE_ORDER.map((phase) => [
          phase,
          Math.round(avg(indices.flatMap((i) => seasons.map((row) => row.top7[i].phases[phase] || 0)))),
        ]),
      );
      const result = { phases, total: 0, cleanSheets: null };
      if (conceded) {
        result.total = Math.round(avg(indices.flatMap((i) => seasons.map((row) => row.top7[i].conceded))));
        result.cleanSheets = Math.round(avg(indices.flatMap((i) => seasons.map((row) => row.top7[i].cleanSheets))));
      } else {
        result.total = Math.round(avg(indices.flatMap((i) => seasons.map((row) => row.top7[i].goals))));
      }
      return result;
    }

    function renderPhaseZoneSummaryPanel(seasons, conceded = false) {
      const unit = conceded ? "conc" : "goals";
      const zones = [

      const playoff = phaseZoneSummary(PLAYOFF_INDICES, seasons, conceded);
      const zoneCell = (summary, zoneClass) => `
        <span class="prog-table__zone-avg-label">${zoneClass}</span>

          <td class="prog-table__metric">4-Yr Avg</td>

            ${zoneCell(champion, "Champions (1st)")}
          </td>
          <td colspan="2" class="prog-table__avg-cell prog-table__zone-avg-cell prog-table__match--auto">
            ${zoneCell(auto, "Automatic Promotion")}
          </td>
          <td colspan="4" class="prog-table__zone-avg-cell prog-table__avg-cell prog-table__match--playoff prog-table__zone-split">

    function renderPhaseAvgRow(conceded = false) {
      return `
        <tr class="prog-table__avg-row">
          <td class="prog-table__metric">4-Yr Avg</td>
          ${AVG_LABELS.map((label, i) => {
            const summary = phaseAvgForPosition(i, conceded);
            const phases = {
              Possession: summary.Possession,
              Transition: summary.Transition,
              "Set Play": summary["Set Play"],
            };
            const unit = conceded ? "conc" : "goals";
            const total = conceded ? summary.totalGoals.toFixed(1) : summary.totalGoals.toFixed(1);
            return `
            <td class="prog-table__avg-cell ${cellClass(i)}">
              <span class="prog-table__avg-pos">${label}</span>
              <span class="prog-table__avg-val">${total}</span>

    function renderPhaseTable(seasons, conceded = false) {
      return `
        <table class="prog-table prog-table--top7 prog-table--phase">
          ${renderPromotionTableHead()}
          <tbody>
            ${renderPhaseTableRows(seasons, conceded)}

    function stackedPhaseBar(phases, options = {}) {
      const { cleanSheets } = options;
      const total = phaseTotal(phases);
      const segments = PHASE_ORDER.map((phase) => {
        const count = phases[phase] || 0;
        const share = total > 0 ? (count / total) * 100 : 0;
        const segClass = share > 0 && share < 12
          ? "stack-seg stack-seg--compact stack-seg--narrow"
          : share > 0 && share < 18
          ? "stack-seg stack-seg--compact"
          : "stack-seg";
        const phaseLabel = share < 16 ? PHASE_TABLE_LABELS[phase] : PHASE_BAR_LABELS[phase];
        return `<div class="${segClass}" style="flex:${share || 0} 0 0;background:${PHASE_COLORS[phase]}" title="${phase}: ${count}">
          <span class="stack-seg__val">${count > 0 ? count : ""}</span>
          <span class="stack-seg__phase" aria-hidden="true">${phaseLabel}</span>
        </div>`;
      }).join("");
      const csHtml = cleanSheets != null
        ? `<span class="bar-row__cs-val">${cleanSheets} CS</span>`
        : "";
      return `
        <div class="bar-row__track bar-row__track--phase">
          <div class="bar-row__fill bar-row__fill--stacked bar-row__fill--stacked-full">${segments}</div>
          <div class="bar-row__total-badge" aria-label="Total ${total}">

            <strong>${total}</strong>
            ${csHtml}

    function renderPhaseExplainers(seasons, conceded = false) {
      const descFor = (phase) => {
        if (conceded) {
          if (phase === "Possession") return "Open play & second ball against";
          if (phase === "Transition") return "Conceded in transitions";
          if (phase === "Other") return "Own goals & goals missing from Impect shot tags";
          return "Corners, FKs & set pieces against";
        }
        if (phase === "Possession") return "In-possession & second ball";
        if (phase === "Transition") return "Attacking transitions";
        if (phase === "Other") return "Own goals & goals missing from Impect shot tags";
        return "Corners, FKs & set pieces";
      };
      const autoTotal = zonePhaseTotal(AUTO_PROMO_INDICES, seasons);
      const playoffTotal = zonePhaseTotal(PLAYOFF_INDICES, seasons);
      const cards = PHASE_ORDER.map((phase) => {
        const autoVal = zonePhaseAvg(AUTO_PROMO_INDICES, seasons, phase);
        const playoffVal = zonePhaseAvg(PLAYOFF_INDICES, seasons, phase);
        const autoShare = phaseShare(autoVal, autoTotal);
        const playoffShare = phaseShare(playoffVal, playoffTotal);
        const cardClass = phase === "Set Play" ? "setplay" : phase.toLowerCase();
        return renderPhaseExplainerCard(
          cardClass,
          phase,
          descFor(phase),
          autoVal.toFixed(1),
          playoffVal.toFixed(1),
          `${autoShare}% · Auto`,
          `${playoffShare}% · Play-offs`,
        );
      });
      if (conceded) {
        const autoCs = zoneMetricAvg(AUTO_PROMO_INDICES, seasons, "cleanSheets");
        const playoffCs = zoneMetricAvg(PLAYOFF_INDICES, seasons, "cleanSheets");
        cards.push(
          renderPhaseExplainerCard(
            "cleansheet",
            "Clean Sheets",
            "Matches with no goal conceded",
            Math.round(autoCs),
            Math.round(playoffCs),
            "Auto · Impect",
            "Play-offs · Impect",
          ),
        );
      }
      return `<div class="explainer-grid">${cards.join("")}</div>`;
    }

    function renderPhaseBarChart(seasons, conceded = false) {
      const barRows = (row) => {
        const auto = autoPromoPhases(row, conceded);
        const playoff = playoffPhases(row, conceded);
        return [
          { phases: row.top7[0].phases, cleanSheets: conceded ? row.top7[0].cleanSheets : null },
          { phases: auto.phases, cleanSheets: conceded ? auto.cleanSheets : null },

      return `

          <div class="bar-chart__grid">

    function renderPhaseChartSlide(conceded = false) {

      const footnote = conceded

      const extraClass = conceded ? " slide--phase-conceded" : "";

      return `

    function renderPhaseTableSlide(conceded = false) {
      const seasonsKey = conceded ? "concededPhaseSeasons" : "phaseSeasons";
      const seasons = GOALS_DATA[seasonsKey];
      const slideNum = conceded ? "06" : "04";
      const title = conceded ? "Goals Conceded by Phase (Table)" : "Goals by Phase (Table)";
      const note = conceded
        ? "Impect conceded shots · top 7 · 22/23–25/26 · Poss / Trans / SP = conceded by phase · CS = clean sheets · Columns: 1st = Champions · 2nd–3rd = Automatic promotion · 4th–7th = Play-offs"
        : "Impect successful shots · top 7 · 22/23–25/26 · Poss / Trans / SP = goals by phase · Columns: 1st = Champions · 2nd–3rd = Automatic promotion · 4th–7th = Play-offs";
      const extraClass = conceded ? " slide--phase-conceded-table" : "";

      return `

    const FORM_ORDER = ["homeWins", "awayWins", "draws", "losses"];
    const FORM_COLORS = {
      homeWins: "#16a34a",
      awayWins: "#2563eb",
      draws: "#64748b",
      losses: "#dc2626",
    };
    const FORM_LABELS = {
      homeWins: "Home W",
      awayWins: "Away W",
      draws: "Draws",
      losses: "Losses",
    };
    const FORM_BAR_LABELS = {
      homeWins: "Home wins",
      awayWins: "Away wins",
      draws: "Draws",
      losses: "Losses",
    };
    const LEAGUE_MATCH_LIMIT = 46;

    function reconcileWdlTotals(raw, target = LEAGUE_MATCH_LIMIT) {
      const out = Object.fromEntries(FORM_ORDER.map((key) => [key, Math.round(raw[key])]));
      let diff = target - FORM_ORDER.reduce((sum, key) => sum + out[key], 0);
      while (diff !== 0) {
        const ranked = [...FORM_ORDER].sort((a, b) => {
          const fracA = raw[a] - Math.floor(raw[a]);
          const fracB = raw[b] - Math.floor(raw[b]);
          if (diff > 0) return fracB - fracA || out[b] - out[a];
          return fracA - fracB || out[a] - out[b];
        });
        const key = ranked.find((name) => (diff > 0 ? true : out[name] > 0));
        if (!key) break;
        if (diff > 0) {
          out[key] += 1;
          diff -= 1;
        } else {
          out[key] -= 1;
          diff += 1;
        }
      }
      return out;
    }

    function avgFormWdl(entries) {
      const raw = Object.fromEntries(
        FORM_ORDER.map((key) => [key, avg(entries.map((entry) => entry[key]))]),
      );
      return reconcileWdlTotals(raw);
    }

    function playoffForm(row) {
      return avgFormWdl(PLAYOFF_INDICES.map((i) => row.top7[i]));
    }

    function autoPromoForm(row, indices = AUTO_PROMO_INDICES) {
      return avgFormWdl(indices.map((i) => row.top7[i]));
    }

    function formTotal(entry) {
      return FORM_ORDER.reduce((sum, key) => sum + (entry[key] || 0), 0);
    }

    function stackedFormBar(entry) {
      const total = formTotal(entry);
      const segments = FORM_ORDER.map((key) => {
        const count = entry[key] || 0;
        const share = total > 0 ? (count / total) * 100 : 0;
        const segClass = share > 0 && share < 12
          ? "stack-seg stack-seg--compact stack-seg--narrow"
          : share > 0 && share < 18
          ? "stack-seg stack-seg--compact"
          : "stack-seg";
        const label = share < 16 ? FORM_LABELS[key] : FORM_BAR_LABELS[key];
        return `<div class="${segClass}" style="flex:${share || 0} 0 0;background:${FORM_COLORS[key]}" title="${FORM_BAR_LABELS[key]}: ${count}">
          <span class="stack-seg__val">${count > 0 ? count : ""}</span>
          <span class="stack-seg__phase" aria-hidden="true">${label}</span>
        </div>`;
      }).join("");
      return `
        <div class="bar-row__track bar-row__track--phase">
          <div class="bar-row__fill bar-row__fill--stacked bar-row__fill--stacked-full">${segments}</div>
          <div class="bar-row__total-badge" aria-label="Total results ${total}">
            <small>Total</small>
            <strong>${total}</strong>
          </div>
        </div>`;
    }

    function formTableSeasons() {
      return FORM_DATA.formSeasons;
    }

    function avgRowLabel(seasonCount) {
      return `${seasonCount}-Yr Avg`;
    }

    function zoneValues(getter, indices) {
      return FORM_DATA.formSeasons.flatMap((season) =>
        indices.map((i) => getter(season.top7[i])),
      );
    }

    function zoneAvg(getter, indices) {
      const values = zoneValues(getter, indices);
      return avg(values);
    }

    function zoneRange(getter, indices) {
      const values = zoneValues(getter, indices);
      return { min: Math.min(...values), max: Math.max(...values) };
    }

    function renderZoneExplainerCards(zoneLabel, indices, metrics, zoneClass) {
      const cards = metrics.map(([variant, title, , getter]) => {
        const avgVal = zoneAvg(getter, indices);
        const range = zoneRange(getter, indices);
        return renderCompactExplainerCard(
          variant,
          title,
          avgVal.toFixed(1),
          `${range.min}–${range.max}`,
        );
      }).join("");
      return `
        <div class="explainer-zone explainer-zone--${zoneClass}">
          <p class="explainer-zone__label">${zoneLabel}</p>
          <div class="explainer-grid">${cards}</div>
        </div>`;
    }

    function renderFormExplainers() {
      const metrics = [
        ["homewin", "Home Wins", "Wins at home", (entry) => entry.homeWins],
        ["awaywin", "Away Wins", "Wins away from home", (entry) => entry.awayWins],

        ["loss", "Losses", "Matches lost", (entry) => entry.losses],
      ];
      return `
        <div class="explainer-zones">
          ${renderZoneExplainerCards("Champions", CHAMPION_INDICES, metrics, "champion")}
          ${renderZoneExplainerCards("Automatic Promotion", AUTO_PROMO_INDICES, metrics, "auto")}
          ${renderZoneExplainerCards("Play-offs", PLAYOFF_INDICES, metrics, "playoff")}
        </div>`;
    }

    function renderFormBarChart(seasons) {
      const barRows = (row) => [
        row.top7[0],
        { ...autoPromoForm(row), team: "2nd & 3rd avg" },
        { ...playoffForm(row), team: "4th–7th avg" },
      ];
      return `
        <div class="bar-chart__main">
          ${renderBarChartZoneLabels()}
          <div class="bar-chart__seasons">
            ${seasons.map((row) => `<span>${row.season}</span>`).join("")}
          </div>
          <div class="bar-chart__grid">
          ${seasons.map((row) => `
            <div class="bar-column">
              <div class="bar-column__bars">
              ${barRows(row).map((entry) => `
              <div class="bar-row">${stackedFormBar(entry)}</div>`).join("")}
              </div>
            </div>`).join("")}
          </div>
        </div>`;
    }

    function formZoneSummary(indices, seasons) {
      return avgFormWdl(indices.flatMap((i) => seasons.map((row) => row.top7[i])));
    }

    function renderFormStatPill(key, entry) {
      const variant = key === "homeWins" ? "homewin" : key === "awayWins" ? "awaywin" : key === "draws" ? "draw" : "loss";
      return `<span class="form-stat form-stat--${variant}"><span class="form-stat__val">${entry[key]}</span><span class="form-stat__lbl">${FORM_LABELS[key]}</span></span>`;
    }

    function renderFormLine(entry) {
      return `
        <div class="prog-table__form-stack">
          <div class="prog-table__form-row prog-table__form-row--homeaway">
            ${renderFormStatPill("homeWins", entry)}${renderFormStatPill("awayWins", entry)}
          </div>
          <div class="prog-table__form-row prog-table__form-row--core">
            ${renderFormStatPill("draws", entry)}${renderFormStatPill("losses", entry)}
          </div>
        </div>`;
    }

    function formTeamLabel(entry) {
      return `<span class="prog-table__team-stack prog-table__team-stack--form"><span class="prog-table__team-name">${entry.team}</span></span>`;
    }

    function renderFormCell(entry) {

    }

    function formAvgForPosition(index, seasons) {
      return avgFormWdl(seasons.map((row) => row.top7[index]));
    }

    function renderFormTableRows(seasons) {
      return seasons.map((row) => `
        <tr>
          <td class="prog-table__metric">${row.season}</td>
          ${row.top7.map((entry, i) => `
            <td class="prog-table__team ${teamCellClasses(i, entry.team)}">${renderFormCell(entry)}</td>`).join("")}
        </tr>`).join("");
    }

    function renderFormZoneAvgRow(seasons) {
      const champion = formZoneSummary(CHAMPION_INDICES, seasons);
      const auto = formZoneSummary(AUTO_PROMO_INDICES, seasons);
      const playoff = formZoneSummary(PLAYOFF_INDICES, seasons);
      return `
        <tr class="prog-table__avg-row prog-table__avg-row--zones">
          <td class="prog-table__metric">${avgRowLabel(seasons.length)}</td>
          <td colspan="1" class="prog-table__avg-cell prog-table__zone-avg-cell prog-table__match--champion">
            <span class="prog-table__zone-avg-label">Champions (1st)</span>
            ${renderFormLine(champion)}
          </td>
          <td colspan="2" class="prog-table__avg-cell prog-table__zone-avg-cell prog-table__match--auto">
            <span class="prog-table__zone-avg-label">Automatic Promotion</span>
            ${renderFormLine(auto)}

            </div>

    function renderFormTableSlide() {
      const seasons = formTableSeasons();
      return `
        <section class="slide slide--benchmark slide--top7 slide--phase slide--phase-table slide--form">
          <div class="prog-keynote">
            <div class="prog-keynote__bar">Slide 08 — Home / Away W · D · L (Table)</div>

              <div class="phase-table-wrap">

            </div>
          </div>

    const STREAK_KEYS = [
      ["backToBacks", "B2B", "b2b"],
      ["homeBackToBacks", "H-B2B", "b2bh"],
      ["awayBackToBacks", "A-B2B", "b2ba"],
      ["backToBackToBack", "B2B2B", "b2b3"],
      ["maxWinStreak", "Max", "max"],
    ];
    const STREAK_TABLE_HOMEAWAY = [
      ["homeBackToBacks", "H-B2B", "b2bh"],
      ["awayBackToBacks", "A-B2B", "b2ba"],
    ];
    const STREAK_TABLE_CORE = [
      ["backToBacks", "B2B", "b2b"],
      ["backToBackToBack", "B2B2B", "b2b3"],
      ["maxWinStreak", "Max", "max"],
    ];

    function renderStreakStatPill(key, label, variant, streaks) {
      return `<span class="streak-stat streak-stat--${variant}"><span class="streak-stat__val">${streaks[key]}</span><span class="streak-stat__lbl">${label}</span></span>`;
    }

    function renderStreakLine(streaks) {
      const row = (items) => items.map(([key, label, variant]) =>
        renderStreakStatPill(key, label, variant, streaks),
      ).join("");
      return `
        <div class="prog-table__streak-stack">
          <div class="prog-table__streak-row prog-table__streak-row--homeaway">${row(STREAK_TABLE_HOMEAWAY)}</div>
          <div class="prog-table__streak-row prog-table__streak-row--core">${row(STREAK_TABLE_CORE)}</div>
        </div>`;
    }

    function streakTeamLabel(entry) {
      return `<span class="prog-table__team-stack prog-table__team-stack--streak"><span class="prog-table__team-name">${entry.team}</span></span>`;
    }

    function autoPromoStreak(row, key, indices = AUTO_PROMO_INDICES) {
      return Math.round(avg(indices.map((i) => row.top7[i].streaks[key])));
    }

    function renderStreakExplainers() {
      const metrics = [
        ["b2b", "Back-to-Backs", "Total pairs of consecutive wins in the season", (entry) => entry.streaks.backToBacks],
        ["b2bh", "Home B2B", "B2B pairs from home games only", (entry) => entry.streaks.homeBackToBacks],
        ["b2ba", "Away B2B", "B2B pairs from away games only", (entry) => entry.streaks.awayBackToBacks],
        ["b2b3", "B2B2B", "Total triples of consecutive wins in the season", (entry) => entry.streaks.backToBackToBack],
      ];
      return `
        <div class="explainer-zones">
          ${renderZoneExplainerCards("Champions", CHAMPION_INDICES, metrics, "champion")}
          ${renderZoneExplainerCards("Automatic Promotion", AUTO_PROMO_INDICES, metrics, "auto")}
          ${renderZoneExplainerCards("Play-offs", PLAYOFF_INDICES, metrics, "playoff")}
        </div>`;
    }

    function renderStreakMetricBarChart(seasons, metricKey, maxVal) {
      const values = (row) => [
        { value: row.top7[0].streaks[metricKey], fill: "champion" },
        { value: autoPromoStreak(row, metricKey), fill: "third" },
        { value: Math.round(playoffZoneStreak(row, metricKey)), fill: "seventh" },
      ];
      return `
        <div class="bar-chart__main">
          ${renderBarChartZoneLabels()}
          <div class="bar-chart__seasons">
            ${seasons.map((row) => `<span>${row.season}</span>`).join("")}
          </div>
          <div class="bar-chart__grid">
          ${seasons.map((row) => `
            <div class="bar-column">
              <div class="bar-column__bars">
              ${values(row).map((line) => `
              <div class="bar-row">
                <div class="bar-row__track">
                  <div class="bar-row__fill bar-row__fill--${line.fill}" style="width:${(line.value / maxVal) * 100}%"></div>
                  <span class="bar-row__pts">${line.value}</span>
                </div>
              </div>`).join("")}
              </div>
            </div>`).join("")}
          </div>
        </div>`;
    }

    function renderStreakDualCharts(seasons) {
      return `
        <div class="streak-dual-charts">
          <div>
            <p class="bar-chart__title">Back-to-back pairs (2 wins in a row) · season total</p>
            ${renderStreakMetricBarChart(seasons, "backToBacks", 14)}
          </div>
          <div class="phase-explainer-row">${renderStreakMaxExplainers()}</div>
          <div>
            <p class="bar-chart__title">Longest winning run · max consecutive wins in season</p>
            ${renderStreakMetricBarChart(seasons, "maxWinStreak", 12)}
          </div>
        </div>`;
    }

    function renderZoneHeroCard(zoneLabel, metricLabel, avgVal, range, zoneClass) {
      return `
        <div class="zone-hero-card zone-hero-card--${zoneClass}">
          <span class="zone-hero-card__zone">${zoneLabel}</span>
          <span class="zone-hero-card__metric">${metricLabel}</span>
          <span class="zone-hero-card__val">${avgVal.toFixed(1)}</span>
          <span class="zone-hero-card__range">${range.min}–${range.max}</span>
        </div>`;
    }

    function renderStreakMaxExplainers() {
      const getter = (entry) => entry.streaks.maxWinStreak;
      const zones = [
        ["Champions", CHAMPION_INDICES, "champion"],
        ["Automatic Promotion", AUTO_PROMO_INDICES, "auto"],
        ["Play-offs", PLAYOFF_INDICES, "playoff"],
      ];
      const cards = zones.map(([label, indices, zoneClass]) =>
        renderZoneHeroCard(
          label,
          "Longest Run",
          zoneAvg(getter, indices),
          zoneRange(getter, indices),
          zoneClass,
        ),
      ).join("");
      return `<div class="zone-hero-strip">${cards}</div>`;
    }

    function renderStreakBarChart(seasons) {
      return renderStreakMetricBarChart(seasons, "maxWinStreak", 12);
    }

    function renderStreakCell(entry) {
      return `${streakTeamLabel(entry)}${renderStreakLine(entry.streaks)}`;
    }

    function streakAvgForPosition(index, seasons) {
      return Object.fromEntries(
        STREAK_KEYS.map(([key]) => [
          key,
          Math.round(avg(seasons.map((row) => row.top7[index].streaks[key]))),
        ]),
      );
    }

    function renderStreakTableRows(seasons) {
      return seasons.map((row) => `
        <tr>
          <td class="prog-table__metric">${row.season}</td>
          ${row.top7.map((entry, i) => `
            <td class="prog-table__team ${teamCellClasses(i, entry.team)}">${renderStreakCell(entry)}</td>`).join("")}
        </tr>`).join("");
    }

    function streakZoneSummary(indices, seasons) {
      return Object.fromEntries(
        STREAK_KEYS.map(([key]) => [
          key,
          Math.round(avg(indices.flatMap((i) => seasons.map((row) => row.top7[i].streaks[key])))),
        ]),
      );
    }

    function renderStreakZoneAvgRow(seasons) {
      const champion = streakZoneSummary(CHAMPION_INDICES, seasons);
      const auto = streakZoneSummary(AUTO_PROMO_INDICES, seasons);
      const playoff = streakZoneSummary(PLAYOFF_INDICES, seasons);
      return `
        <tr class="prog-table__avg-row prog-table__avg-row--zones">
          <td class="prog-table__metric">${avgRowLabel(seasons.length)}</td>
          <td colspan="1" class="prog-table__avg-cell prog-table__zone-avg-cell prog-table__match--champion">
            <span class="prog-table__zone-avg-label">Champions (1st)</span>

          <td colspan="4" class="prog-table__zone-avg-cell prog-table__avg-cell prog-table__match--playoff prog-table__zone-split">
            <span class="prog-table__zone-avg-label">Play-offs</span>
            ${renderStreakLine(playoff)}
          </td>
        </tr>`;
    }

    function renderStreakTable(seasons) {
      return `
        <table class="prog-table prog-table--top7 prog-table--phase">
          ${renderPromotionTableHead()}
          <tbody>
            ${renderStreakTableRows(seasons)}
            ${renderStreakZoneAvgRow(seasons)}
          </tbody>
        </table>`;
    }

    function renderRunDiagram() {
      const sequence = [
        ["w", "w", "w"], ["gap"],
        ["d"], ["gap"],
        ["w", "w"], ["gap"],
        ["l"], ["gap"],
        ["w"],
      ];
      const chips = sequence.map((group) => {
        if (group[0] === "gap") return `<span class="run-chip run-chip--gap" aria-hidden="true"></span>`;
        return group.map((type) =>
          `<span class="run-chip run-chip--${type}">${type.toUpperCase()}</span>`,
        ).join("");
      }).join("");

      return `
        <div class="method-diagram-panel">
          <p class="method-diagram-panel__label">How a season breaks into runs</p>
          <p class="method-diagram-panel__sub">Results in date order · each block ends on draw or loss</p>
          <div class="run-diagram__sequence" aria-label="Example: W W W D W W L W">${chips}</div>
          <div class="run-diagram__brackets">
            <div class="run-bracket">
              <span class="run-bracket__val">2</span>
              <span class="run-bracket__lbl">B2B (pairs)</span>
            </div>
            <div class="run-bracket">
              <span class="run-bracket__val">1</span>
              <span class="run-bracket__lbl">B2B2B (triples)</span>
            </div>
            <div class="run-bracket run-bracket--max">
              <span class="run-bracket__val">3</span>
              <span class="run-bracket__lbl">Max streak</span>
            </div>
          </div>
          <ul class="method-diagram-panel__rules">
            <li>B2B = pairs of wins within each run (W-W-W-W → 2 B2B · W-W → 1 B2B)</li>
            <li>B2B2B = triples within each run (W-W-W-W → 1 B2B2B · W-W-W → 1 B2B2B)</li>
            <li>H-B2B / A-B2B use home-only or away-only sequences · Max = longest run</li>
          </ul>
        </div>`;
    }

    function streakMetricAvg(indices, key) {
      return zoneAvg((entry) => entry.streaks[key], indices);
    }

    function streakMetricRange(indices, key) {
      return zoneRange((entry) => entry.streaks[key], indices);
    }

    function fmtStreakVal(value) {
      return Number.isInteger(value) ? String(value) : value.toFixed(1);
    }

    function renderMethodZoneChips(streakKey) {
      const zones = [
        ["champion", "1st", CHAMPION_INDICES],
        ["auto", "2–3", AUTO_PROMO_INDICES],
        ["playoff", "4–7", PLAYOFF_INDICES],
      ];
      return zones.map(([cls, label, indices]) =>
        `<span class="method-chip method-chip--${cls}"><small>${label}</small>${fmtStreakVal(streakMetricAvg(indices, streakKey))}</span>`,
      ).join("");
    }

    function renderMethodCard(variant, abbr, desc, example, streakKey) {
      const top7Avg = FORM_DATA.streakSummary[streakKey].top7Avg;
      const fullRange = streakMetricRange(ALL_TOP7_INDICES, streakKey);
      return `
        <div class="method-card method-card--${variant}">
          <span class="method-card__abbr">${abbr}</span>
          <p class="method-card__desc">${desc}</p>
          <p class="method-card__example">${example}</p>
          <div class="method-card__bench">
            <span class="method-card__bench-val">${fmtStreakVal(top7Avg)}</span>
            <div class="method-card__bench-meta">
              <span class="method-card__bench-lbl">Top-7 average</span>
              <span class="method-card__bench-range">${fullRange.min}–${fullRange.max} across 28 team-seasons</span>
            </div>
          </div>
          <div class="method-card__zone-chips">${renderMethodZoneChips(streakKey)}</div>
        </div>`;
    }

    function renderMethodZone(cls, rank, name, desc, indices) {
      const b2b = streakMetricAvg(indices, "backToBacks");
      const max = streakMetricAvg(indices, "maxWinStreak");
      const b2b3 = streakMetricAvg(indices, "backToBackToBack");
      return `
        <div class="method-zone method-zone--${cls}">
          <div class="method-zone__head">
            <span class="method-zone__rank">${rank}</span>
            <div class="method-zone__copy">
              <span class="method-zone__name">${name}</span>
              <p class="method-zone__desc">${desc}</p>
            </div>
          </div>
          <div class="method-zone__foot">
            <div class="method-zone__stat">
              <span class="method-zone__stat-lbl">B2B</span>
              <span class="method-zone__stat-val">${fmtStreakVal(b2b)}</span>
            </div>
            <div class="method-zone__stat">
              <span class="method-zone__stat-lbl">Max</span>
              <span class="method-zone__stat-val">${fmtStreakVal(max)}</span>
            </div>
            <div class="method-zone__stat">
              <span class="method-zone__stat-lbl">B2B2B</span>
              <span class="method-zone__stat-val">${fmtStreakVal(b2b3)}</span>
            </div>
          </div>
        </div>`;
    }

    function renderMethodBenchmarkTable() {
      const rows = [
        ["B2B", "backToBacks"],
        ["B2B2B", "backToBackToBack"],
        ["H-B2B", "homeBackToBacks"],
        ["A-B2B", "awayBackToBacks"],
        ["Max", "maxWinStreak"],
      ];
      return `
        <table class="method-benchmark-table">
          <thead>
            <tr>
              <th>Metric</th>
              <th>Champions</th>
              <th>Auto promo</th>
              <th>Play-offs</th>
            </tr>

          <tbody>
            ${rows.map(([label, key]) => `
            <tr>
              <td>${label}</td>
              <td>${fmtStreakVal(streakMetricAvg(CHAMPION_INDICES, key))}</td>
              <td>${fmtStreakVal(streakMetricAvg(AUTO_PROMO_INDICES, key))}</td>
              <td>${fmtStreakVal(streakMetricAvg(PLAYOFF_INDICES, key))}</td>
            </tr>`).join("")}
          </tbody>
        </table>`;
    }

    function renderMethodContextPanel() {
      return `
        <div class="method-context-panel">
          <p class="method-context-panel__title">On the next slides</p>
          <ul>
            <li><strong>Slide 10</strong> — B2B count chart by promotion zone</li>
            <li><strong>Slide 11</strong> — Longest win-run chart by promotion zone</li>
            <li><strong>Slide 12</strong> — Full table: every metric for each top-seven side</li>

          </ul>

        </div>`;

    function renderStreakMethodologySlide() {
      const metrics = [
        ["b2b", "B2B", "Season total of back-to-back win pairs (2 wins in a row)", "W-W-W-W → 2 B2B · W-W → 1 B2B", "backToBacks"],
        ["b2b3", "B2B2B", "Season total of three-in-a-row win triples", "W-W-W-W → 1 B2B2B · W-W-W → 1 B2B2B", "backToBackToBack"],
        ["b2bh", "H-B2B", "B2B pairs counted from home games only", "Four home wins in a row → 2 H-B2B", "homeBackToBacks"],
        ["b2ba", "A-B2B", "B2B pairs counted from away games only", "Three away wins in a row → 1 A-B2B", "awayBackToBacks"],
        ["max", "Max", "Longest single consecutive win run in the season", "Stockport 23/24 record: 12 · champions avg 7.2", "maxWinStreak"],
      ];
      const metricCards = metrics.map(([variant, title, desc, example, key]) =>
        renderMethodCard(variant, title, desc, example, key),

      const zones = [
        ["champion", "1", "Champions", "League winner", CHAMPION_INDICES],
        ["auto", "2–3", "Automatic Promotion", "Avg of 2nd & 3rd", AUTO_PROMO_INDICES],
        ["playoff", "4–7", "Play-offs", "Avg of 4th–7th", PLAYOFF_INDICES],
      ].map(([cls, rank, name, desc, indices]) =>
        renderMethodZone(cls, rank, name, desc, indices),
      ).join("");

      return `
        <section class="slide slide--streak-method" aria-label="Slide 09 — Winning Runs Definitions">
          <div class="slide__corner slide__corner--left"></div>
          <div class="slide__corner slide__corner--right"></div>

            <div class="method-slide__right">

              <div class="method-bento">${metricCards}</div>
              <p class="method-slide__section-title">Zone averages · slides 10–12 use these bands</p>
              <div class="method-zones">${zones}</div>
              ${renderMethodBenchmarkTable()}
              <p class="method-slide__footnote">W-D-L verified against Impect · League season only (first 46 fixtures) · Vale highlighted on slide 12 where in top 7</p>
            </div>
          </div>
          <div class="slide__footer-bar">WINNING RUNS · DEFINITIONS &amp; DATA</div>
        </section>`;
    }

      const seasons = FORM_DATA.formSeasons;

      ["Midfield", ["DM", "CM", "AM"]],
      ["Defence", ["LB", "CB", "RB"]],
    ];

    function positionShare(value, values) {
      const total = positionGoalsTotal(values);
      return total > 0 ? Math.round((value / total) * 100) : 0;
    }

    function positionGoalsTotal(values) {
      const tagged = POSITION_ORDER.reduce((sum, pos) => sum + (values[pos] || 0), 0);
      return tagged + (values[POSITION_OTHER] || 0);
    }

    function positionSpotlightPositions(values, count = 2) {
      return [...POSITION_ORDER]
        .sort((a, b) => (values[b] || 0) - (values[a] || 0))
        .slice(0, count);
    }

    const PLAYER_FORMATION_LINES = [

    function positionPlayersByPosition(zoneClass, metric) {

    function renderPlayerChip(row, rank, unit) {

    function renderPositionPlayerCell(position, players, unit) {

    function renderPositionPlayerPanel(metric, zoneClass) {

    function renderPositionKeyPanel(values, zoneClass, metric, header) {
      const unit = metric === "assists" ? "assists" : "goals";
      const maxVal = Math.max(...POSITION_ORDER.map((pos) => values[pos] || 0), 1);
      const groups = POSITION_KEY_GROUPS.map(([title, positions]) => {

          const val = values[position] || 0;
          const share = positionShare(val, values);
          const barWidth = Math.max(4, (val / maxVal) * 100);

    function renderPitchMarker(position, value, zoneClass) {

          <rect class="pitch-marker__card pitch-marker__card--${zoneClass}" x="${-w / 2}" y="${-h / 2}" width="${w}" height="${h}" rx="1.4" />
          <text class="pitch-marker__abbr" y="${-1.2}">${position}</text>

    function renderPositionPitchSvg(values, zoneClass, metric) {

    function positionZoneMetricTotals(indices, metric) {
      const seasons = GOALS_DATA.positionSeasons || [];
      const valueKey = metric === "assists" ? "assistsPositions" : "positions";
      return indices.flatMap((index) =>
        seasons.map((season) => {
          const row = season.top7[index][valueKey];
          const tagged = POSITION_ORDER.reduce((total, position) => total + (row[position] || 0), 0);
          return metric === "assists" ? tagged : tagged + (row[POSITION_OTHER] || 0);
        }),
      );
    }

    function positionZoneHeader(indices, values, metric) {
      const totals = positionZoneMetricTotals(indices, metric);
      const avgTotal = metric === "assists"
        ? POSITION_ORDER.reduce((sum, position) => sum + (values[position] || 0), 0)
        : positionGoalsTotal(values);
      const unit = metric === "assists" ? "assists" : "goals";
      return {
        avgTotal,
        min: Math.min(...totals),
        max: Math.max(...totals),
        unit,
      };
    }

    function renderPositionPitchPanel(zoneClass, title, desc, values, indices, metric) {
      const header = positionZoneHeader(indices, values, metric);
      return `

    const EXPORT_SLIDE_W = 1100;
    const EXPORT_SLIDE_H = 619;
    const EXPORT_PDF_W_MM = 338.67;
    const EXPORT_PDF_H_MM = 190.5;
    const EXPORT_FILE_BASE = "port-vale-league-two-strategy";

    function setExportStatus(message, type = "") {
      const el = document.getElementById("export-status");
      if (!el) return;
      el.textContent = message || "";
      el.className = `toolbar__export-status${type ? ` toolbar__export-status--${type}` : ""}`;
    }

    function setExportBusy(busy) {
      const pdfBtn = document.getElementById("export-pdf");
      const slidesBtn = document.getElementById("export-slides");
      if (pdfBtn) pdfBtn.disabled = busy;
      if (slidesBtn) slidesBtn.disabled = busy;
    }

    function setExportReady(ready) {
      const pdfBtn = document.getElementById("export-pdf");
      const slidesBtn = document.getElementById("export-slides");
      if (pdfBtn) pdfBtn.disabled = !ready;
      if (slidesBtn) slidesBtn.disabled = !ready;
    }

    function loadExportScript(src) {
      return new Promise((resolve, reject) => {
        if (document.querySelector(`script[src="${src}"]`)) {
          resolve();
          return;
        }
        const script = document.createElement("script");
        script.src = src;
        script.onload = () => resolve();
        script.onerror = () => reject(new Error("Could not load export library."));
        document.head.appendChild(script);
      });
    }

    function deckSlides() {
      return [...document.querySelectorAll("#deck > section.slide")];
    }

    function setExportOverlay(message) {
      const overlay = document.getElementById("export-overlay");
      if (!overlay) return;
      if (message) {
        overlay.textContent = message;
        overlay.classList.add("is-active");
      } else {
        overlay.textContent = "";
        overlay.classList.remove("is-active");
      }
    }

    function restoreInlineStyle(el, prop, value) {
      if (value) el.style.setProperty(prop, value);
      else el.style.removeProperty(prop);
    }

    function canvasLooksBlank(canvas) {
      const ctx = canvas.getContext("2d");
      if (!ctx) return true;
      const { width, height } = canvas;
      const { data } = ctx.getImageData(0, 0, width, height);
      for (let i = 0; i < data.length; i += 16) {
        if (data[i] !== 255 || data[i + 1] !== 255 || data[i + 2] !== 255) return false;
      }
      return true;
    }

    async function captureSlideForExport(slideEl) {
      const saved = {
        width: slideEl.style.width,
        height: slideEl.style.height,
        margin: slideEl.style.margin,
        maxWidth: slideEl.style.maxWidth,
        aspectRatio: slideEl.style.aspectRatio,
        slideWidth: slideEl.style.getPropertyValue("--slide-width"),
      };

      slideEl.style.setProperty("--slide-width", `${EXPORT_SLIDE_W}px`);
      slideEl.style.width = `${EXPORT_SLIDE_W}px`;
      slideEl.style.height = `${EXPORT_SLIDE_H}px`;
      slideEl.style.margin = "0 auto";
      slideEl.style.maxWidth = "none";
      slideEl.style.aspectRatio = "auto";

      const scrollX = window.scrollX;
      const scrollY = window.scrollY;
      slideEl.scrollIntoView({ block: "center", inline: "nearest" });

      if (document.fonts?.ready) await document.fonts.ready;
      await new Promise((resolve) => setTimeout(resolve, 50));
      await new Promise((resolve) => requestAnimationFrame(() => requestAnimationFrame(resolve)));

      const canvas = await window.html2canvas(slideEl, {
        backgroundColor: "#ffffff",
        scale: 2,
        width: EXPORT_SLIDE_W,
        height: EXPORT_SLIDE_H,
        useCORS: true,
        logging: false,
        scrollX: -window.scrollX,
        scrollY: -window.scrollY,
        windowWidth: document.documentElement.clientWidth,
        windowHeight: document.documentElement.clientHeight,
      });

      restoreInlineStyle(slideEl, "width", saved.width);
      restoreInlineStyle(slideEl, "height", saved.height);
      restoreInlineStyle(slideEl, "margin", saved.margin);
      restoreInlineStyle(slideEl, "max-width", saved.maxWidth);
      restoreInlineStyle(slideEl, "aspect-ratio", saved.aspectRatio);
      restoreInlineStyle(slideEl, "--slide-width", saved.slideWidth);
      window.scrollTo(scrollX, scrollY);

      if (canvasLooksBlank(canvas)) {
        throw new Error("Slide capture returned a blank image. Try refreshing and exporting again.");
      }
      return canvas;
    }

    async function captureAllSlides(onProgress) {
      await loadExportScript("https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js");
      if (!window.html2canvas) throw new Error("Slide capture failed.");
      if (document.fonts?.ready) await document.fonts.ready;

      const slides = deckSlides();
      if (!slides.length) throw new Error("No slides found to export.");

      const canvases = [];
      for (let i = 0; i < slides.length; i += 1) {
        const message = `Capturing slide ${i + 1} of ${slides.length}…`;
        onProgress(message);
        setExportOverlay(message);
        canvases.push(await captureSlideForExport(slides[i]));
      }
      setExportOverlay("");
      return canvases;
    }

    async function exportToPdf() {
      setExportBusy(true);
      try {
        setExportStatus("Preparing PDF…", "loading");
        const canvases = await captureAllSlides(setExportStatus);
        await loadExportScript("https://cdn.jsdelivr.net/npm/jspdf@2.5.2/dist/jspdf.umd.min.js");
        const { jsPDF } = window.jspdf;
        const pdf = new jsPDF({
          orientation: "landscape",
          unit: "mm",
          format: [EXPORT_PDF_W_MM, EXPORT_PDF_H_MM],
          compress: true,
        });
        canvases.forEach((canvas, index) => {
          const imageData = canvas.toDataURL("image/png");
          if (index > 0) pdf.addPage([EXPORT_PDF_W_MM, EXPORT_PDF_H_MM], "landscape");
          pdf.addImage(imageData, "PNG", 0, 0, EXPORT_PDF_W_MM, EXPORT_PDF_H_MM);
        });
        pdf.save(`${EXPORT_FILE_BASE}.pdf`);
        setExportStatus("PDF downloaded.", "success");
      } catch (err) {
        setExportStatus(err.message || "PDF export failed.", "error");
        console.error(err);
      } finally {
        setExportOverlay("");
        setExportReady(true);
      }
    }

    async function exportToSlides() {
      setExportBusy(true);
      try {
        setExportStatus("Preparing Slides file…", "loading");
        const canvases = await captureAllSlides(setExportStatus);
        await loadExportScript("https://cdn.jsdelivr.net/npm/pptxgenjs@3.12.0/dist/pptxgen.bundle.js");
        if (!window.PptxGenJS) throw new Error("Slides export library failed to load.");
        const pptx = new PptxGenJS();
        pptx.layout = "LAYOUT_WIDE";
        pptx.author = "Port Vale FC";
        pptx.title = "EFL League Two — Promotion Benchmarks";
        canvases.forEach((canvas) => {
          const slide = pptx.addSlide();
          slide.addImage({
            data: canvas.toDataURL("image/png"),
            x: 0,
            y: 0,
            w: "100%",
            h: "100%",
          });
        });
        await pptx.writeFile({ fileName: `${EXPORT_FILE_BASE}.pptx` });
        setExportStatus("Slides file downloaded — open in Google Slides or PowerPoint.", "success");
      } catch (err) {
        setExportStatus(err.message || "Slides export failed.", "error");
        console.error(err);
      } finally {
        setExportOverlay("");
        setExportReady(true);
      }
    }

    function initExportControls() {
      document.getElementById("export-pdf")?.addEventListener("click", exportToPdf);
      document.getElementById("export-slides")?.addEventListener("click", exportToSlides);
    }

    function valeSeasonSnapshot(seasonLabel = "24/25") {
      const formSeason = FORM_DATA.formSeasons.find((row) => row.season === seasonLabel);
      const goalsSeason = GOALS_DATA.phaseSeasons.find((row) => row.season === seasonLabel);
      const concededSeason = GOALS_DATA.concededPhaseSeasons.find((row) => row.season === seasonLabel);
      const pointsSeason = DATA.seasons.find((row) => row.season === seasonLabel);
      const valeForm = formSeason?.top7.find((row) => isPortVale(row.team));
      const valeGoals = goalsSeason?.top7.find((row) => isPortVale(row.team));
      const valeConceded = concededSeason?.top7.find((row) => isPortVale(row.team));
      const valePoints = pointsSeason?.top7.find((row) => isPortVale(row.team));
      return {
        form: valeForm,
        goals: valeGoals,
        conceded: valeConceded,
        points: valePoints,
        season: seasonLabel,
      };
    }

    function conclusionPhaseShares() {
      const seasons = GOALS_DATA.phaseSeasons;
      const phases = ["Transition", "Possession", "Set Play"];
      const shareFor = (indices) =>
        Object.fromEntries(
          phases.map((phase) => {
            const pcts = indices.flatMap((i) =>
              seasons.map((s) => {
                const row = s.top7[i];
                const total = Object.values(row.phases).reduce((a, b) => a + b, 0);
                return total ? ((row.phases[phase] || 0) / total) * 100 : 0;
              }),
            );
            return [phase, Math.round(avg(pcts))];
          }),
        );
      return { auto: shareFor(AUTO_PROMO_INDICES), playoff: shareFor(PLAYOFF_INDICES) };
    }

    function conclusionBenchmarks() {
      const pts = summary();
      const gs = goalsSummary();
      const formSeasons = FORM_DATA.formSeasons;
      const concededSeasons = GOALS_DATA.concededPhaseSeasons;
      const champGA = Math.round(avg(CHAMPION_INDICES.flatMap((i) => concededSeasons.flatMap((s) => s.top7[i].conceded))));
      const autoGA = Math.round(avg(AUTO_PROMO_INDICES.flatMap((i) => concededSeasons.flatMap((s) => s.top7[i].conceded))));
      const poGA = Math.round(avg(PLAYOFF_INDICES.flatMap((i) => concededSeasons.flatMap((s) => s.top7[i].conceded))));
      const champGF = Math.round(avg(CHAMPION_INDICES.flatMap((i) => GOALS_DATA.seasons.flatMap((s) => s.top7[i].goals))));
      const autoHome = Math.round(avg(AUTO_PROMO_INDICES.flatMap((i) => formSeasons.flatMap((s) => s.top7[i].homeWins))));
      const poHome = Math.round(avg(PLAYOFF_INDICES.flatMap((i) => formSeasons.flatMap((s) => s.top7[i].homeWins))));
      const autoAway = Math.round(avg(AUTO_PROMO_INDICES.flatMap((i) => formSeasons.flatMap((s) => s.top7[i].awayWins))));
      const poAway = Math.round(avg(PLAYOFF_INDICES.flatMap((i) => formSeasons.flatMap((s) => s.top7[i].awayWins))));
      const ss = FORM_DATA.streakSummary;
      return {
        champPts: pts.champion.avg.toFixed(0),
        autoPts: pts.auto.avg.toFixed(0),
        poPts: pts.playoff.avg.toFixed(0),
        champGA,
        autoGA,
        poGA,
        champGF,
        autoGF: Math.round(gs.auto.avg),
        poGF: Math.round(gs.playoff.avg),
        gaGap: poGA - autoGA,
        homeGap: autoHome - poHome,
        awayGap: autoAway - poAway,
        autoHome,
        poHome,
        autoAway,
        poAway,
        champB2B: fmtStreakVal(ss.backToBacks.first.avg),
        autoB2B: fmtStreakVal(ss.backToBacks.third.avg),
        poB2B: fmtStreakVal(ss.backToBacks.seventh.avg),
        champMax: fmtStreakVal(ss.maxWinStreak.first.avg),
        autoMax: fmtStreakVal(ss.maxWinStreak.third.avg),
        poMax: fmtStreakVal(ss.maxWinStreak.seventh.avg),
        phases: conclusionPhaseShares(),
      };
    }

    function conclusionPct(value, max) {
      if (!max || max <= 0) return 4;
      return Math.max(4, Math.min(100, (Number(value) / max) * 100));
    }

    function renderConclusionValeCompare(label, valeVal, benchVal, pad = 12, lowerIsBetter = false) {
      const v = Number(valeVal);
      const b = Number(benchVal);
      if (!Number.isFinite(v) || !Number.isFinite(b)) {
        return `
          <div class="conclusion-viz-block conclusion-vale-compare">
            <p class="conclusion-viz-block__label">${label}</p>
            <p class="conclusion-gap-note">Data unavailable</p>
          </div>`;
      }
      const max = Math.max(v, b) + pad;
      const diff = Math.round(v - b);
      const onBench = diff === 0;
      const ahead = lowerIsBetter ? diff < 0 : diff > 0;
      const deltaClass = onBench ? "" : (ahead ? "good" : "gap");
      const sign = diff > 0 ? "+" : "";
      const deltaText = onBench
        ? "Matches auto-promotion average"
        : `${sign}${diff} vs auto-promotion average`;
      const deltaHtml = onBench
        ? `<span class="conclusion-vale-compare__delta">${deltaText}</span>`
        : `<span class="conclusion-vale-compare__delta conclusion-vale-compare__delta--${deltaClass}">${deltaText}</span>`;
      return `
        <div class="conclusion-viz-block conclusion-vale-compare">
          <p class="conclusion-viz-block__label">${label}</p>
          <div class="conclusion-vale-compare__rows">
            <div class="conclusion-vale-compare__row">

              <div class="conclusion-vale-compare__track">
                <div class="conclusion-vale-compare__fill conclusion-vale-compare__fill--vale" style="width:${conclusionPct(v, max)}%"></div>
              </div>

            </div>
            <div class="conclusion-vale-compare__row">
              <span class="conclusion-vale-compare__name">Auto promo</span>
              <div class="conclusion-vale-compare__track">
                <div class="conclusion-vale-compare__fill conclusion-vale-compare__fill--auto" style="width:${conclusionPct(b, max)}%"></div>
              </div>
              <span class="conclusion-vale-compare__val">~${benchVal}</span>

    function formationSlug(name) {
      return name.toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/^-|-$/g, "");

    function formationDots(formation) {
      if (FORMATION_LAYOUTS[formation]) {
        return FORMATION_LAYOUTS[formation];
      }
      const base = formation.replace(/\s*\([^)]*\)/g, "").trim();
      const parts = base.split("-").map(Number).filter((n) => !Number.isNaN(n));
      if (!parts.length) return [FORMATION_SLOTS.GK];
      const yLines = [87, 71, 52, 36, 15].slice(0, parts.length);
      const dots = [];
      parts.forEach((count, lineIdx) => {
        const y = yLines[lineIdx] ?? 50;
        const isBackLine = lineIdx === 0;
        const isFrontLine = lineIdx === parts.length - 1;
        if (isBackLine && count >= 4) {
          dots.push(
            { x: 10, y: 83 },
            ...Array.from({ length: count - 2 }, (_, i) => ({
              x: 23 + (i * (45 - 23)) / Math.max(count - 3, 1),
              y: 87,
            })),
            { x: 58, y: 83 },
          );
          return;
        }
        if (isFrontLine && count === 3) {
          dots.push({ x: 10, y: 34 }, { x: 34, y: 15 }, { x: 58, y: 34 });
          return;
        }
        if (isFrontLine && count === 2) {
          dots.push({ x: 28, y: 16 }, { x: 40, y: 16 });
          return;
        }
        if (count === 2) {
          dots.push({ x: 26, y }, { x: 42, y });
          return;
        }
        if (count === 3) {
          dots.push({ x: 25, y }, { x: 34, y: y + 3 }, { x: 43, y });
          return;
        }
        if (count === 4) {
          dots.push({ x: 10, y }, { x: 24, y: y + 1 }, { x: 44, y: y + 1 }, { x: 58, y });
          return;
        }
        dots.push({ x: 34, y });
      });
      dots.push({ ...FORMATION_SLOTS.GK });
      return dots;
    }

    function renderFormationMarker(x, y, variant, options = {}) {
      const { gk = false, lead = false, enlarged = false } = options;

        return `

          <circle class="formation-dot formation-dot--gk" cx="${x}" cy="${y}" r="${r}" />`;
      }
      const dotClass = `formation-dot formation-dot--${variant}${lead ? " formation-dot--lead" : ""}`;
      return `
        <circle cx="${x}" cy="${y}" r="${halo}" fill="#ffffff" stroke="rgba(15,23,42,0.1)" stroke-width="0.18" />
        <circle class="${dotClass}" cx="${x}" cy="${y}" r="${r}" />`;
    }

    function formationZoneStats(indices) {
      const seasons = FORM_DATA.formSeasons;
      const usageSum = {};
      const usageN = {};
      let samples = 0;
      seasons.forEach((season) => {
        indices.forEach((i) => {
          const row = season.top7[i];
          const fmts = row.formations || [];
          if (!fmts.length) return;
          samples += 1;
          fmts.forEach((f) => {
            usageSum[f.formation] = (usageSum[f.formation] || 0) + f.pct;
            usageN[f.formation] = (usageN[f.formation] || 0) + 1;
          });
        });
      });
      const rankedUsage = Object.keys(usageSum)
        .map((name) => ({ name, avg: Math.round(usageSum[name] / usageN[name]) }))
        .sort((a, b) => b.avg - a.avg)
        .slice(0, 5);
      return { samples, rankedUsage };
    }
