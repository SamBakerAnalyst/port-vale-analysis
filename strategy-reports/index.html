      const { lead = false, uid = "", enlarged = false } = options;
      const gradId = `fmGrass-${variant}-${uid}`;
      const dots = formationDots(formation);
      const outfield = dots.filter((dot) => !dot.gk).sort((a, b) => b.y - a.y);
      const keeper = dots.find((dot) => dot.gk);
      const markerEls = outfield.map(({ x, y }) =>
        renderFormationMarker(x, y, variant, { lead, enlarged }),
      ).join("");
      const keeperEl = keeper
        ? renderFormationMarker(keeper.x, keeper.y, variant, { gk: true, enlarged })
        : "";
      return `
        <svg class="formation-pitch-card__svg" viewBox="0 0 68 105" preserveAspectRatio="xMidYMid meet" role="img" aria-label="${formation} shape">
          ${renderPitchLines(gradId, `${variant}-${uid}`)}

          ${keeperEl}

    }

                    ${renderConclusionValeCompare("Goals conceded", valeGA, b.autoGA, 6, true)}
                    ${renderConclusionValeCompare("Home wins", valeHome, b.autoHome, 4)}
                    ${renderConclusionValeCompare("Away wins", valeAway, b.autoAway, 4)}
                    ${renderConclusionValeCompare("Back-to-back win pairs", valeB2B, b.autoB2B, 2)}
                    ${renderConclusionValeCompare("Longest winning run", valeMax, b.autoMax, 2)}
                    <div class="conclusion-viz-block conclusion-wdl-row">
                      <p class="conclusion-viz-block__label">Season record · 46 league games</p>
                      <div class="conclusion-wdl-row">
                        <div class="conclusion-stat-tile conclusion-stat-tile--homewin">
                          <span class="conclusion-stat-tile__val">${valeHome}</span>
                          <span class="conclusion-stat-tile__lbl">Home wins</span>
                        </div>
                        <div class="conclusion-stat-tile conclusion-stat-tile--awaywin">
                          <span class="conclusion-stat-tile__val">${valeAway}</span>
                          <span class="conclusion-stat-tile__lbl">Away wins</span>
                        </div>
                        <div class="conclusion-stat-tile">
                          <span class="conclusion-stat-tile__val">${valeDraws}</span>
                          <span class="conclusion-stat-tile__lbl">Draws</span>
                        </div>
                        <div class="conclusion-stat-tile">
                          <span class="conclusion-stat-tile__val">${valeLosses}</span>
                          <span class="conclusion-stat-tile__lbl">Losses</span>
                        </div>
                      </div>
                    </div>
                    ${renderConclusionFormationRow(valeFormations)}
                    <p class="conclusion-tag">Goals conceded profile matches auto · ${valeB2B} back-to-back pairs · longest run ${valeMax} · transition-heavy</p>
                  </div>
                </div>
              </div>
              <div class="conclusion-focus">
                <p class="conclusion-focus__title">Strategic focus for a promotion push</p>
                <div class="conclusion-focus__cards">
                  <div class="conclusion-focus-card">
                    <div class="conclusion-focus-card__icon">${renderConclusionFocusIcon("defend")}</div>
                    <p class="conclusion-focus-card__title">Defend the box</p>
                    <p class="conclusion-focus-card__text">Tighten set-play and transition defending — the clearest separator from 4th–7th.</p>
                  </div>
                  <div class="conclusion-focus-card">
                    <div class="conclusion-focus-card__icon">${renderConclusionFocusIcon("home")}</div>
                    <p class="conclusion-focus-card__title">Protect home form</p>
                    <p class="conclusion-focus-card__text">Auto promo sides bank <strong>~${b.autoHome}</strong> home wins; every dropped point at Vale Park costs.</p>
                  </div>
                  <div class="conclusion-focus-card">
                    <div class="conclusion-focus-card__icon">${renderConclusionFocusIcon("cluster")}</div>
                    <p class="conclusion-focus-card__title">Cluster wins</p>
                    <p class="conclusion-focus-card__text">String back-to-backs — champions average <strong>~${b.champB2B}</strong> pairs; momentum compounds in this league.</p>
                  </div>
                </div>
              </div>
            </div>
          </div>
          <div class="slide__footer-bar">PORT VALE FC · LEAGUE TWO PROMOTION BENCHMARKS</div>
        </section>`;
    }

    function renderDeck() {
      const deck = document.getElementById("deck");
      try {
        deck.classList.remove("deck--loading");
        deck.innerHTML =
          renderTitle() +
          renderDataDictionarySlide() +
          renderDividerSlide("01", "Points Required", `How many points top-7 sides reach · SoccerStats · 5 seasons · ${ZONE_SUBTITLE}`) +
          renderBenchmarkSlide() +
          renderDividerSlide("02", "Goals Scored", `Goals-for benchmark · SoccerStats · 5 seasons · ${ZONE_SUBTITLE}`) +
          renderGoalsSlide() +
          renderDividerSlide("03", "Goals by Phase", `Attack breakdown · Impect · 22/23–25/26 · ${ZONE_SUBTITLE}`, "Chart · Table") +
          renderPhaseChartSlide() +
          renderPhaseTableSlide() +
          renderDividerSlide("05", "Goals Conceded", `Defense breakdown · Impect · 22/23–25/26 · ${ZONE_SUBTITLE}`, "Chart · Table") +
          renderPhaseChartSlide(true) +
          renderPhaseTableSlide(true) +
          renderDividerSlide("07", "Form & Winning Runs", `Home/away W-D-L · back-to-backs · Impect · 22/23–25/26 · ${ZONE_SUBTITLE}`, "Definitions · Charts · Table") +
          renderFormChartSlide() +
          renderFormTableSlide() +
          renderStreakMethodologySlide() +
          renderStreakChartSlide() +
          renderStreakMaxChartSlide() +
          renderStreakTableSlide() +
          renderDividerSlide("13", "Goals by Position", `4-3-3 scorer breakdown · Impect · 22/23–25/26 · ${ZONE_SUBTITLE}`, "Auto · Play-offs") +
          renderPositionZonePitchSlide(
            "13",
            "Goals by Position — Automatic Promotion",
            "goals",
            "auto",
            "Automatic Promotion",
            "Average goals by scorer position · 1st, 2nd &amp; 3rd place",
            AUTO_PROMO_FULL_INDICES,
          ) +
          renderPositionZonePitchSlide(
            "14",
            "Goals by Position — Play-offs",
            "goals",
            "playoff",
            "Play-offs",
            "Average goals by scorer position · 4th–7th place",
            PLAYOFF_INDICES,
          ) +
          renderDividerSlide("15", "Assists by Position", `4-3-3 assist breakdown · Impect · 22/23–25/26 · ${ZONE_SUBTITLE}`, "Auto · Play-offs") +
          renderPositionZonePitchSlide(
            "15",
            "Assists by Position — Automatic Promotion",
            "assists",
            "auto",
            "Automatic Promotion",
            "Average assists by player position · 1st, 2nd &amp; 3rd place",
            AUTO_PROMO_FULL_INDICES,
          ) +
          renderPositionZonePitchSlide(
            "16",
            "Assists by Position — Play-offs",
            "assists",
            "playoff",
            "Play-offs",
            "Average assists by player position · 4th–7th place",
            PLAYOFF_INDICES,
          ) +
          renderDividerSlide("17", "Formations", `Time in shape · Impect · 22/23–25/26 · ${ZONE_SUBTITLE}`, "Auto · Play-offs") +
          renderFormationZoneSlide(
            "17",
            "Formations — Automatic Promotion",
            "Automatic promotion · 1st–3rd",
            "Champions + 2nd + 3rd",
            AUTO_PROMO_FULL_INDICES,
            "auto",
          ) +
          renderFormationZoneSlide(
            "18",
            "Formations — Play-offs",
            "Play-offs · 4th–7th",
            "4th through 7th place",
            PLAYOFF_INDICES,
            "playoff",
            "<strong>No single formation guarantees promotion</strong> — the same shapes appear in both bands (4-2-3-1, 5-3-2, 5-2-1-2). Impect match detail · time-weighted across 46 league games · correlation not causation.",
          ) +
          renderConclusionSlide();
        setExportReady(true);
      } catch (err) {
        deck.classList.remove("deck--loading");
        deck.innerHTML = `<p class="deck-loading">Could not load slides — ${err.message}</p>`;
        setExportReady(false);
        console.error(err);
      }
    }

    initExportControls();
    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", renderDeck);
    } else {
      renderDeck();
    }
  </script>
</body>
