services:
  hub:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      HOST: 0.0.0.0
      PORT: 8000
      DATA_ROOT: /data
    volumes:
      - pv-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 20s

volumes:
  pv-data:
